          </p>
        )}

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入れ日</label>
          <input type="date" value={purchaseDate} onChange={(e) => setPurchaseDate(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        <div>
          <div className="flex items-center justify-between gap-2 mb-1.5">
            <label className="block text-xs" style={{ color: "var(--mz-ink-muted)" }}>仕入れロット(任意、まとめ買いの場合)</label>
            <button
              type="button" onClick={() => setBatchModalOpen(true)}
              className="text-xs px-2.5 py-1 rounded-lg whitespace-nowrap shrink-0"
              style={{ border: "1px solid var(--mz-gold)", color: "var(--mz-gold-soft)" }}
            >
              + 新規ロット登録
            </button>
          </div>
          <select value={batchId} onChange={(e) => handleBatchChange(e.target.value)}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
            <option value="">個別仕入れ(ロットなし)</option>
            {allBatches.map((b) => <option key={b.id} value={b.id}>{b.purchase_date}({b.total_items}点)</option>)}
          </select>
        </div>

        {activeColors.length === 0 && (
          <>
            <div className="grid grid-cols-3 gap-3">
              <div>
                <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入代(CNY)</label>
                <input type="number" min="0" step="0.01" value={purchaseAmountCny} onChange={(e) => setPurchaseAmountCny(e.target.value)} required
                  className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
              </div>
              <div>
                <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>送料(CNY)</label>
                <input type="number" min="0" step="0.01" value={shippingCny} onChange={(e) => setShippingCny(e.target.value)}
                  className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
              </div>
              <div>
                <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>手数料(CNY)</label>
                <input type="number" min="0" step="0.01" value={feeCny} onChange={(e) => setFeeCny(e.target.value)}
                  className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
              </div>
            </div>

            <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
              保存すると、上記CNY合計額がウォレット(チャージ残高)からFIFOで自動消化されます。
            </p>
          </>
        )}

        {activeColors.length > 0 && (
          <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
            カラーバリエーション一括登録モードです。上のカラー一覧で入力した色ごとの金額で、それぞれウォレット(チャージ残高)からFIFOで自動消化されます。
          </p>
        )}

        {formError && (
          <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{formError}</p>
        )}

        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>
            キャンセル
          </button>
          <button type="submit" disabled={saving || uploadingImage || uploadingExtractImage} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "保存中..." : (activeColors.length > 0 ? `${activeColors.length}点を一括登録` : "保存")}
          </button>
        </div>
      </form>

      {batchModalOpen && (
        <BatchFormModal onClose={() => setBatchModalOpen(false)} onSave={handleBatchCreated} />
      )}
    </div>
  );
}

/* ---- 返品登録モーダル(コスト0円・ウォレット消化なし) ---- */
function ReturnFormModal({ sourceProduct, onClose, onSave }) {
  const [returnDate, setReturnDate] = useState(todayISO());
  const [saving, setSaving] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSaving(true);
    await onSave({ return_date: returnDate });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 space-y-4"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">返品として在庫に戻す</h2>
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>
          「{sourceProduct.product_name}」の返品分を、新しい在庫として登録します(仕入代は既に支払い済みのため、ウォレットは消化されません)。
        </p>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>返品日</label>
          <input type="date" value={returnDate} onChange={(e) => setReturnDate(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>
        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>キャンセル</button>
          <button type="submit" disabled={saving} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "登録中..." : "返品登録"}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ---- 商品カード ---- */
function ProductCard({ product, onEdit, onReturn, onDelete, onTogglePurpose }) {

  const isSample = product.type === "sample";
  const isReturnedStock = !isSample && !!product.return_source_product_id;

    <div className="rounded-xl p-3 flex gap-3" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}>
      {product.product_image_url ? (
        <img src={product.product_image_url} alt="" className="w-16 h-16 rounded-lg object-cover shrink-0" style={{ border: "1px solid var(--mz-border)" }} />

        <div className="w-16 h-16 rounded-lg shrink-0 flex items-center justify-center" style={{ background: "var(--mz-surface-hover)" }}>
          <Icon name="tag" className="w-6 h-6" style={{ color: "var(--mz-ink-muted)" }} />

      <div className="flex-1 min-w-0">

          <ProductStatusBadge status={product.status} />
          <span className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>{isSample ? "サンプル" : "在庫"}</span>
          {isSample && <SamplePurposeBadge purpose={product.sample_purpose} />}
          {isReturnedStock && (
            <span className="text-xs px-2 py-0.5 rounded-full shrink-0" style={{ background: "#33301F", color: "var(--mz-ink-muted)" }}>返品在庫</span>
          )}
          {product.product_code && <span className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>No. {product.product_code}</span>}
          {product.return_date && <span className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>返品: {product.return_date}</span>}
        </div>
        <p className="text-sm font-medium truncate">{product.product_name}</p>
        <p className="text-xs truncate" style={{ color: "var(--mz-ink-muted)" }}>
          {product.category || "カテゴリ未設定"}{product.size ? ` ・ ${product.size}` : ""}
          {product.size_options && ` (展開: ${product.size_options})`}

        <div className="text-xs mt-1 flex flex-wrap gap-x-3" style={{ color: "var(--mz-ink-muted)" }}>
          {product.selling_price_jpy != null && <span>参考価格: {fmtJPY(product.selling_price_jpy)}</span>}

      </div>
      <div className="flex flex-col gap-1.5 shrink-0 items-end">

            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
          >
            {product.sample_purpose === "処分用" ? "展示用に戻す" : "処分用に切替"}
          </button>
        )}
        {product.status !== "返品済み" && (
          <button onClick={() => onReturn(product)} className="text-xs px-2.5 py-1.5 rounded-lg whitespace-nowrap" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>返品登録</button>
        )}
        <button
          onClick={() => onDelete(product)}
          className="text-xs px-2.5 py-1.5 rounded-lg whitespace-nowrap"
          style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}
        >
          削除
        </button>
      </div>
    </div>
  );
}

/* ---- 商品・サンプル在庫ページ本体 ---- */
function ProductsPage() {
  const [view, setView] = useState("list"); // "list" | "batches"
  const [products, setProducts] = useState(null); // null = 読み込み中
  const [batches, setBatches] = useState([]);
  const [consumptions, setConsumptions] = useState([]);
  const [error, setError] = useState(null);
  const [filterKind, setFilterKind] = useState("all"); // "all" | "sample_all" | "sample_display" | "sample_disposal" | "stock_normal" | "stock_returned"
  const [sortOrder, setSortOrder] = useState("desc"); // "desc"=登録日(仕入れ日)新しい順 / "asc"=古い順
  const [modalProduct, setModalProduct] = useState(null); // null=閉じる, {}=新規, obj=編集
  const [modalBatch, setModalBatch] = useState(false);
  const [returnTarget, setReturnTarget] = useState(null);

  const loadAll = useCallback(async () => {
    setError(null);
    const [productsRes, batchesRes, consumptionsRes] = await Promise.all([
      supabase.from("products")
        .select("id,type,status,sample_purpose,product_url,product_code,product_image_url,product_name,category,size,size_options,selling_price_jpy,purchase_date,created_at,return_date,return_source_product_id,batch_id,purchase_amount_cny,shipping_cny,fee_cny,purchase_amount_jpy,shipping_jpy,fee_jpy")
        .order("created_at", { ascending: false }),
      supabase.from("purchase_batches").select("id,purchase_date,total_items,total_shipping_cny,total_fee_cny,per_item_shipping_cny,per_item_fee_cny").order("purchase_date", { ascending: false }),
      supabase.from("agent_charge_consumptions").select("id,product_id"),
    ]);
    if (productsRes.error) { setError("商品情報の取得に失敗しました"); setProducts([]); return; }
    setProducts(productsRes.data || []);
    setBatches(batchesRes.data || []);
    setConsumptions(consumptionsRes.data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // ★2026-07-10実装: 販売登録画面の「展示用サンプルが売れました。再仕入れしますか？」に
  //   「はい」と回答した場合、その商品情報を事前入力した状態で新規登録モーダルを開く。
  useEffect(() => {
    if (pendingProductPrefill) {
      setModalProduct(pendingProductPrefill);
      pendingProductPrefill = null;
    }
  }, []);


  const consumedProductIds = useMemo(() => new Set((consumptions || []).map((c) => c.product_id)), [consumptions]);

  const usageCountByBatch = useMemo(() => {
    const m = {};
    (products || []).forEach((p) => { if (p.batch_id) m[p.batch_id] = (m[p.batch_id] || 0) + 1; });
    return m;
  }, [products]);

  const filteredProducts = useMemo(() => {
    if (!products) return [];
    // 売れた商品(販売済み・返品済み)は一覧から常に除外し、未販売のみを表示する(状態フィルタのUIは廃止)。
    let list = products.filter((p) => p.status === "未販売");
    if (filterKind === "sample_all") {
      list = list.filter((p) => p.type === "sample");
    } else if (filterKind === "sample_display") {
      list = list.filter((p) => p.type === "sample" && (p.sample_purpose || "展示用") === "展示用");
    } else if (filterKind === "sample_disposal") {
      list = list.filter((p) => p.type === "sample" && p.sample_purpose === "処分用");
    } else if (filterKind === "stock_normal") {
      list = list.filter((p) => p.type === "stock" && !p.return_source_product_id);
    } else if (filterKind === "stock_returned") {
      list = list.filter((p) => p.type === "stock" && !!p.return_source_product_id);
    }
    // 登録日(created_at)で並べ替え。同時刻の場合はidで安定ソート。
    const sorted = [...list].sort((a, b) => {
      const dateCompare = (a.created_at || "").localeCompare(b.created_at || "");
      if (dateCompare !== 0) return sortOrder === "asc" ? dateCompare : -dateCompare;
      return sortOrder === "asc" ? (a.id > b.id ? 1 : -1) : (a.id < b.id ? 1 : -1);
    });
    return sorted;
  }, [products, filterKind, sortOrder]);

  /* 仕入れ確定(products登録)時のウォレット消化処理は共通ヘルパーに委譲 */
  const consumeAndFinalize = consumeAndFinalizeProductCost;

  // 新規商品1点分の登録処理(ウォレット残高事前チェック→insert→FIFO消化確定)を共通化。
  // 単品の新規登録・カラーバリエーション一括登録(2.22参照)の両方から呼び出す。
  const insertNewProductCore = async (item) => {
    const totalNeeded = (item.purchase_amount_cny || 0) + (item.shipping_cny || 0) + (item.fee_cny || 0);
    const balance = await getWalletRemainingTotal();
    if (!balance.ok) return { ok: false, message: "ウォレット残高の確認に失敗しました" };
    if (balance.total < totalNeeded) {
      return { ok: false, message: `ウォレット残高が不足しています(必要額: ${totalNeeded.toFixed(2)} CNY / 残高: ${balance.total.toFixed(2)} CNY)。先にチャージを追加してください。` };
    }

    const { data: inserted, error } = await supabase.from("products").insert({
      type: item.type,
      status: item.status,
      sample_purpose: item.type === "sample" ? (item.sample_purpose || "展示用") : null,
      product_image_url: item.product_image_url,
      product_url: item.product_url,
      product_code: item.product_code,
      product_name: item.product_name,
      category: item.category,
      size: item.size,
      size_options: item.size_options,
      selling_price_jpy: item.selling_price_jpy,
      purchase_date: item.purchase_date,
      batch_id: item.batch_id,
      purchase_amount_cny: item.purchase_amount_cny,
      shipping_cny: item.shipping_cny,
      fee_cny: item.fee_cny,
    }).select("id").single();

    if (error || !inserted) return { ok: false, message: `${item.product_name}: 登録に失敗しました` };

    const consumeRes = await consumeAndFinalize(inserted.id, {
      purchaseCny: item.purchase_amount_cny,
      shippingCny: item.shipping_cny,
      feeCny: item.fee_cny,
    });
    if (!consumeRes.ok) {
      return { ok: true, warning: `${item.product_name}: 登録は完了しましたが、ウォレット消化処理でエラーが発生しました(${consumeRes.message})。チャージ台帳・商品情報をご確認ください。` };
    }
    return { ok: true };
  };

  const handleSaveProduct = async (form) => {
    // ★2026-07-10実装: カラーバリエーション一括登録(ProductFormModalでAI検出した色を複数選択した場合)
    if (form.multiItems) {
      const messages = [];
      for (const item of form.multiItems) {
        const res = await insertNewProductCore(item);
        if (!res.ok) messages.push(res.message);
        else if (res.warning) messages.push(res.warning);
      }
      if (messages.length > 0) alert(messages.join("\n"));
      setModalProduct(null);
      loadAll();
      return;
    }

    if (form.id) {
      // 編集: CNY金額(仕入代・送料・手数料)が変わっているかを、モーダルを開いた時点の元データ(modalProduct)と比較して判定する。
      // ★2026-07-10変更: 仕入れ確定後でも編集可能にする(サンプル登録が先、仕入れ確定が後になるケースに対応)。
      // 変更があれば「旧消化を取り消し→新金額で再消化」を行う。
      const original = modalProduct || {};
      const oldTotalCny = (Number(original.purchase_amount_cny) || 0) + (Number(original.shipping_cny) || 0) + (Number(original.fee_cny) || 0);
      const newTotalCny = (Number(form.purchase_amount_cny) || 0) + (Number(form.shipping_cny) || 0) + (Number(form.fee_cny) || 0);
      const costsChanged =
        (Number(form.purchase_amount_cny) || 0) !== (Number(original.purchase_amount_cny) || 0) ||
        (Number(form.shipping_cny) || 0) !== (Number(original.shipping_cny) || 0) ||
        (Number(form.fee_cny) || 0) !== (Number(original.fee_cny) || 0);

      if (costsChanged) {
        // 旧消化を払い戻した想定の残高で、新金額を賄えるか事前確認する(不足時はDBに一切書き込まない)
        const balance = await getWalletRemainingTotal();
        if (!balance.ok) { alert("ウォレット残高の確認に失敗しました"); return; }
        const projectedBalance = balance.total + oldTotalCny;
        if (projectedBalance < newTotalCny) {
          alert(`ウォレット残高が不足しています(必要額: ${newTotalCny.toFixed(2)} CNY / 旧消化分を払い戻した場合の残高: ${projectedBalance.toFixed(2)} CNY)。先にチャージを追加してから再度保存してください。`);
          return;
        }
        const reverseRes = await reverseWalletConsumption(form.id);
        if (!reverseRes.ok) { alert(reverseRes.message); return; }
      }

      const patch = {
        type: form.type,
        status: form.status,
        sample_purpose: form.type === "sample" ? (form.sample_purpose || "展示用") : null,
        product_image_url: form.product_image_url,
        product_url: form.product_url,
        product_code: form.product_code,
        product_name: form.product_name,
        category: form.category,
        size: form.size,
        size_options: form.size_options,
        selling_price_jpy: form.selling_price_jpy,
        purchase_date: form.purchase_date,
        batch_id: form.batch_id,
        purchase_amount_cny: form.purchase_amount_cny,
        shipping_cny: form.shipping_cny,
        fee_cny: form.fee_cny,
      };
      const { error } = await supabase.from("products").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }

      if (costsChanged) {
        const consumeRes = await consumeAndFinalize(form.id, {
          purchaseCny: form.purchase_amount_cny,
          shippingCny: form.shipping_cny,
          feeCny: form.fee_cny,
        });
        if (!consumeRes.ok) {
          alert(`商品情報は更新されましたが、ウォレット再消化処理でエラーが発生しました: ${consumeRes.message}\nチャージ台帳・商品情報をご確認ください。`);
        }
      }

      setModalProduct(null);
      loadAll();
      return;
    }

    // 通常の単品新規登録
    const res = await insertNewProductCore(form);
    if (!res.ok) { alert(res.message); return; }
    if (res.warning) alert(res.warning);

    setModalProduct(null);
    loadAll();
  };

  const handleDeleteProduct = async (product) => {
    const hasConsumption = consumedProductIds.has(product.id);
    const confirmMsg = hasConsumption
      ? "この商品を削除しますか?仕入れにかかったウォレット消化額(CNY)は、消化元のチャージ残高へ自動的に払い戻されます。"
      : "この商品を削除しますか?";
    if (!window.confirm(confirmMsg)) return;

    if (hasConsumption) {
      const reverseRes = await reverseWalletConsumption(product.id);
      if (!reverseRes.ok) { alert(reverseRes.message); return; }
    }

    const { error } = await supabase.from("products").delete().eq("id", product.id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  const handleTogglePurpose = async (product) => {
    const next = product.sample_purpose === "処分用" ? "展示用" : "処分用";
    const { error } = await supabase.from("products").update({ sample_purpose: next }).eq("id", product.id);
    if (error) { alert("目的区分の切替に失敗しました"); return; }
    loadAll();
  };

  // 仕入れロットのINSERT本体(「仕入れロット」タブからの登録・商品登録モーダルからの
  // 「+ 新規ロット登録」の両方で共通利用する)。
  const createBatch = async (form) => {
    const { data, error } = await supabase.from("purchase_batches").insert(form).select().single();
    if (error || !data) return { ok: false, message: "ロットの登録に失敗しました" };
    return { ok: true, batch: data };
  };

  const handleSaveBatch = async (form) => {
    const res = await createBatch(form);
    if (!res.ok) { alert(res.message); return; }
    setModalBatch(false);
    loadAll();
  };

  // 商品登録モーダル内の「+ 新規ロット登録」から呼ばれる。一覧(batches state)はバックグラウンドで
  // 更新しつつ、作成結果はモーダル側にもそのまま返して即座に選択・自動入力できるようにする。
  const handleCreateBatchInline = async (form) => {
    const res = await createBatch(form);
    if (res.ok) loadAll();
    return res;
  };

  const handleSaveReturn = async (form) => {
    const src = returnTarget;
    const { error } = await supabase.from("products").insert({
      type: src.type,
      status: "未販売",
      product_image_url: src.product_image_url,
      product_url: src.product_url,
      product_code: src.product_code,
      product_name: src.product_name,
      category: src.category,
      size: src.size,
      size_options: src.size_options,
      selling_price_jpy: src.selling_price_jpy,
      purchase_date: src.purchase_date,
      return_date: form.return_date,
      return_source_product_id: src.id,
      batch_id: null,
      purchase_amount_cny: 0,
      shipping_cny: 0,
      fee_cny: 0,
      purchase_amount_jpy: 0,
      shipping_jpy: 0,
      fee_jpy: 0,
    });
    if (error) { alert("返品登録に失敗しました"); return; }
    setReturnTarget(null);
    loadAll();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="rounded-lg overflow-hidden flex text-sm" style={{ border: "1px solid var(--mz-border)" }}>
          <button onClick={() => setView("list")} className="px-3 py-2"
            style={{ background: view === "list" ? "var(--mz-surface-hover)" : "transparent", color: view === "list" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)" }}>
            商品一覧
          </button>
          <button onClick={() => setView("batches")} className="px-3 py-2"
            style={{ background: view === "batches" ? "var(--mz-surface-hover)" : "transparent", color: view === "batches" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)" }}>
            仕入れロット
          </button>
        </div>

        {view === "list" ? (
          <div className="flex items-center gap-2 flex-wrap">
            <select value={filterKind} onChange={(e) => setFilterKind(e.target.value)}
              className="rounded-lg px-3 py-2 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="all">区分: すべて</option>
              <option value="sample_all">サンプル: すべて</option>
              <option value="sample_display">サンプル: 展示用</option>
              <option value="sample_disposal">サンプル: 処分用</option>
              <option value="stock_normal">在庫</option>
              <option value="stock_returned">在庫: 返品在庫</option>
            </select>
            <select value={sortOrder} onChange={(e) => setSortOrder(e.target.value)}
              className="rounded-lg px-3 py-2 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="desc">登録日: 新しい順</option>
              <option value="asc">登録日: 古い順</option>
            </select>
            <button onClick={() => setModalProduct({})} className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
              + 新規仕入れ登録
            </button>
          </div>
        ) : (
          <button onClick={() => setModalBatch(true)} className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            + 新規ロット
          </button>
        )}
      </div>

      {error && <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>}
      {products === null && !error && <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>}

      {products !== null && view === "list" && (
        filteredProducts.length === 0 ? (
          <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>該当する商品がありません</p>
        ) : (
          <div className="space-y-2">
            {filteredProducts.map((p) => (
              <ProductCard
                key={p.id}
                product={p}
                onEdit={(prod) => setModalProduct(prod)}
                onReturn={(prod) => setReturnTarget(prod)}
                onDelete={handleDeleteProduct}
                onTogglePurpose={handleTogglePurpose}
              />
            ))}
          </div>
        )
      )}

      {products !== null && view === "batches" && (
        <BatchList batches={batches} usageCountByBatch={usageCountByBatch} />
      )}

      {modalProduct && (
        <ProductFormModal product={modalProduct} batches={batches} onClose={() => setModalProduct(null)} onSave={handleSaveProduct} onCreateBatch={handleCreateBatchInline} />
      )}
      {modalBatch && (
        <BatchFormModal onClose={() => setModalBatch(false)} onSave={handleSaveBatch} />
      )}
      {returnTarget && (
        <ReturnFormModal sourceProduct={returnTarget} onClose={() => setReturnTarget(null)} onSave={handleSaveReturn} />
      )}
    </div>
  );
}

/* ============================================================
   販売登録 + 領収書発行(sales / sale_items / receipts)

   実装済み範囲:
     ・既存の未販売商品(サンプル・在庫)を選択して販売登録、複数商品まとめて1回の取引として登録(sale_items)
     ・消費税端数処理(1領収書につき1回、切り捨て)を反映した領収書自動作成
     ・販売一覧・削除(削除時は商品を「未販売」へ自動復元)、編集(明細差分反映)
     ・販売画面からの「新規仕入対応」(その場でproducts新規登録+ウォレット消化)
     ・領収書プレビュー・印刷/PDF保存(ReceiptPreviewModal, window.print())

   積み残し:
     ・ダッシュボードの売上・利益連携
   ============================================================ */

const ISSUER_INFO_DEFAULT = "〒012-0055\n秋田県湯沢市山田字荻生田26-2\nIMPORT PRIME合同会社\n08016592527";

/* ---- 消費税端数処理(インボイス制度準拠: 1領収書につき1回、切り捨て)
   ※ 販売登録の単価入力は税込金額のため、税込合計から税抜金額を逆算する方式。
      税抜金額 = 税込合計 ÷ 1.1 を小数点以下切り捨て(1領収書につき1回だけ計算)、
      消費税額 = 税込合計 − 税抜金額。 ---- */
function calcReceiptTotals(totalInclJpy) {
  const total = Math.round(Number(totalInclJpy) || 0);
  const subtotal = Math.floor(total / 1.1);
  const tax = total - subtotal;
  return { subtotal, tax, total };
}

/* ---- 明細1件分の税抜金額(利益計算用。税込単価を1.1で割り、小数点以下切り捨て) ---- */
function itemPretaxJpy(unitPriceInclJpy) {
  return Math.floor((Number(unitPriceInclJpy) || 0) / 1.1);
}

/* ---- 商品の原価合計(仕入代+送料+手数料、JPY確定額) ---- */
function productCostJpy(p) {
  return (Number(p.purchase_amount_jpy) || 0) + (Number(p.shipping_jpy) || 0) + (Number(p.fee_jpy) || 0);
}

/* ---- 商品の表示ラベル(「商品名 - サイズ」形式、sale_items設計に準拠) ---- */
function productLabel(p) {
  let label = p.product_name || "(名称未設定)";
  if (p.size) label += ` - ${p.size}`;
  if (p.product_code) label += `(No.${p.product_code})`;
  return label;
}

/* ---- 領収書番号の自動採番("2026-0001"形式、年度でリセット) ---- */
async function generateReceiptNumber(dateStr) {
  const year = (dateStr || todayISO()).slice(0, 4);
  const { data, error } = await supabase
    .from("receipts")
    .select("receipt_number")
    .ilike("receipt_number", `${year}-%`);
  if (error || !data) return `${year}-0001`;
  let maxNum = 0;
  const re = new RegExp(`^${year}-(\\d+)$`);
  data.forEach((r) => {
    const m = re.exec(r.receipt_number || "");
    if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
  });
  return `${year}-${String(maxNum + 1).padStart(4, "0")}`;
}

/* ---- 外注費請求書番号の自動採番(generateInvoiceNumber) ----
   receiptsと同じ考え方で年ごとにリセットする連番だが、領収書番号と混同しないよう
   "INV-{年}-{4桁連番}"形式にする(例: INV-2026-0001)。 */
async function generateInvoiceNumber(dateStr) {
  const year = (dateStr || todayISO()).slice(0, 4);
  const { data, error } = await supabase
    .from("contractor_invoices")
    .select("invoice_number")
    .ilike("invoice_number", `INV-${year}-%`);
  if (error || !data) return `INV-${year}-0001`;
  let maxNum = 0;
  const re = new RegExp(`^INV-${year}-(\\d+)$`);
  data.forEach((r) => {
    const m = re.exec(r.invoice_number || "");
    if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
  });
  return `INV-${year}-${String(maxNum + 1).padStart(4, "0")}`;
}

/* ---- 販売登録モーダル ----
   ・ホストクラブ/ホスト選択 → 未販売商品を検索して複数点まとめて追加
   ・単価はselling_price_jpyを初期値に編集可(値引き等に対応)
   ・quantityは常に1(products1登録=1点のため、複数点は複数sale_item行で表現) */
/* ============================================================
   販売画面からの「新規仕入対応」フロー
   ・訪問時に持って行ったサンプルが気に入られたが在庫がない場合など、
     販売登録のその場で新しい商品(type: "stock")を仕入れ確定させ、
     即座に販売明細へ追加するためのモーダル。
   ・参考サンプル(既存のsample商品)を検索して選ぶと、
     product_url / product_name / category / size_options / 参考販売価格を自動引き継ぎ。
     サイズ・仕入原価(CNY)は必ずこの1点ごとに都度入力する。
   ・登録と同時にウォレット(agent_charges)からFIFO消化(consumeAndFinalizeProductCost)。
   ============================================================ */
function NewPurchaseModal({ batches, onClose, onCreated }) {
  const [referenceSearch, setReferenceSearch] = useState("");
  const [references, setReferences] = useState(null); // null = 読み込み中
  const [selectedRefId, setSelectedRefId] = useState(null);

  const [productImageUrl, setProductImageUrl] = useState("");
  const [productUrl, setProductUrl] = useState("");
  const [productCode, setProductCode] = useState("");
  const [productName, setProductName] = useState("");
  const [category, setCategory] = useState("");
  const [sizeOptionsText, setSizeOptionsText] = useState("");
  const [size, setSize] = useState("");
  const [sellingPriceJpy, setSellingPriceJpy] = useState("");
  const [purchaseDate, setPurchaseDate] = useState(todayISO());
  const [batchId, setBatchId] = useState("");
  const [purchaseAmountCny, setPurchaseAmountCny] = useState("");
  const [shippingCny, setShippingCny] = useState("");
  const [feeCny, setFeeCny] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // 参考サンプル候補(type: "sample")を取得。ステータスは問わない(あくまで名称・URL等の参照元のため)
  useEffect(() => {
    let cancelled = false;
    supabase
      .from("products")
      .select("id,product_name,category,product_url,product_image_url,product_code,size_options,selling_price_jpy")
      .eq("type", "sample")
      .order("product_name")
      .then(({ data, error }) => {
        if (cancelled) return;
        setReferences(error ? [] : (data || []));
      });
    return () => { cancelled = true; };
  }, []);

  // 新規商品(在庫)の商品番号を自動採番("P-0001"形式、手動編集可)
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const code = await generateNextProductCode("stock");
      if (!cancelled) setProductCode(code);
    })();
    return () => { cancelled = true; };
  }, []);

  const referenceCandidates = useMemo(() => {
    if (!references) return [];
    const q = referenceSearch.trim().toLowerCase();
    return references.filter((p) => {
      if (!q) return true;
      return (p.product_name || "").toLowerCase().includes(q) || (p.product_code || "").toLowerCase().includes(q);
    }).slice(0, 20);
  }, [references, referenceSearch]);

  const sizeOptionsList = useMemo(() => {
    return sizeOptionsText.split(/[\/,、]/).map((s) => s.trim()).filter(Boolean);
  }, [sizeOptionsText]);

  const handleSelectReference = (ref) => {
    setSelectedRefId(ref.id);
    setProductImageUrl(ref.product_image_url || "");
    setProductUrl(ref.product_url || "");
    setProductName(ref.product_name || "");
    setCategory(ref.category || "");
    setSizeOptionsText(ref.size_options || "");
    setSellingPriceJpy(ref.selling_price_jpy != null ? String(ref.selling_price_jpy) : "");
    setSize(""); // サイズはこの1点用に都度選び直す
  };

  const clearReference = () => {
    setSelectedRefId(null);
    setProductImageUrl("");
    setProductUrl("");
    setProductName("");
    setCategory("");
    setSizeOptionsText("");
    setSellingPriceJpy("");
    setSize("");
  };

  const handleBatchChange = (id) => {
    setBatchId(id);
    if (!id) return;
    const b = batches.find((x) => x.id === id);
    if (b) {
      setShippingCny(String(Number(b.per_item_shipping_cny).toFixed(2)));
      setFeeCny(String(Number(b.per_item_fee_cny).toFixed(2)));
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    if (!productName.trim()) { setError("商品名を入力してください"); return; }
    if (!size.trim()) { setError("この1点の実サイズを入力してください"); return; }
    if (!purchaseDate) { setError("仕入れ日を入力してください"); return; }

    const purchaseCny = parseFloat(purchaseAmountCny) || 0;
    const shippingCnyVal = parseFloat(shippingCny) || 0;
    const feeCnyVal = parseFloat(feeCny) || 0;
    const totalNeeded = purchaseCny + shippingCnyVal + feeCnyVal;

    setSaving(true);

    // 事前にウォレット残高を確認(部分消化を避けるため、ProductsPageの新規仕入登録と同じ方針)
    const balance = await getWalletRemainingTotal();
    if (!balance.ok) { setError("ウォレット残高の確認に失敗しました"); setSaving(false); return; }
    if (balance.total < totalNeeded) {
      setError(`ウォレット残高が不足しています(必要額: ${totalNeeded.toFixed(2)} CNY / 残高: ${balance.total.toFixed(2)} CNY)。先にチャージを追加してください。`);
      setSaving(false);
      return;
    }

    const { data: inserted, error: insertErr } = await supabase.from("products").insert({
      type: "stock",
      status: "未販売",
      product_image_url: productImageUrl || null,
      product_url: productUrl.trim() || null,
      product_code: productCode.trim() || null,
      product_name: productName.trim(),
      category: category.trim() || null,
      size: size.trim(),
      size_options: sizeOptionsText.trim() || null,
      selling_price_jpy: sellingPriceJpy ? parseFloat(sellingPriceJpy) : null,
      purchase_date: purchaseDate,
      batch_id: batchId || null,
      purchase_amount_cny: purchaseCny,
      shipping_cny: shippingCnyVal,
      fee_cny: feeCnyVal,
    }).select("id").single();

    if (insertErr || !inserted) { setError("商品の登録に失敗しました"); setSaving(false); return; }

    const consumeRes = await consumeAndFinalizeProductCost(inserted.id, {
      purchaseCny, shippingCny: shippingCnyVal, feeCny: feeCnyVal,
    });
    if (!consumeRes.ok) {
      setSaving(false);
      alert(`商品は登録されましたが、ウォレット消化処理でエラーが発生しました: ${consumeRes.message}\nチャージ台帳・商品情報をご確認ください。`);
      // 登録済み商品情報を渡して明細追加までは行う(在庫としては存在するため)
    }

    // 確定後の商品情報(原価JPY確定額込み)を取得し、そのまま販売明細へ追加する
    const { data: finalProduct, error: fetchErr } = await supabase
      .from("products")
      .select("id,product_name,category,size,product_code,selling_price_jpy,purchase_amount_jpy,shipping_jpy,fee_jpy")
      .eq("id", inserted.id)
      .single();

    setSaving(false);
    if (fetchErr || !finalProduct) { setError("商品は登録されましたが、明細への反映に失敗しました。商品一覧からご確認ください。"); return; }

    onCreated(finalProduct);
  };

  return (
    <div className="fixed inset-0 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl p-5 space-y-4 max-h-[92vh] overflow-y-auto"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">新規仕入対応</h2>
        <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
          在庫のない商品をその場で仕入れ確定し、このままこの販売の明細に追加します(ウォレットからFIFOで即時消化されます)。
        </p>

        {/* 参考サンプル検索 */}
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>参考サンプルを選ぶ(商品名・URL・カテゴリを自動引き継ぎ)</label>
          <input
            type="text" value={referenceSearch} onChange={(e) => setReferenceSearch(e.target.value)}
            placeholder="サンプルの商品名・商品番号で検索"
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent mb-2"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
          {references === null ? (
            <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : referenceCandidates.length === 0 ? (
            <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>該当するサンプルがありません</p>
          ) : (
            <div className="rounded-lg max-h-32 overflow-y-auto divide-y" style={{ border: "1px solid var(--mz-border)", borderColor: "var(--mz-border)" }}>
              {referenceCandidates.map((p) => (
                <button
                  type="button" key={p.id} onClick={() => handleSelectReference(p)}
                  className="w-full text-left px-3 py-2 text-xs flex items-center justify-between gap-2 hover:bg-white/5"
                  style={{ color: p.id === selectedRefId ? "var(--mz-gold-soft)" : "var(--mz-ink)" }}
                >
                  <span className="truncate">{productLabel(p)}</span>
                  {p.id === selectedRefId && <span className="shrink-0 text-[11px]">選択中</span>}
                </button>
              ))}
            </div>
          )}
          {selectedRefId && (
            <button type="button" onClick={clearReference} className="text-[11px] mt-1" style={{ color: "var(--mz-ink-muted)" }}>
              参照を解除して手入力に戻す
            </button>
          )}
        </div>

        <div className="pt-1" style={{ borderTop: "1px solid var(--mz-border)" }} />

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>商品名</label>
          <input type="text" value={productName} onChange={(e) => setProductName(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>カテゴリ</label>
            <select value={category} onChange={(e) => setCategory(e.target.value)} required
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="">選択してください</option>
              {CATEGORY_OPTIONS.map((c) => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>商品番号</label>
            <input type="text" value={productCode} onChange={(e) => setProductCode(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>この1点の実サイズ(必須)</label>
          {sizeOptionsList.length > 0 ? (
            <select value={size} onChange={(e) => setSize(e.target.value)} required
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="">選択してください</option>
              {sizeOptionsList.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          ) : (
            <input type="text" value={size} onChange={(e) => setSize(e.target.value)} placeholder="M / L / 42 / フリー" required
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          )}
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>淘宝商品ページURL(任意)</label>
          <input type="text" value={productUrl} onChange={(e) => setProductUrl(e.target.value)}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        <div className="pt-1" style={{ borderTop: "1px solid var(--mz-border)" }} />

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入れ日</label>
            <input type="date" value={purchaseDate} onChange={(e) => setPurchaseDate(e.target.value)} required
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入れロット(任意)</label>
            <select value={batchId} onChange={(e) => handleBatchChange(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="">なし(単独仕入れ)</option>
              {batches.map((b) => <option key={b.id} value={b.id}>{b.purchase_date}</option>)}
            </select>
          </div>
        </div>

        <div className="grid grid-cols-3 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入代(CNY)</label>
            <input type="number" min="0" step="0.01" value={purchaseAmountCny} onChange={(e) => setPurchaseAmountCny(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>国際送料(CNY)</label>
            <input type="number" min="0" step="0.01" value={shippingCny} onChange={(e) => setShippingCny(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>その他手数料(CNY)</label>
            <input type="number" min="0" step="0.01" value={feeCny} onChange={(e) => setFeeCny(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>参考販売価格(JPY・任意)</label>
          <input type="number" min="0" step="1" value={sellingPriceJpy} onChange={(e) => setSellingPriceJpy(e.target.value)}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        {error && (
          <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
        )}

        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>キャンセル</button>
          <button type="submit" disabled={saving} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "処理中..." : "仕入れ確定して明細に追加"}
          </button>
        </div>
      </form>
    </div>
  );
}

function SaleFormModal({ clubs, batches, sale, onClose, onSave }) {
  const isEdit = !!sale;
  const [transactionDate, setTransactionDate] = useState(sale ? sale.transaction_date : todayISO());
  const [hostClubId, setHostClubId] = useState(sale ? sale.host_club_id : "");
  const [hosts, setHosts] = useState([]);
  const [hostId, setHostId] = useState(sale ? (sale.host_id || "") : "");
  const [unsoldProducts, setUnsoldProducts] = useState(null); // null = 読み込み中
  const [searchText, setSearchText] = useState("");
  const [items, setItems] = useState(() => {
    if (!sale) return [];
    return (sale.sale_items || []).map((si) => ({
      productId: si.product_id,
      product: {
        id: si.product_id,
        product_name: si.products ? si.products.product_name : null,
        size: si.products ? si.products.size : null,
        product_code: si.products ? si.products.product_code : null,
        type: si.products ? si.products.type : null,
        sample_purpose: si.products ? si.products.sample_purpose : null,
        category: si.products ? si.products.category : null,
        product_image_url: si.products ? si.products.product_image_url : null,
        product_url: si.products ? si.products.product_url : null,
        size_options: si.products ? si.products.size_options : null,
        purchase_amount_jpy: si.products ? si.products.purchase_amount_jpy : 0,
        shipping_jpy: si.products ? si.products.shipping_jpy : 0,
        fee_jpy: si.products ? si.products.fee_jpy : 0,
      },
      unitPrice: String(si.unit_price_jpy),
    }));
  }); // [{ productId, product, unitPrice }]
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [newPurchaseOpen, setNewPurchaseOpen] = useState(false);

  useEffect(() => {
    let cancelled = false;
    supabase
      .from("products")
      .select("id,type,sample_purpose,product_name,category,size,product_code,product_image_url,product_url,size_options,selling_price_jpy,purchase_amount_jpy,shipping_jpy,fee_jpy")
      .eq("status", "未販売")
      .order("product_name")
      .then(({ data, error }) => {
        if (cancelled) return;
        setUnsoldProducts(error ? [] : (data || []));
      });
    return () => { cancelled = true; };
  }, []);

  // ホストクラブ変更時にホスト一覧を再取得。編集モードで最初から選択済みのホストは、
  // そのクラブのホスト一覧に含まれていれば維持し、含まれていなければクリアする。
  useEffect(() => {
    if (!hostClubId) { setHosts([]); setHostId(""); return; }
    let cancelled = false;
    supabase.from("hosts").select("id,name").eq("host_club_id", hostClubId).order("name").then(({ data, error }) => {
      if (cancelled) return;
      const list = error ? [] : (data || []);
      setHosts(list);
      setHostId((prev) => (list.some((h) => h.id === prev) ? prev : ""));
    });
    return () => { cancelled = true; };
  }, [hostClubId]);

  const selectedIds = useMemo(() => new Set(items.map((it) => it.productId)), [items]);

  const candidates = useMemo(() => {
    if (!unsoldProducts) return [];
    return unsoldProducts.filter((p) => {
      if (selectedIds.has(p.id)) return false;
      if (!searchText.trim()) return true;
      const q = searchText.trim().toLowerCase();
      return (p.product_name || "").toLowerCase().includes(q) || (p.product_code || "").toLowerCase().includes(q);
    }).slice(0, 20);
  }, [unsoldProducts, selectedIds, searchText]);

  const addItem = (product) => {
    setItems((prev) => [...prev, {
      productId: product.id,
      product,
      unitPrice: product.selling_price_jpy != null ? String(product.selling_price_jpy) : "",
    }]);
    setSearchText("");
  };

  // 新規仕入対応モーダルで商品が仕入れ確定された時: そのままこの販売の明細に追加する
  const handleProductCreated = (product) => {
    addItem(product);
    setNewPurchaseOpen(false);
  };
  const removeItem = (productId) => setItems((prev) => prev.filter((it) => it.productId !== productId));
  const updateUnitPrice = (productId, value) => setItems((prev) => prev.map((it) => (it.productId === productId ? { ...it, unitPrice: value } : it)));

  const totalInclJpy = items.reduce((sum, it) => sum + (parseFloat(it.unitPrice) || 0), 0); // 単価は税込のため、単純合計が税込合計になる
  const totals = calcReceiptTotals(totalInclJpy);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    if (!hostClubId) { setError("ホストクラブを選択してください"); return; }
    if (items.length === 0) { setError("商品を1点以上追加してください"); return; }
    if (items.some((it) => it.unitPrice === "" || isNaN(parseFloat(it.unitPrice)) || parseFloat(it.unitPrice) < 0)) {
      setError("単価をすべて正しく入力してください");
      return;
    }

    const club = clubs.find((c) => c.id === hostClubId);
    const host = hosts.find((h) => h.id === hostId);
    const recipientName = host ? host.name : (club ? club.name : "");

    setSaving(true);
    const ok = await onSave({
      id: sale ? sale.id : null,
      transaction_date: transactionDate,
      host_club_id: hostClubId,
      host_id: hostId || null,
      recipient_name: recipientName,
      items: items.map((it) => ({
        product_id: it.productId,
        unit_price_jpy: parseFloat(it.unitPrice),
        cost_jpy: productCostJpy(it.product),
      })),
    });
    setSaving(false);
    if (!ok) return; // onSave側でエラー表示済み。モーダルは開いたままにして再試行可能にする

    // ★2026-07-10実装: この保存で新たに「売れた」ことになった商品の中に、
    //   展示用サンプル(type: "sample" かつ sample_purpose: "展示用")があれば、
    //   再仕入れするかどうかを案内する。新規登録時は全明細が対象、編集時は
    //   元々の明細(sale.sale_items)に無かった新規追加分のみを対象とする。
    const previousProductIds = new Set((sale?.sale_items || []).map((si) => si.product_id));
    const newlySoldItems = isEdit ? items.filter((it) => !previousProductIds.has(it.productId)) : items;
    const reorderCandidates = newlySoldItems.filter(
      (it) => it.product && it.product.type === "sample" && (it.product.sample_purpose || "展示用") === "展示用"
    );
    if (reorderCandidates.length > 0) {
      const names = reorderCandidates.map((it) => it.product.product_name || "(名称未設定)").join("、");
      const wantsReorder = window.confirm(`展示用サンプルが売れました: ${names}\n再仕入れしますか?`);
      if (wantsReorder) {
        // 複数該当する場合は先頭の1点分のみ事前入力する(商品登録モーダルは1商品ずつの登録のため)
        const ref = reorderCandidates[0].product;
        pendingProductPrefill = {
          type: "sample",
          sample_purpose: "展示用",
          product_image_url: ref.product_image_url || "",
          product_url: ref.product_url || "",
          product_name: ref.product_name || "",
          category: ref.category || "",
          size_options: ref.size_options || "",
        };
        window.location.hash = "#/products";
      }
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form

        <div className="grid grid-cols-2 gap-3">

            <input type="date" value={transactionDate} onChange={(e) => setTransactionDate(e.target.value)} required

          </div>
          <div>

            <select value={hostClubId} onChange={(e) => setHostClubId(e.target.value)} required

   ・「印刷 / PDFとして保存」ボタンでwindow.print()を呼び出す。

function ReceiptPreviewModal({ sale, onClose }) {
  const [receipt, setReceipt] = useState(null); // null=読込中, false=見つからない
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    supabase
      .from("receipts")
      .select("id,receipt_number,issue_date,recipient_name,memo,subtotal_jpy,tax_jpy,total_jpy,issuer_info")
      .eq("sale_id", sale.id)
      .maybeSingle()
      .then(({ data, error }) => {
        if (cancelled) return;
        if (error || !data) { setError("領収書の取得に失敗しました"); setReceipt(false); return; }
        setReceipt(data);
      });
    return () => { cancelled = true; };
  }, [sale.id]);

  const items = sale.sale_items || [];
  const clubName = sale.host_clubs ? sale.host_clubs.name : "-";

  return (

        {receipt === null && (
          <p className="text-sm mz-no-print" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
        )}
        {error && (
          <p className="text-sm rounded-lg px-3 py-2 mz-no-print" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
        )}

        {receipt && (
          <>

                  {receipt.recipient_name || clubName} 様
                </p>
              </div>

              <div className="mb-6">
                <p className="font-display" style={{ fontSize: "24px" }}>{fmtJPY(receipt.total_jpy)} -</p>
                <p className="text-xs mt-1">但し {receipt.memo || "衣装代"} として</p>

                    <tr style={{ borderBottom: "1px solid #ccc" }}>
                      <th className="text-left py-1">品名</th>

                        <td className="py-1">{saleItemLabel(it)}</td>
                        <td className="text-right py-1">{fmtJPY(it.unit_price_jpy)}</td>

              )}

              <div className="text-xs space-y-1 mb-6" style={{ borderTop: "1px solid #ccc", paddingTop: "8px" }}>
                <div className="flex justify-between"><span>小計</span><span>{fmtJPY(receipt.subtotal_jpy)}</span></div>
                <div className="flex justify-between"><span>消費税(10%)</span><span>{fmtJPY(receipt.tax_jpy)}</span></div>

/* ---- 販売登録ページ本体 ---- */
function SalesPage() {
  const [sales, setSales] = useState(null); // null = 読み込み中
  const [clubs, setClubs] = useState([]);
  const [batches, setBatches] = useState([]);
  const [error, setError] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [editingSale, setEditingSale] = useState(null); // null=新規登録モード, obj=編集対象
  const [receiptSale, setReceiptSale] = useState(null); // 領収書プレビュー対象のsale(nullなら非表示)

  const loadAll = useCallback(async () => {
    setError(null);
    const [salesRes, clubsRes, batchesRes] = await Promise.all([
      supabase
        .from("sales")
        .select("id,transaction_date,host_club_id,host_id,total_amount_jpy,host_clubs(name),hosts(name),receipts!fk_sales_receipt_id(receipt_number),sale_items(id,product_id,unit_price_jpy,subtotal_jpy,profit_jpy,products(product_name,size,product_code,type,sample_purpose,category,product_image_url,product_url,size_options,purchase_amount_jpy,shipping_jpy,fee_jpy))")
        .order("transaction_date", { ascending: false }),
      supabase.from("host_clubs").select("id,name").order("name"),
      supabase.from("purchase_batches").select("id,purchase_date,per_item_shipping_cny,per_item_fee_cny").order("purchase_date", { ascending: false }),
    ]);
    // sales取得が失敗しても、同時に取得できたクラブ・ロットは反映する(販売登録モーダルを使えなくしないため)
    setClubs(clubsRes.data || []);
    setBatches(batchesRes.data || []);
    if (salesRes.error) { setError("販売記録の取得に失敗しました"); setSales([]); return; }
    setSales(salesRes.data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  /* 販売登録本体(新規): sales → sale_items → products状態更新 → receipts(採番込み) → sales.receipt_id を順に処理。
     編集: sales更新 → sale_itemsを一度全削除して作り直し → 商品ステータスは差分のみ反映 → receiptsは番号を変えずに金額等のみ更新。
     Supabase(PostgREST)からはクライアント側で複数テーブルにまたがるトランザクションを
     張れないため、途中失敗時はアラートで状況を伝え、手動確認を促す形にしている。 */
  const handleSaveSale = async (form) => {
    const totalInclJpy = form.items.reduce((sum, it) => sum + it.unit_price_jpy, 0); // 単価は税込のため、単純合計が税込合計になる
    const totals = calcReceiptTotals(totalInclJpy);

    if (form.id) {
      const saleId = form.id;

      const { data: oldItems, error: oldItemsErr } = await supabase.from("sale_items").select("product_id").eq("sale_id", saleId);
      if (oldItemsErr) { alert("既存の販売明細の取得に失敗しました"); return false; }
      const oldProductIds = new Set((oldItems || []).map((i) => i.product_id));
      const newProductIds = new Set(form.items.map((it) => it.product_id));

      const { error: saleErr } = await supabase
        .from("sales")
        .update({
          transaction_date: form.transaction_date,
          host_club_id: form.host_club_id,
          host_id: form.host_id,
          total_amount_jpy: totals.total,
        })
        .eq("id", saleId);
      if (saleErr) { alert("販売記録の更新に失敗しました"); return false; }

      const { error: delItemsErr } = await supabase.from("sale_items").delete().eq("sale_id", saleId);
      if (delItemsErr) { alert("既存明細の削除に失敗しました"); return false; }

      const itemRows = form.items.map((it) => ({
        sale_id: saleId,
        product_id: it.product_id,
        fulfillment_type: "サンプル現物販売",
        quantity: 1,
        unit_price_jpy: it.unit_price_jpy,
        subtotal_jpy: it.unit_price_jpy,
        profit_jpy: itemPretaxJpy(it.unit_price_jpy) - it.cost_jpy,
      }));
      const { error: itemsErr } = await supabase.from("sale_items").insert(itemRows);
      if (itemsErr) {
        alert("販売明細の再登録に失敗しました(sales行は更新済みです。手動でご確認ください)");
        return false;
      }

      // 商品ステータスは差分のみ反映(明細から外れた商品→未販売に復元、新たに加わった商品→販売済みに)
      const toRestore = [...oldProductIds].filter((id) => !newProductIds.has(id));
      const toMarkSold = [...newProductIds].filter((id) => !oldProductIds.has(id));
      if (toRestore.length > 0) await supabase.from("products").update({ status: "未販売" }).in("id", toRestore);
      if (toMarkSold.length > 0) await supabase.from("products").update({ status: "販売済み" }).in("id", toMarkSold);

      // 領収書は番号を変えず、金額等のみ更新(発行者情報も最新の固定値に揃える)
      const { error: receiptUpdErr } = await supabase
        .from("receipts")
        .update({
          issue_date: form.transaction_date,
          recipient_name: form.recipient_name,
          subtotal_jpy: totals.subtotal,
          tax_jpy: totals.tax,
          total_jpy: totals.total,
          issuer_info: ISSUER_INFO_DEFAULT,
        })
        .eq("sale_id", saleId);
      if (receiptUpdErr) {
        alert("領収書の更新に失敗しました(販売記録・明細は更新済みです)");
      }

      setModalOpen(false);
      setEditingSale(null);
      loadAll();
      return true;
    }

    const { data: saleRow, error: saleErr } = await supabase
      .from("sales")
      .insert({
        transaction_date: form.transaction_date,
        host_club_id: form.host_club_id,
        host_id: form.host_id,
        total_amount_jpy: totals.total,
      })
      .select("id")
      .single();
    if (saleErr || !saleRow) { alert("販売記録の登録に失敗しました"); return false; }
    const saleId = saleRow.id;

    const itemRows = form.items.map((it) => ({
      sale_id: saleId,
      product_id: it.product_id,
      fulfillment_type: "サンプル現物販売",
      quantity: 1,
      unit_price_jpy: it.unit_price_jpy,
      subtotal_jpy: it.unit_price_jpy,
      profit_jpy: itemPretaxJpy(it.unit_price_jpy) - it.cost_jpy,
    }));
    const { error: itemsErr } = await supabase.from("sale_items").insert(itemRows);
    if (itemsErr) {
      alert("販売明細の登録に失敗しました(sales行は作成済みです。手動でご確認・削除をお願いします)");
      return false;
    }

    const productIds = form.items.map((it) => it.product_id);
    const { error: statusErr } = await supabase.from("products").update({ status: "販売済み" }).in("id", productIds);
    if (statusErr) {
      alert("商品ステータスの更新に一部失敗した可能性があります。商品一覧をご確認ください。");
    }

    const receiptNumber = await generateReceiptNumber(form.transaction_date);
    const { data: receiptRow, error: receiptErr } = await supabase
      .from("receipts")
      .insert({
        receipt_number: receiptNumber,
        sale_id: saleId,
        issue_date: form.transaction_date,
        recipient_name: form.recipient_name,
        memo: "衣装代",
        subtotal_jpy: totals.subtotal,
        tax_jpy: totals.tax,
        total_jpy: totals.total,
        issuer_info: ISSUER_INFO_DEFAULT,
      })
      .select("id")
      .single();
    if (receiptErr || !receiptRow) {
      alert("領収書の作成に失敗しました(販売記録・明細は登録済みです)");
      setModalOpen(false);
      loadAll();
      return true;
    }

    await supabase.from("sales").update({ receipt_id: receiptRow.id }).eq("id", saleId);

    setModalOpen(false);
    loadAll();
    return true;
  };

  /* 削除: sale_items・receiptsはsales削除時にDB側のON DELETE CASCADEで自動削除される想定
     (SQL側で設定)。削除前に対象商品IDを取得しておき、削除後に「未販売」へ戻す。 */
  const handleDeleteSale = async (sale) => {
    if (!window.confirm("この販売記録を削除しますか?対象の商品は「未販売」に戻り、領収書も削除されます。")) return;
    const { data: saleItems, error: itemsErr } = await supabase.from("sale_items").select("product_id").eq("sale_id", sale.id);
    if (itemsErr) { alert("販売明細の取得に失敗しました"); return; }
    const { error: delErr } = await supabase.from("sales").delete().eq("id", sale.id);
    if (delErr) { alert("削除に失敗しました"); return; }
    const productIds = (saleItems || []).map((i) => i.product_id);
    if (productIds.length > 0) {
      await supabase.from("products").update({ status: "未販売" }).in("id", productIds);
    }
    loadAll();
  };

  const openEdit = (sale) => {
    setEditingSale(sale);
    setModalOpen(true);
  };

  const closeModal = () => {
    setModalOpen(false);
    setEditingSale(null);
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex items-center justify-between gap-3">
        <h2 className="font-display text-lg">販売登録</h2>
        <button onClick={() => setModalOpen(true)} className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
          + 新規販売登録
        </button>
      </div>

      {error && <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>}
      {sales === null && !error && <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>}

      {sales !== null && (
        sales.length === 0 ? (
          <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>販売記録がありません</p>
        ) : (
          <div className="space-y-2">
            {sales.map((s) => <SaleCard key={s.id} sale={s} onDelete={handleDeleteSale} onEdit={openEdit} onViewReceipt={setReceiptSale} />)}
          </div>
        )
      )}

      {modalOpen && (
        <SaleFormModal clubs={clubs} batches={batches} sale={editingSale} onClose={closeModal} onSave={handleSaveSale} />
      )}

      {receiptSale && (
        <ReceiptPreviewModal sale={receiptSale} onClose={() => setReceiptSale(null)} />
      )}
    </div>
  );
}

/* ============================================================
   カタログ(catalogs / catalog_items)

   ホスト向けに商品を選んで共有する「カタログ」機能。
   ・カタログ本体(catalogs)+ 選択商品(catalog_items, catalogs⇔productsの中間テーブル)
   ・掲載商品はステータス・種別を問わず個別に検索して選択する
   ・共有は share_token を含む公開URL(#/catalog/:token)経由を想定
     (ログイン不要の公開閲覧ページ自体は次の実装ステップで対応)

   積み残し:
     ・公開閲覧ページ(#/catalog/:token, 認証ゲートの外側で描画)
   ============================================================ */

/* ---- 共有トークン生成(公開URL用のランダム文字列) ---- */
function generateShareToken() {
  const bytes = new Uint8Array(16);
  window.crypto.getRandomValues(bytes);
  return Array.from(bytes, (b) => b.toString(16).padStart(2, "0")).join("");
}

/* ---- カタログ 登録・編集モーダル(商品はステータス・種別を問わず検索して個別選択) ---- */
function CatalogFormModal({ catalog, initialItems, onClose, onSave }) {
  const isNew = !catalog.id;
  const [name, setName] = useState(catalog.name || "");
  const [saving, setSaving] = useState(false);

  const [allProducts, setAllProducts] = useState(null); // null = 読み込み中
  const [productSearch, setProductSearch] = useState("");
  const [selectedProducts, setSelectedProducts] = useState(initialItems || []); // [{id,product_name,size,product_code,selling_price_jpy}]

  useEffect(() => {
    let cancelled = false;
    supabase
      .from("products")
      .select("id,product_name,size,product_code,selling_price_jpy,size_options")
      .order("product_name")
      .then(({ data, error }) => {
        if (cancelled) return;
        setAllProducts(error ? [] : (data || []));
      });
    return () => { cancelled = true; };
  }, []);

  const selectedIds = useMemo(() => new Set(selectedProducts.map((p) => p.id)), [selectedProducts]);

  const candidates = useMemo(() => {
    if (!allProducts) return [];
    const q = productSearch.trim().toLowerCase();
    return allProducts.filter((p) => {
      if (selectedIds.has(p.id)) return false;
      if (!q) return false; // 未入力時は候補を出さない(一覧が長くなりすぎるため)
      return (p.product_name || "").toLowerCase().includes(q) || (p.product_code || "").toLowerCase().includes(q);
    }).slice(0, 20);
  }, [allProducts, selectedIds, productSearch]);

  const addProduct = (p) => { setSelectedProducts((prev) => [...prev, p]); setProductSearch(""); };
  const removeProduct = (id) => setSelectedProducts((prev) => prev.filter((p) => p.id !== id));
  const moveProduct = (index, dir) => {
    setSelectedProducts((prev) => {
      const next = [...prev];
      const j = index + dir;
      if (j < 0 || j >= next.length) return prev;
      [next[index], next[j]] = [next[j], next[index]];
      return next;
    });
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!name.trim()) return;
    if (selectedProducts.length === 0) { alert("商品を1点以上選択してください"); return; }
    setSaving(true);
    await onSave({ id: catalog.id || null, name: name.trim(), productIds: selectedProducts.map((p) => p.id) });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 space-y-4 max-h-[90vh] overflow-y-auto"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">{isNew ? "新規カタログ" : "カタログを編集"}</h2>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>カタログ名(社内管理用)</label>
          <input
            type="text" value={name} onChange={(e) => setName(e.target.value)} required autoFocus
            placeholder="例: ○○クラブ向け 7月カタログ"
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>
            掲載商品{selectedProducts.length > 0 ? `(${selectedProducts.length}点)` : ""}
          </label>

          {selectedProducts.length > 0 && (
            <div className="space-y-1 mb-2">
              {selectedProducts.map((p, idx) => (
                <div
                  key={p.id}
                  className="flex items-center gap-2 text-xs px-2.5 py-1.5 rounded-lg"
                  style={{ background: "var(--mz-surface-hover)", color: "var(--mz-ink)" }}
                >
                  <span className="flex-1 min-w-0 truncate">{productLabel(p)}</span>
                  <button type="button" onClick={() => moveProduct(idx, -1)} disabled={idx === 0} className="disabled:opacity-30" style={{ color: "var(--mz-ink-muted)" }}>↑</button>
                  <button type="button" onClick={() => moveProduct(idx, 1)} disabled={idx === selectedProducts.length - 1} className="disabled:opacity-30" style={{ color: "var(--mz-ink-muted)" }}>↓</button>
                  <button
                    type="button" onClick={() => removeProduct(p.id)}
                    className="w-4 h-4 flex items-center justify-center rounded-full shrink-0"
                    style={{ color: "var(--mz-ink-muted)" }}
                  >
                    ×
                  </button>
                </div>
              ))}
            </div>
          )}

          <input
            type="text" value={productSearch} onChange={(e) => setProductSearch(e.target.value)}
            placeholder="商品名・商品番号で検索して追加...(ステータス問わず)"
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />

          {allProducts === null ? (
            <p className="text-xs mt-1.5" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : productSearch.trim() && candidates.length === 0 ? (
            <p className="text-xs mt-1.5" style={{ color: "var(--mz-ink-muted)" }}>該当する商品がありません</p>
          ) : candidates.length > 0 && (
            <div className="mt-1.5 rounded-lg max-h-40 overflow-y-auto" style={{ border: "1px solid var(--mz-border)" }}>
              {candidates.map((p) => (
                <button
                  key={p.id} type="button" onClick={() => addProduct(p)}
                  className="w-full text-left px-3 py-2 text-xs truncate"
                  style={{ borderBottom: "1px solid var(--mz-border)" }}
                >
                  {productLabel(p)}{p.selling_price_jpy != null ? ` / ${fmtJPY(p.selling_price_jpy)}` : ""}
                </button>
              ))}
            </div>
          )}
        </div>

        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>
            キャンセル
          </button>
          <button type="submit" disabled={saving} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "保存中..." : "保存"}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ---- 共有リンク・QRコード表示モーダル ---- */
function ShareCatalogModal({ catalog, onClose }) {
  const shareUrl = `${window.location.origin}${window.location.pathname}#/catalog/${catalog.share_token}`;
  const [copied, setCopied] = useState(false);

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(shareUrl);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {
      window.prompt("以下のURLをコピーしてください:", shareUrl);
    }
  };

  const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(shareUrl)}`;

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <div
        className="w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 space-y-4 text-center"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">共有リンク</h2>
        <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>

        </p>

        <div className="flex justify-center">
          <img src={qrSrc} alt="QRコード" className="rounded-lg" style={{ border: "1px solid var(--mz-border)", background: "#fff", padding: "8px" }} />
        </div>

        <div
          className="text-xs px-3 py-2.5 rounded-lg break-all text-left"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          {shareUrl}
        </div>

        <button
          onClick={handleCopy}
          className="w-full rounded-lg py-2.5 text-sm font-medium"
          style={{ background: "var(--mz-gold)", color: "#1a1710" }}
        >
          {copied ? "コピーしました" : "リンクをコピー"}

        <button onClick={onClose} className="w-full rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>
          閉じる
        </button>
      </div>
    </div>
  );
}

/* ---- カタログ一覧ページ本体 ---- */
function CatalogsPage() {
  const [catalogs, setCatalogs] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);
  const [modalCatalog, setModalCatalog] = useState(null); // null=閉じる, {}=新規, obj=編集
  const [modalInitialItems, setModalInitialItems] = useState([]);
  const [shareTarget, setShareTarget] = useState(null);

  const loadAll = useCallback(async () => {
    setError(null);
    const { data, error } = await supabase
      .from("catalogs")
      .select("id,name,share_token,created_at,catalog_items(count)")
      .order("created_at", { ascending: false });
    if (error) { setError("カタログの取得に失敗しました"); setCatalogs([]); return; }
    setCatalogs(data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const openNew = () => { setModalInitialItems([]); setModalCatalog({}); };

  const openEdit = async (catalog) => {
    const { data, error } = await supabase
      .from("catalog_items")
      .select("sort_order,products(id,product_name,size,product_code,selling_price_jpy,size_options)")
      .eq("catalog_id", catalog.id)
      .order("sort_order");
    if (error) { alert("掲載商品の取得に失敗しました"); return; }
    setModalInitialItems((data || []).map((row) => row.products).filter(Boolean));
    setModalCatalog(catalog);
  };

  const handleSave = async (form) => {
    if (form.id) {
      const { error: updErr } = await supabase.from("catalogs").update({ name: form.name }).eq("id", form.id);
      if (updErr) { alert("更新に失敗しました"); return; }
      const { error: delErr } = await supabase.from("catalog_items").delete().eq("catalog_id", form.id);
      if (delErr) { alert("掲載商品の更新に失敗しました(カタログ名は更新済みです)"); return; }
      const rows = form.productIds.map((productId, idx) => ({ catalog_id: form.id, product_id: productId, sort_order: idx }));
      const { error: insErr } = await supabase.from("catalog_items").insert(rows);
      if (insErr) { alert("掲載商品の登録に失敗しました"); return; }
    } else {
      const { data: inserted, error: insErr } = await supabase
        .from("catalogs")
        .insert({ name: form.name, share_token: generateShareToken() })
        .select("id")
        .single();
      if (insErr) { alert("登録に失敗しました"); return; }
      const rows = form.productIds.map((productId, idx) => ({ catalog_id: inserted.id, product_id: productId, sort_order: idx }));
      const { error: itemsErr } = await supabase.from("catalog_items").insert(rows);
      if (itemsErr) { alert("掲載商品の登録に失敗しました(カタログ本体は作成済みです)"); return; }
    }
    setModalCatalog(null);
    loadAll();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("このカタログを削除しますか?共有リンクも無効になります。")) return;
    const { error } = await supabase.from("catalogs").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex items-center justify-end">
        <button
          onClick={openNew}
          className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap"
          style={{ background: "var(--mz-gold)", color: "#1a1710" }}
        >
          + 新規カタログ
        </button>
      </div>

      {error && <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>}
      {catalogs === null && !error && <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>}
      {catalogs !== null && catalogs.length === 0 && !error && (
        <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>カタログが登録されていません</p>
      )}

      {catalogs !== null && catalogs.length > 0 && (
        <div className="space-y-2">
          {catalogs.map((c) => (
            <CatalogCard
              key={c.id}
              catalog={c}
              itemCount={c.catalog_items?.[0]?.count || 0}
              onEdit={openEdit}
              onDelete={handleDelete}
              onShare={setShareTarget}
            />
          ))}
        </div>
      )}

      {modalCatalog && (
        <CatalogFormModal catalog={modalCatalog} initialItems={modalInitialItems} onClose={() => setModalCatalog(null)} onSave={handleSave} />
      )}
      {shareTarget && (
        <ShareCatalogModal catalog={shareTarget} onClose={() => setShareTarget(null)} />
      )}
    </div>
  );
}

/* ============================================================
   経費(expenses)
   ・列構成はSupabase側の既存テーブルに合わせる(2026-07-09確認)
   ・選択肢定数(勘定科目/税区分/支払方法)は、必ずSupabase側のCHECK制約(pg_constraint)の
     実際の値と一致させること。2026-07-09時点で以下のSQLで確認した値を反映済み:
       select conname, pg_get_constraintdef(oid) from pg_constraint
       where conrelid = 'expenses'::regclass and contype = 'c';
   ・entry_method は "手動"(通常の入力) / "AI自動"(AIレシート読み込みからの下書きをそのまま登録した場合)を
     フォームの出所に応じて自動セットする(手動編集不可)。
   ============================================================ */
const EXPENSE_ACCOUNT_CATEGORY_OPTIONS = [
  "消耗品費", "旅費交通費", "通信費", "会議費", "接待交際費", "広告宣伝費",

];

/* ---- AIレシート読み込みカード ----
   ・画像/PDFをドラッグ&ドロップまたはクリックで選択
   ・アップロード(uploadExpenseReceiptFile)→AI自動抽出(extractExpenseInfoFromImage)を連続実行し、
     結果を親(ExpensesPage)へ渡して下の入力フォームに反映する。DBへの経費登録は行わない(あくまで下書き反映のみ)。 */
function AiReceiptReaderCard({ onExtracted }) {
  const [dragOver, setDragOver] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [error, setError] = useState(null);
  const inputRef = useRef(null);
  const busy = uploading || extracting;

  const handleFile = async (file) => {
    if (!file) return;
    setError(null);
    setUploading(true);
    const uploadRes = await uploadExpenseReceiptFile(file);
    setUploading(false);
    if (!uploadRes.ok) { setError(uploadRes.message); return; }

    setExtracting(true);
    try {
      const info = await extractExpenseInfoFromImage(uploadRes.url);
      onExtracted(mapExtractedExpenseInfo(info), uploadRes.url);
    } catch (err) {
      setError(err.message || "AI自動抽出に失敗しました");
    } finally {
      setExtracting(false);
    }
  };

  const handleFiles = (files) => {
    const file = files && files[0];
    if (file) handleFile(file);
  };

  return (
    <div className="rounded-xl p-4 space-y-3" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}>
      <h2 className="font-display text-base">AIレシート読み込み(画像・PDF→自動入力)</h2>
      <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
        レシート・領収書の画像またはPDFをアップロードすると、支払日・支払先・品目・金額・税区分・勘定科目・インボイス番号を自動で読み取り、下の入力欄に反映します。
      </p>

      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => {
          e.preventDefault();
          setDragOver(false);
          handleFiles(e.dataTransfer.files);
        }}
        onClick={() => !busy && inputRef.current && inputRef.current.click()}
        className="rounded-lg p-8 flex flex-col items-center justify-center gap-2 cursor-pointer transition-colors text-center"
        style={{
          border: `1.5px dashed ${dragOver ? "var(--mz-gold)" : "var(--mz-border)"}`,
          background: dragOver ? "var(--mz-surface-hover)" : "transparent",
        }}
      >
        <Icon name="file" className="w-8 h-8" style={{ color: "var(--mz-ink-muted)" }} />
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>
          {uploading ? "アップロード中..." : extracting ? "AIが読み取り中..." : "クリックまたはドラッグ&ドロップ"}
        </p>
        {!busy && <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>JPG / PNG / PDF対応</p>}
        <input
          ref={inputRef} type="file" accept="image/*,application/pdf" className="hidden"
          onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }}
        />
      </div>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}
    </div>
  );
}

/* ---- 経費 常設入力フォーム(モーダルではなくページ本体に常設。新規/編集を兼ねる) ----
   ・expense.idがあれば編集モード、なければ新規モード(AIレシート読み込みからの下書き反映時もid=nullの新規モード扱い)
   ・呼び出し側(ExpensesPage)が`key`propを変えることで、編集開始/AI反映/保存完了のたびに内部stateを再初期化する */
function ExpenseInlineForm({ expense, onSave, onCancel }) {
  const isNew = !expense.id;
  const [form, setForm] = useState({
    id: expense.id || null,
    payment_date: expense.payment_date || todayISO(),
    payee: expense.payee || "",
    payment_method: expense.payment_method || EXPENSE_PAYMENT_METHOD_OPTIONS[0],
    reimbursement_status: expense.reimbursement_status || "",
    invoice_number: expense.invoice_number || "",
    item_name: expense.item_name || "",
    account_category: expense.account_category || EXPENSE_ACCOUNT_CATEGORY_OPTIONS[0],
    tax_category: expense.tax_category || EXPENSE_TAX_CATEGORY_OPTIONS[0],
    amount_incl_tax: expense.amount_incl_tax != null ? String(expense.amount_incl_tax) : "",
    memo: expense.memo || "",
    receipt_file_url: expense.receipt_file_url || "",
    _aiOrigin: !!expense._aiOrigin, // AIレシート読み込みからの下書きをそのまま登録した場合はtrue(entry_method判定用)
  });
  const [saving, setSaving] = useState(false);
  const [uploadingReceipt, setUploadingReceipt] = useState(false);

  const handleReceiptFile = async (file) => {
    setUploadingReceipt(true);
    const res = await uploadExpenseReceiptFile(file);
    setUploadingReceipt(false);
    if (!res.ok) { alert(res.message); return; }
    setForm((f) => ({ ...f, receipt_file_url: res.url }));
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.payment_date || !form.payee.trim() || !form.amount_incl_tax) return;
    setSaving(true);
    await onSave(form);
    setSaving(false);
  };

  return (
    <form
      onSubmit={handleSubmit}
      className="rounded-xl p-4 md:p-5 space-y-4"
      style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
