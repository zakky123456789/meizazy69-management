      <div className="flex items-center justify-between flex-wrap gap-2">
        <h2 className="font-display text-lg">{isNew ? "経費入力" : "経費を編集"}</h2>
        {!isNew && (
          <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: "rgba(199,168,105,0.15)", color: "var(--mz-gold-soft)" }}>
            編集中
          </span>
        )}
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>支払日</label>
          <input
            type="date"
            value={form.payment_date}
            onChange={(e) => setForm((f) => ({ ...f, payment_date: e.target.value }))}
            required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
        </div>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>金額(税込)</label>
          <input
            type="number"
            inputMode="numeric"
            min="0"
            value={form.amount_incl_tax}
            onChange={(e) => setForm((f) => ({ ...f, amount_incl_tax: e.target.value }))}
            required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
        </div>
      </div>

      <div>
        <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>支払先</label>
        <input
          type="text"
          value={form.payee}
          onChange={(e) => setForm((f) => ({ ...f, payee: e.target.value }))}
          required
          className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
        />
      </div>

      <div>
        <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>品目・内容(任意)</label>
        <input
          type="text"
          value={form.item_name}
          onChange={(e) => setForm((f) => ({ ...f, item_name: e.target.value }))}
          className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
        />
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>勘定科目</label>
          <select
            value={form.account_category}
            onChange={(e) => setForm((f) => ({ ...f, account_category: e.target.value }))}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            {EXPENSE_ACCOUNT_CATEGORY_OPTIONS.map((c) => <option key={c} value={c}>{c}</option>)}

        </div>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>税区分</label>
          <select
            value={form.tax_category}
            onChange={(e) => setForm((f) => ({ ...f, tax_category: e.target.value }))}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            {EXPENSE_TAX_CATEGORY_OPTIONS.map((c) => <option key={c} value={c}>{c}</option>)}

      </div>

      <div className="grid grid-cols-2 gap-3">

          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>支払方法</label>

            onChange={(e) => setForm((f) => ({ ...f, payment_method: e.target.value }))}

            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            {EXPENSE_PAYMENT_METHOD_OPTIONS.map((c) => <option key={c} value={c}>{c}</option>)}

        </div>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>立替精算状況(任意)</label>
          <select
            value={form.reimbursement_status}
            onChange={(e) => setForm((f) => ({ ...f, reimbursement_status: e.target.value }))}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            <option value="">(立替なし)</option>
            {EXPENSE_REIMBURSEMENT_STATUS_OPTIONS.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
      </div>

      <div>
        <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>請求書番号(任意)</label>
        <input
          type="text"
          value={form.invoice_number}
          onChange={(e) => setForm((f) => ({ ...f, invoice_number: e.target.value }))}
          className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}

      <div>

          previewUrl={form.receipt_file_url}
          uploading={uploadingReceipt}
          onFile={handleReceiptFile}
          accept="image/*,application/pdf"

            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}

              className="text-xs mt-1 inline-block"
              style={{ color: "var(--mz-gold-soft)" }}

      <div>
        <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>メモ(任意)</label>

    </form>
  );

/* ---- 経費ページ本体 ----
   ・AIレシート読み込みカード → 常設入力フォーム(新規/編集兼用) → フィルタ・合計 → 一覧、の縦並び構成
   ・モーダルは使用しない(2026-07-09改修: 常設フォーム方式に変更) */
function ExpensesPage() {
  const [expenses, setExpenses] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);
  const [filterMonth, setFilterMonth] = useState("all"); // "all" | "YYYY-MM"
  const [filterCategory, setFilterCategory] = useState("all");
  const [formExpense, setFormExpense] = useState({}); // {}=新規(空), idを持つオブジェクト=編集, AI抽出結果(id無し)=新規への下書き反映
  const [formKey, setFormKey] = useState(0); // 変更するたびにExpenseInlineFormを再マウントし、内部stateを再初期化する

  const loadExpenses = useCallback(async () => {
    setError(null);
    const { data, error } = await supabase
      .from("expenses")
      .select("id,payment_date,payee,payment_method,reimbursement_status,invoice_number,item_name,account_category,tax_category,amount_incl_tax,memo,receipt_file_url,entry_method,created_at")
      .order("payment_date", { ascending: false });
    if (error) {
      setError("経費データの取得に失敗しました");
      setExpenses([]);
    } else {
      setExpenses(data || []);
    }
  }, []);

  useEffect(() => { loadExpenses(); }, [loadExpenses]);

  const monthOptions = useMemo(() => {
    if (!expenses) return [];
    const set = new Set(expenses.map((e) => (e.payment_date || "").slice(0, 7)).filter(Boolean));
    return Array.from(set).sort((a, b) => b.localeCompare(a));
  }, [expenses]);

  const filteredExpenses = useMemo(() => {
    if (!expenses) return [];
    return expenses.filter((e) => {
      if (filterMonth !== "all" && !(e.payment_date || "").startsWith(filterMonth)) return false;
      if (filterCategory !== "all" && e.account_category !== filterCategory) return false;
      return true;
    });
  }, [expenses, filterMonth, filterCategory]);

  const totalAmount = useMemo(
    () => filteredExpenses.reduce((sum, e) => sum + (Number(e.amount_incl_tax) || 0), 0),
    [filteredExpenses]
  );

  const resetForm = () => {
    setFormExpense({});
    setFormKey((k) => k + 1);
  };

  const handleEdit = (expense) => {
    setFormExpense(expense);
    setFormKey((k) => k + 1);
  };

  /* ---- AIレシート読み込みカードからの反映。id無しの新規下書きとしてフォームへ流し込む ---- */
  const handleExtracted = (mappedFields, uploadedUrl) => {
    setFormExpense({ ...mappedFields, receipt_file_url: uploadedUrl, _aiOrigin: true });
    setFormKey((k) => k + 1);
  };

  const handleSave = async (form) => {
    const patch = {
      payment_date: form.payment_date,
      payee: form.payee.trim(),
      payment_method: form.payment_method,
      reimbursement_status: form.reimbursement_status || null,
      invoice_number: form.invoice_number.trim() || null,
      item_name: form.item_name.trim() || null,
      account_category: form.account_category,
      tax_category: form.tax_category,
      amount_incl_tax: Number(form.amount_incl_tax),
      memo: form.memo.trim() || null,
      receipt_file_url: form.receipt_file_url.trim() || null,
    };

    if (form.id) {
      const { error } = await supabase.from("expenses").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const entryMethod = form._aiOrigin ? "AI自動" : "手動";
      const { error } = await supabase.from("expenses").insert({ ...patch, entry_method: entryMethod });
      if (error) { alert("登録に失敗しました"); return; }
    }
    resetForm();
    loadExpenses();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("この経費を削除しますか?")) return;
    const { error } = await supabase.from("expenses").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadExpenses();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <h1 className="font-display text-xl">経費入力</h1>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      <AiReceiptReaderCard onExtracted={handleExtracted} />

      <ExpenseInlineForm key={formKey} expense={formExpense} onSave={handleSave} onCancel={resetForm} />

     (このステップでは「歩合率設定」タブのみ実装。他はプレースホルダー)
   ============================================================ */
const CONTRACTOR_TABS = [

/* ---- 指定日時点でその歩合率が有効かどうか(dateStr省略時は今日) ---- */
function isCommissionRateActive(rate, dateStr) {
  const d = dateStr || todayISO();
  if (rate.effective_from && rate.effective_from > d) return false;
  if (rate.effective_to && rate.effective_to < d) return false;
  return true;
}

/* ---- 担当者・対象月(YYYY-MM)から適用すべき歩合率を1件返す(外注費請求書ページで使用予定) ----
   対象月の1日を基準日として判定し、複数該当する場合は適用開始日が最も新しいものを優先する。 */
function getApplicableCommissionRate(staffId, targetMonth, rates) {
  const refDate = `${targetMonth}-01`;
  const candidates = (rates || []).filter(
    (r) => r.staff_id === staffId && isCommissionRateActive(r, refDate)
  );
  if (candidates.length === 0) return null;
  return candidates.sort((a, b) => (b.effective_from || "").localeCompare(a.effective_from || ""))[0];
}

/* ---- 外注費請求書ページ本体(タブ構成) ---- */
function ContractorInvoicesPage() {
  const [tab, setTab] = useState("rates");
  const [staffList, setStaffList] = useState([]);
  const [rates, setRates] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);
  const [modalRate, setModalRate] = useState(null); // null=閉じる, {}=新規, obj=編集

  const [monthlyProfits, setMonthlyProfits] = useState(null); // null = 読み込み中
  const [profitError, setProfitError] = useState(null);
  const [calcTargetMonth, setCalcTargetMonth] = useState(todayISO().slice(0, 7));
  const [calculating, setCalculating] = useState(false);

  const [invoices, setInvoices] = useState(null); // null = 読み込み中
  const [invoiceError, setInvoiceError] = useState(null);
  const [issueStaffId, setIssueStaffId] = useState("");
  const [issueTargetMonth, setIssueTargetMonth] = useState(todayISO().slice(0, 7));
  const [invoicePreview, setInvoicePreview] = useState(null); // null=未計算, {error}=計算不可, {monthlyProfit,rate,amount}=計算済み
  const [previewing, setPreviewing] = useState(false);
  const [issuing, setIssuing] = useState(false);

  const loadStaff = useCallback(async () => {
    const { data, error } = await supabase.from("staff").select("id,name,is_active").order("name");
    if (!error) setStaffList(data || []);
  }, []);

  const loadRates = useCallback(async () => {
    setError(null);
    const { data, error } = await supabase
      .from("commission_rates")
      .select("id,staff_id,rate_percent,effective_from,effective_to,created_at")
      .order("effective_from", { ascending: false });
    if (error) {
      setError("歩合率データの取得に失敗しました");
      setRates([]);
    } else {
      setRates(data || []);
    }
  }, []);

  const loadMonthlyProfits = useCallback(async () => {
    setProfitError(null);
    const { data, error } = await supabase
      .from("monthly_profits")
      .select("id,target_month,total_sales_jpy,total_purchase_cost_jpy,total_general_expenses_jpy,gross_profit_jpy,calculated_at")
      .order("target_month", { ascending: false });
    if (error) {
      setProfitError("月次損益データの取得に失敗しました");
      setMonthlyProfits([]);
    } else {
      setMonthlyProfits(data || []);
    }
  }, []);

  const loadInvoices = useCallback(async () => {
    setInvoiceError(null);
    const { data, error } = await supabase
      .from("contractor_invoices")
      .select("id,invoice_number,staff_id,target_month,monthly_profit_id,rate_percent,amount_jpy,issue_date,status,staff(name)")
      .order("target_month", { ascending: false })
      .order("created_at", { ascending: false });
    if (error) {
      setInvoiceError("請求書データの取得に失敗しました");
      setInvoices([]);
    } else {
      setInvoices(data || []);
    }
  }, []);

  useEffect(() => { loadStaff(); loadRates(); loadMonthlyProfits(); loadInvoices(); }, [loadStaff, loadRates, loadMonthlyProfits, loadInvoices]);

  const handleSaveRate = async (form) => {
    const patch = {
      staff_id: form.staff_id,
      rate_percent: Number(form.rate_percent),
      effective_from: form.effective_from,
      effective_to: form.effective_to || null,
    };

    if (form.id) {
      const { error } = await supabase.from("commission_rates").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      // 同一担当者で「現在も有効」(effective_to=null)な既存の歩合率があれば、
      // 新しい適用開始日の前日で自動的に終了させる(歩合率の履歴が途切れないようにするため)
      const openRate = (rates || []).find((r) => r.staff_id === form.staff_id && !r.effective_to);
      if (openRate) {
        const prevDay = addDaysISO(form.effective_from, -1);
        if (prevDay >= openRate.effective_from) {
          const { error: closeError } = await supabase
            .from("commission_rates")
            .update({ effective_to: prevDay })
            .eq("id", openRate.id);
          if (closeError) { alert("既存の歩合率の終了処理に失敗しました"); return; }
        }
      }
      const { error } = await supabase.from("commission_rates").insert(patch);
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalRate(null);
    loadRates();
  };

  const handleDeleteRate = async (id) => {
    if (!window.confirm("この歩合率を削除しますか?")) return;
    const { error } = await supabase.from("commission_rates").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadRates();
  };

  /* ---- 月次損益の集計(売上合計・仕入原価合計・一般経費合計を算出し、既存行があれば再計算=update、なければinsert) ---- */
  const handleCalculateMonthlyProfit = async () => {
    if (!calcTargetMonth) return;
    setCalculating(true);
    setProfitError(null);
    try {
      const monthStart = `${calcTargetMonth}-01`;
      const monthEndExclusive = nextMonthFirstDay(calcTargetMonth);

      // 売上合計(税込)と、その月に売れた商品の原価合計(sale_items→productsの確定JPY原価)
      const { data: salesData, error: salesError } = await supabase
        .from("sales")
        .select("id,transaction_date,total_amount_jpy,sale_items(product_id,products(purchase_amount_jpy,shipping_jpy,fee_jpy))")
        .gte("transaction_date", monthStart)
        .lt("transaction_date", monthEndExclusive);
      if (salesError) { setProfitError("売上データの取得に失敗しました"); setCalculating(false); return; }

      let totalSales = 0;
      let totalPurchaseCost = 0;
      (salesData || []).forEach((s) => {
        totalSales += Number(s.total_amount_jpy) || 0;
        (s.sale_items || []).forEach((it) => {
          const p = it.products || {};
          totalPurchaseCost += (Number(p.purchase_amount_jpy) || 0) + (Number(p.shipping_jpy) || 0) + (Number(p.fee_jpy) || 0);
        });
      });

      // 一般経費合計
      const { data: expenseData, error: expenseError } = await supabase
        .from("expenses")
        .select("amount_incl_tax,payment_date")
        .gte("payment_date", monthStart)
        .lt("payment_date", monthEndExclusive);
      if (expenseError) { setProfitError("経費データの取得に失敗しました"); setCalculating(false); return; }

      const totalExpenses = (expenseData || []).reduce((sum, e) => sum + (Number(e.amount_incl_tax) || 0), 0);
      const grossProfit = totalSales - totalPurchaseCost - totalExpenses;

      const patch = {
        target_month: calcTargetMonth,
        total_sales_jpy: totalSales,
        total_purchase_cost_jpy: totalPurchaseCost,
        total_general_expenses_jpy: totalExpenses,
        gross_profit_jpy: grossProfit,
        calculated_at: new Date().toISOString(),
      };

      const { data: existing, error: existingError } = await supabase
        .from("monthly_profits")
        .select("id")
        .eq("target_month", calcTargetMonth)
        .maybeSingle();
      if (existingError) { setProfitError("既存の月次損益データの確認に失敗しました"); setCalculating(false); return; }

      if (existing) {
        const { error: updateError } = await supabase.from("monthly_profits").update(patch).eq("id", existing.id);
        if (updateError) { setProfitError("月次損益の更新に失敗しました"); setCalculating(false); return; }
      } else {
        const { error: insertError } = await supabase.from("monthly_profits").insert(patch);
        if (insertError) { setProfitError("月次損益の登録に失敗しました"); setCalculating(false); return; }
      }

      await loadMonthlyProfits();
    } finally {
      setCalculating(false);
    }
  };

  /* ---- 請求内容の計算(実際のinsertは行わず、プレビューをstateに保持するだけ) ----
     1) 同一担当者・同一対象月の請求書が既に発行済みでないか確認(重複発行防止)
     2) monthly_profitsから対象月の粗利益を取得(未集計ならエラー)
     3) getApplicableCommissionRateで適用歩合率を取得(未設定ならエラー)
     4) 請求金額 = 粗利益 × 歩合率 ÷ 100(円未満四捨五入) */
  const handlePreviewInvoice = async () => {
    if (!issueStaffId || !issueTargetMonth) return;
    setPreviewing(true);
    setInvoicePreview(null);
    try {
      const { data: existing, error: existingError } = await supabase
        .from("contractor_invoices")
        .select("id,invoice_number")
        .eq("staff_id", issueStaffId)
        .eq("target_month", issueTargetMonth)
        .maybeSingle();
      if (existingError) { setInvoicePreview({ error: "既存請求書の確認に失敗しました" }); return; }
      if (existing) {
        setInvoicePreview({ error: `この担当者・対象月の請求書は発行済みです(${existing.invoice_number})。再発行する場合は下の一覧から削除してから行ってください。` });
        return;
      }

      const { data: mp, error: mpError } = await supabase
        .from("monthly_profits")
        .select("id,target_month,gross_profit_jpy")
        .eq("target_month", issueTargetMonth)
        .maybeSingle();
      if (mpError) { setInvoicePreview({ error: "月次損益データの取得に失敗しました" }); return; }
      if (!mp) { setInvoicePreview({ error: "この対象月の月次損益がまだ集計されていません。先に「月次損益」タブで集計してください。" }); return; }

      const rate = getApplicableCommissionRate(issueStaffId, issueTargetMonth, rates || []);
      if (!rate) { setInvoicePreview({ error: "この担当者・対象月に適用できる歩合率が設定されていません。先に「歩合率設定」タブで登録してください。" }); return; }

      const amount = Math.round((Number(mp.gross_profit_jpy) || 0) * (Number(rate.rate_percent) || 0) / 100);
      setInvoicePreview({ monthlyProfit: mp, rate, amount });
    } finally {
      setPreviewing(false);
    }
  };

  /* ---- プレビュー内容でcontractor_invoicesにinsertし、実際に発行する ---- */
  const handleIssueInvoice = async () => {
    if (!invoicePreview || invoicePreview.error) return;
    setIssuing(true);
    try {
      const issueDate = todayISO();
      const invoiceNumber = await generateInvoiceNumber(issueDate);
      const { error } = await supabase.from("contractor_invoices").insert({
        invoice_number: invoiceNumber,
        staff_id: issueStaffId,
        target_month: issueTargetMonth,
        monthly_profit_id: invoicePreview.monthlyProfit.id,
        rate_percent: invoicePreview.rate.rate_percent,
        amount_jpy: invoicePreview.amount,
        issue_date: issueDate,
        status: "未払い",
      });
      if (error) { alert("請求書の発行に失敗しました"); return; }
      setInvoicePreview(null);
      setIssueStaffId("");
      await loadInvoices();
    } finally {
      setIssuing(false);
    }
  };

  const handleUpdateInvoiceStatus = async (id, status) => {
    const { error } = await supabase.from("contractor_invoices").update({ status }).eq("id", id);
    if (error) { alert("ステータスの更新に失敗しました"); return; }
    loadInvoices();
  };

  const handleDeleteInvoice = async (id) => {
    if (!window.confirm("この請求書を削除しますか?")) return;
    const { error } = await supabase.from("contractor_invoices").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadInvoices();
  };

  const handleDeleteMonthlyProfit = async (id) => {
    if (!window.confirm("この月次損益を削除しますか?")) return;
    const { error } = await supabase.from("monthly_profits").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadMonthlyProfits();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex gap-2 flex-wrap">
        {CONTRACTOR_TABS.map((t) => (
          <button
            key={t.key}
            onClick={() => setTab(t.key)}
            className="text-sm px-3.5 py-2 rounded-lg"
            style={{
              background: tab === t.key ? "var(--mz-gold)" : "transparent",
              color: tab === t.key ? "#1a1710" : "var(--mz-ink-muted)",
              border: "1px solid var(--mz-border)",
            }}
          >
            {t.label}
          </button>
        ))}
      </div>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      {tab === "rates" && (
        <>
          <div className="flex justify-end">
            <button
              onClick={() => setModalRate({})}
              className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap"
              style={{ background: "var(--mz-gold)", color: "#1a1710" }}
            >
              + 新規歩合率
            </button>
          </div>
          {rates === null ? (
            <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : (
            <CommissionRateList rates={rates} staffList={staffList} onEdit={setModalRate} onDelete={handleDeleteRate} />
          )}
        </>
      )}

      {tab === "profits" && (
        <>
          {profitError && (
            <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{profitError}</p>
          )}
          <div
            className="rounded-xl p-4 flex flex-wrap items-end gap-3"
            style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
          >
            <div>
              <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>対象月</label>
              <input
                type="month"
                value={calcTargetMonth}
                onChange={(e) => setCalcTargetMonth(e.target.value)}
                className="rounded-lg px-3 py-2 text-sm bg-transparent"
                style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
              />
            </div>
            <button
              onClick={handleCalculateMonthlyProfit}
              disabled={calculating || !calcTargetMonth}
              className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap disabled:opacity-60"
              style={{ background: "var(--mz-gold)", color: "#1a1710" }}
            >
              {calculating ? "集計中..." : "この月を集計する"}
            </button>
            <p className="text-xs w-full" style={{ color: "var(--mz-ink-muted)" }}>
              売上合計(税込)・その月に売れた商品の仕入原価合計・一般経費合計から粗利益を自動算出します。既にこの対象月のデータがあれば上書き(再集計)されます。
            </p>
          </div>

          {monthlyProfits === null ? (
            <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : (
            <MonthlyProfitList profits={monthlyProfits} onDelete={handleDeleteMonthlyProfit} />
          )}
        </>
      )}

      {tab === "invoices" && (
        <>
          {invoiceError && (
            <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{invoiceError}</p>
          )}

          <div
            className="rounded-xl p-4 space-y-3"
            style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
          >
            <div className="flex flex-wrap items-end gap-3">
              <div>
                <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>担当者</label>
                <select
                  value={issueStaffId}
                  onChange={(e) => { setIssueStaffId(e.target.value); setInvoicePreview(null); }}
                  className="rounded-lg px-3 py-2 text-sm bg-transparent"
                  style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
                >
                  <option value="">選択してください</option>
                  {staffList.map((s) => (
                    <option key={s.id} value={s.id}>{s.name}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>対象月</label>
                <input
                  type="month"
                  value={issueTargetMonth}
                  onChange={(e) => { setIssueTargetMonth(e.target.value); setInvoicePreview(null); }}
                  className="rounded-lg px-3 py-2 text-sm bg-transparent"
                  style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
                />
              </div>
              <button
                onClick={handlePreviewInvoice}
                disabled={previewing || !issueStaffId || !issueTargetMonth}
                className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap disabled:opacity-60"
                style={{ background: "var(--mz-gold)", color: "#1a1710" }}
              >
                {previewing ? "確認中..." : "請求内容を計算する"}
              </button>
            </div>

            {invoicePreview && invoicePreview.error && (
              <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{invoicePreview.error}</p>
            )}

            {invoicePreview && !invoicePreview.error && (
              <div
                className="rounded-lg p-3 flex flex-wrap items-center justify-between gap-3"
                style={{ border: "1px solid var(--mz-border)" }}
              >
                <div className="text-xs space-y-1" style={{ color: "var(--mz-ink-muted)" }}>
                  <p>対象月の粗利益: {fmtJPY(invoicePreview.monthlyProfit.gross_profit_jpy)}</p>
                  <p>適用歩合率: {invoicePreview.rate.rate_percent}%</p>
                  <p className="text-sm font-display" style={{ color: "var(--mz-ink)" }}>
                    請求金額: {fmtJPY(invoicePreview.amount)}
                  </p>
                </div>
                <button
                  onClick={handleIssueInvoice}
                  disabled={issuing}
                  className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap disabled:opacity-60"
                  style={{ background: "var(--mz-gold)", color: "#1a1710" }}
                >
                  {issuing ? "発行中..." : "この内容で発行する"}
                </button>
              </div>
            )}
          </div>

          {invoices === null ? (
            <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : (
            <ContractorInvoiceList invoices={invoices} onUpdateStatus={handleUpdateInvoiceStatus} onDelete={handleDeleteInvoice} />
          )}
        </>
      )}

      {modalRate && (
        <CommissionRateFormModal
          rate={modalRate}
          staffList={staffList}
          onClose={() => setModalRate(null)}
          onSave={handleSaveRate}
        />
      )}
    </div>
  );
}

/* ============================================================
   ルート → ページ の対応
   ============================================================ */
const ROUTE_MAP = {
  "#/dashboard": "dashboard",
  "#/host-clubs": "host_clubs",
  "#/products": "products",
  "#/sales": "sales",
  "#/catalogs": "catalogs",
  "#/tasks": "tasks",
  "#/wallet": "wallet_charges",
  "#/expenses": "expenses",
  "#/contractor-invoices": "contractor_invoices",
};

/* ============================================================
   アプリ本体シェル(認証後の画面)
   ============================================================ */
function AppShell({ staffName, onSwitchStaff, onSignOut }) {
  const hash = useHashRoute();
  const [drawerOpen, setDrawerOpen] = useState(false);

  // "#/host-clubs/xxx" のような詳細ルートも "host_clubs" としてサイドバーをハイライト
  const activeKey = hash.startsWith("#/host-clubs")
    ? "host_clubs"
    : (ROUTE_MAP[hash] || "dashboard");
  const activeItem = FLAT_NAV.find((i) => i.key === activeKey) || FLAT_NAV[0];

  // ルート遷移時にモバイルドロワーを自動で閉じる
  useEffect(() => { setDrawerOpen(false); }, [hash]);

  return (
    <div className="min-h-screen flex" style={{ background: "var(--mz-bg)" }}>
      {/* デスクトップ用固定サイドバー */}
      <aside
        className="hidden md:flex md:flex-col w-64 shrink-0 fixed inset-y-0 left-0"
        style={{ background: "var(--mz-surface)", borderRight: "1px solid var(--mz-border)" }}
      >
        <SidebarContent activeKey={activeKey} onNavigate={() => {}} />
      </aside>

      {/* モバイル用ドロワー */}
      <MobileDrawer
        open={drawerOpen}
        onClose={() => setDrawerOpen(false)}
        activeKey={activeKey}
        onNavigate={() => {}}
      />

      {/* メインエリア */}
      <div className="flex-1 md:ml-64 flex flex-col min-w-0">
        <TopBar
          title={activeItem.label}
          onMenuClick={() => setDrawerOpen(true)}
          staffName={staffName}
          onSwitchStaff={onSwitchStaff}
          onSignOut={onSignOut}
        />
        <main className="flex-1">
          {activeKey === "tasks" ? (
            <TasksPage />
          ) : activeKey === "host_clubs" ? (
            <HostClubsRouter hash={hash} />
          ) : activeKey === "wallet_charges" ? (
            <WalletPage />
          ) : activeKey === "products" ? (
            <ProductsPage />
          ) : activeKey === "sales" ? (
            <SalesPage />
          ) : activeKey === "catalogs" ? (
            <CatalogsPage />
          ) : activeKey === "dashboard" ? (
            <DashboardPage />
          ) : activeKey === "expenses" ? (
            <ExpensesPage />
          ) : activeKey === "contractor_invoices" ? (
            <ContractorInvoicesPage />
          ) : (
            <PlaceholderPage item={activeItem} />
          )}
        </main>
      </div>
    </div>
  );
}

/* ============================================================
   カタログ 公開閲覧ページ(#/catalog/:token)
   ログイン不要。認証ゲートの外側(App関数の最初)で描画する。
   get_public_catalog RPC(SECURITY DEFINER)経由でのみデータ取得し、
   catalogs/products テーブルへの直接アクセスは行わない。
   ============================================================ */
function PublicCatalogItemCard({ item }) {
  return (
    <div
      className="rounded-xl overflow-hidden flex flex-col"
      style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
    >
      <div className="aspect-square w-full flex items-center justify-center" style={{ background: "var(--mz-surface-hover)" }}>
        {item.product_image_url ? (
          <img src={item.product_image_url} alt={item.product_name || ""} className="w-full h-full object-cover" />
        ) : (
          <Icon name="tag" className="w-8 h-8" style={{ color: "var(--mz-ink-muted)" }} />
        )}
      </div>
      <div className="p-3 space-y-1">
        <p className="font-display text-sm truncate">{item.product_name || "(名称未設定)"}</p>
        <div className="flex items-center justify-between text-xs gap-2" style={{ color: "var(--mz-ink-muted)" }}>
          <span className="truncate">{item.product_code ? `No.${item.product_code}` : ""}</span>
          {item.selling_price_jpy != null && (
            <span className="font-medium shrink-0" style={{ color: "var(--mz-gold-soft)" }}>{fmtJPY(item.selling_price_jpy)}</span>
          )}
        </div>
        {item.size_options && (
          <p className="text-xs truncate" style={{ color: "var(--mz-ink-muted)" }}>サイズ展開: {item.size_options}</p>
        )}
        {item.category && (
          <p className="text-xs truncate" style={{ color: "var(--mz-ink-muted)" }}>{item.category}</p>
        )}
      </div>
    </div>
  );
}

function PublicCatalogPage({ token }) {
  const [items, setItems] = useState(null); // null = 読み込み中
  const [catalogName, setCatalogName] = useState("");
  const [notFound, setNotFound] = useState(false);

  useEffect(() => {
    let cancelled = false;
    supabase.rpc("get_public_catalog", { p_token: token }).then(({ data, error }) => {
      if (cancelled) return;
      if (error || !data || data.length === 0) {
        setItems([]);
        setNotFound(true);
        return;
      }
      setCatalogName(data[0].catalog_name || "");
      setItems(data);
    });
    return () => { cancelled = true; };
  }, [token]);

  return (
    <div className="min-h-screen" style={{ background: "var(--mz-bg)", color: "var(--mz-ink)" }}>
      <header className="px-4 md:px-6 py-6 text-center" style={{ borderBottom: "1px solid var(--mz-border)" }}>
        <p className="text-xs tracking-widest" style={{ color: "var(--mz-ink-muted)" }}>IMPORT PRIME</p>
        <h1 className="font-display text-xl mt-1">{catalogName || "カタログ"}</h1>
      </header>

      <main className="px-4 md:px-6 py-6 max-w-5xl mx-auto w-full">
        {items === null && (
          <p className="text-sm text-center py-16" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
        )}
        {items !== null && notFound && (
          <p className="text-sm text-center py-16" style={{ color: "var(--mz-ink-muted)" }}>
            このカタログは見つかりませんでした。リンクをもう一度ご確認ください。
          </p>
        )}
        {items !== null && !notFound && items.length === 0 && (
          <p className="text-sm text-center py-16" style={{ color: "var(--mz-ink-muted)" }}>掲載商品がありません</p>
        )}
        {items !== null && items.length > 0 && (
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
            {items.map((item) => <PublicCatalogItemCard key={item.product_id} item={item} />)}
          </div>
        )}
      </main>
    </div>
  );
}

/* ============================================================
   ルートコンポーネント(認証ゲート)
   ============================================================ */
function App() {
  const hash = useHashRoute();

  // カタログ公開閲覧ページ(#/catalog/:token)は認証ゲートの外側で描画する
  if (hash.startsWith("#/catalog/")) {
    const token = hash.slice("#/catalog/".length);
    return <PublicCatalogPage token={token} />;
  }

  const { session, submitPasscode, signOut } = useAuth();
  const [staff, setStaff] = useState(undefined); // undefined = 未確認, null = 未選択

  // セッションが確定したら、ブラウザ保存済みの担当者選択を読み込む
  // (これにより2回目以降のアクセスでは合言葉・名前選択が自動スキップされる)
  useEffect(() => {
    if (session) {
      try {
        const raw = localStorage.getItem(STAFF_STORAGE_KEY);
        setStaff(raw ? JSON.parse(raw) : null);
      } catch {
        setStaff(null);
      }
    } else if (session === null) {
      setStaff(null);
    }
  }, [session]);

  const loading = session === undefined || (session && staff === undefined);
  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: "var(--mz-bg)", color: "var(--mz-ink-muted)" }}>
        読み込み中...
      </div>
    );
  }

  // 1. 合言葉が未入力(セッションなし)
  if (!session) {
    return <PasscodeScreen onSubmit={submitPasscode} />;
  }

  // 2. セッションはあるが担当者未選択(初回、または「担当者を変更」直後)
  if (!staff) {
    return <WhoAreYouScreen onSelect={setStaff} />;
  }

  // 3. 通常利用
  return (
    <AppShell
      staffName={staff.name}
      onSwitchStaff={() => {
        localStorage.removeItem(STAFF_STORAGE_KEY);
        setStaff(null);
      }}
      onSignOut={signOut}
    />
  );
}

const rootEl = document.getElementById("root");
if (!rootEl._meizazy69Rendered) {
  rootEl._meizazy69Rendered = true;
  const root = ReactDOM.createRoot(rootEl);
  root.render(<App />);
}
})();
</script>
