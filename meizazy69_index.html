/* ============================================================
   簡易ハッシュルーター

function useHashRoute() {
  const [hash, setHash] = useState(window.location.hash || "#/dashboard");

  useEffect(() => {
    const onHashChange = () => setHash(window.location.hash || "#/dashboard");
    window.addEventListener("hashchange", onHashChange);
    if (!window.location.hash) window.location.hash = "#/dashboard";
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  return hash;
}

/* ============================================================
   認証設定(合言葉方式)
   ・メールアドレス登録は行わない
   ・合言葉が正しければ Supabase Anonymous Auth でセッション作成
   ・匿名認証ユーザーも Postgres 上は authenticated ロールになるため
     既存のRLSポリシー(to authenticated)がそのまま適用される
   ============================================================ */
const PASSCODE = "12251225";
const STAFF_STORAGE_KEY = "meizazy69_staff";

/* ============================================================
   認証フック
   ============================================================ */
function useAuth() {
  const [session, setSession] = useState(undefined); // undefined = 判定中, null = 未認証

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => {
      setSession(sess ?? null);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const submitPasscode = useCallback(async (input) => {
    if (input !== PASSCODE) {
      return { ok: false, message: "合言葉が違います" };
    }
    const { error } = await supabase.auth.signInAnonymously();
    if (error) {
      return { ok: false, message: "サインインに失敗しました。時間をおいて再度お試しください。" };
    }
    return { ok: true };
  }, []);

  const signOut = useCallback(async () => {
    localStorage.removeItem(STAFF_STORAGE_KEY);
    await supabase.auth.signOut();
  }, []);

  return { session, submitPasscode, signOut };
}

function WhoAreYouScreen({ onSelect }) {
  const [staffList, setStaffList] = useState(null); // null = 読み込み中
  const [loadError, setLoadError] = useState(null);
  const [selectingId, setSelectingId] = useState(null);

  useEffect(() => {
    let cancelled = false;
    supabase
      .from("staff")
      .select("id,name")
      .eq("is_active", true)
      .order("name")
      .then(({ data, error }) => {
        if (cancelled) return;
        if (error) setLoadError("担当者一覧の取得に失敗しました");
        else setStaffList(data || []);
      });
    return () => { cancelled = true; };
  }, []);

  const handleSelect = (staff) => {
    setSelectingId(staff.id);
    localStorage.setItem(STAFF_STORAGE_KEY, JSON.stringify(staff));
    onSelect(staff);
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4"

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

function staffColor(staffId, staffList) {
  const idx = staffList.findIndex((s) => s.id === staffId);
  if (idx === -1) return "var(--mz-ink-muted)";
  return STAFF_COLORS[idx % STAFF_COLORS.length];
}

/* ---- カレンダー表示 ---- */
function TaskCalendar({ tasks, staffList, onEdit }) {
  const [monthDate, setMonthDate] = useState(() => {
    const d = new Date();
    d.setDate(1);
    return d;
  });

  const year = monthDate.getFullYear();
  const month = monthDate.getMonth(); // 0-indexed
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const dateKey = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  const tasksByDate = useMemo(() => {
    const map = {};
    tasks.forEach((t) => {
      // 未完了かつ予定日があるもの → 「これからやること」
      if (t.status !== "完了" && t.scheduled_date) {
        (map[t.scheduled_date] = map[t.scheduled_date] || { scheduled: [], completed: [] }).scheduled.push(t);
      }
      // 完了日があるもの → 「やったこと」
      if (t.completed_date) {
        (map[t.completed_date] = map[t.completed_date] || { scheduled: [], completed: [] }).completed.push(t);
      }
    });
    return map;
  }, [tasks]);

  const monthLabel = `${year}年${month + 1}月`;
  const todayKey = todayISO();

  return (
    <div className="rounded-xl p-3 md:p-4" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}>
      <div className="flex items-center justify-between mb-3">
        <button
          onClick={() => setMonthDate(new Date(year, month - 1, 1))}
          className="px-3 py-1.5 rounded-lg text-sm"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          ‹ 前月
        </button>
        <h3 className="font-display text-base">{monthLabel}</h3>
        <button
          onClick={() => setMonthDate(new Date(year, month + 1, 1))}
          className="px-3 py-1.5 rounded-lg text-sm"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          翌月 ›
        </button>
      </div>

      <div className="grid grid-cols-7 gap-1 text-center text-[11px] mb-1" style={{ color: "var(--mz-ink-muted)" }}>
        {["日", "月", "火", "水", "木", "金", "土"].map((w) => <div key={w}>{w}</div>)}
      </div>

      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={`empty-${i}`} />;
          const key = dateKey(d);
          const entry = tasksByDate[key];
          const isToday = key === todayKey;
          return (
            <div
              key={key}
              className="rounded-lg p-1 min-h-[64px] md:min-h-[84px] text-left align-top overflow-hidden"
              style={{ background: isToday ? "var(--mz-surface-hover)" : "transparent", border: "1px solid var(--mz-border)" }}
            >
              <div className="text-[11px] mb-0.5" style={{ color: isToday ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)" }}>
                {d}
              </div>
              <div className="space-y-0.5">
                {entry && entry.scheduled.map((t) => (
                  <button
                    key={"s" + t.id}
                    onClick={() => onEdit(t)}
                    className="w-full text-left text-[10px] px-1 py-0.5 rounded truncate block"
                    style={{ background: staffColor(t.staff_id, staffList) + "33", color: staffColor(t.staff_id, staffList) }}
                    title={t.content}
                  >
                    ▷{t.content}
                  </button>
                ))}
                {entry && entry.completed.map((t) => (
                  <button
                    key={"c" + t.id}
                    onClick={() => onEdit(t)}
                    className="w-full text-left text-[10px] px-1 py-0.5 rounded truncate block line-through"
                    style={{ background: "#1f3a2a", color: "#8fd6ab" }}
                    title={t.content}
                  >
                    ✓{t.content}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex items-center gap-4 mt-3 text-[11px] flex-wrap" style={{ color: "var(--mz-ink-muted)" }}>
        <span>▷ これからやること(予定)</span>
        <span>✓ やったこと(完了)</span>
      </div>
    </div>
  );
}

/* ---- タスク管理ページ本体 ---- */
function TasksPage() {
  const [staffList, setStaffList] = useState([]);
  const [tasks, setTasks] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);
  const [view, setView] = useState("list"); // "list" | "calendar"
  const [filterStaff, setFilterStaff] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [modalTask, setModalTask] = useState(null); // null=閉じる, {}=新規, obj=編集

  const loadStaff = useCallback(async () => {
    const { data, error } = await supabase.from("staff").select("id,name,is_active").order("name");
    if (!error) setStaffList(data || []);
  }, []);

  const loadTasks = useCallback(async () => {
    setError(null);
    const { data, error } = await supabase
      .from("tasks")
      .select("id,staff_id,content,status,scheduled_date,completed_date,result,created_at")
      .order("created_at", { ascending: false });
    if (error) {
      setError("タスクの取得に失敗しました");
      setTasks([]);
    } else {
      setTasks(data || []);
    }
  }, []);

  useEffect(() => {
    loadStaff();
    loadTasks();
  }, [loadStaff, loadTasks]);

  const staffMap = useMemo(() => {
    const m = {};
    staffList.forEach((s) => { m[s.id] = s; });
    return m;
  }, [staffList]);

  const filteredTasks = useMemo(() => {
    if (!tasks) return [];
    return tasks.filter((t) => {
      if (filterStaff !== "all" && t.staff_id !== filterStaff) return false;
      if (filterStatus !== "all" && t.status !== filterStatus) return false;
      return true;
    });
  }, [tasks, filterStaff, filterStatus]);

  // 保存(新規・編集共通)
  // completed_date は「statusが完了に変わったタイミングでシステムが自動セット」する設計のため、
  // ここで status に応じて自動的に completed_date を確定/解除する。
  const handleSave = async (form) => {
    const patch = {
      staff_id: form.staff_id,
      content: form.content.trim(),
      status: form.status,
      scheduled_date: form.scheduled_date || null,
      result: form.result ? form.result.trim() : null,
      completed_date: form.status === "完了" ? (form.completed_date || todayISO()) : null,
    };

    if (form.id) {
      const { error } = await supabase.from("tasks").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("tasks").insert({ ...patch, created_at: new Date().toISOString() });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalTask(null);
    loadTasks();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("このタスクを削除しますか?")) return;
    const { error } = await supabase.from("tasks").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadTasks();
  };

  // 一覧上でのステータスのクイック変更(completed_dateも同時に自動制御)
  const handleQuickStatus = async (task, newStatus) => {
    const patch = {
      status: newStatus,
      completed_date: newStatus === "完了" ? todayISO() : null,
    };
    const { error } = await supabase.from("tasks").update(patch).eq("id", task.id);
    if (!error) loadTasks();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="flex flex-wrap gap-2">
          <select
            value={filterStaff}
            onChange={(e) => setFilterStaff(e.target.value)}
            className="rounded-lg px-3 py-2 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            <option value="all">担当者: すべて</option>
            {staffList.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select
            value={filterStatus}
            onChange={(e) => setFilterStatus(e.target.value)}
            className="rounded-lg px-3 py-2 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            <option value="all">状態: すべて</option>
            {STATUS_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        <div className="flex items-center gap-2">
          <div className="rounded-lg overflow-hidden flex text-sm" style={{ border: "1px solid var(--mz-border)" }}>
            <button
              onClick={() => setView("list")}
              className="px-3 py-2"
              style={{
                background: view === "list" ? "var(--mz-surface-hover)" : "transparent",
                color: view === "list" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)",
              }}
            >
              一覧
            </button>
            <button
              onClick={() => setView("calendar")}
              className="px-3 py-2"
              style={{
                background: view === "calendar" ? "var(--mz-surface-hover)" : "transparent",
                color: view === "calendar" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)",
              }}
            >
              カレンダー
            </button>
          </div>
          <button
            onClick={() => setModalTask({})}
            className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap"
            style={{ background: "var(--mz-gold)", color: "#1a1710" }}
          >
            + 新規タスク
          </button>
        </div>
      </div>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      {tasks === null && !error && (
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      )}

      {tasks !== null && view === "list" && (
        <TaskList
          tasks={filteredTasks}
          staffMap={staffMap}
          staffList={staffList}
          onEdit={(t) => setModalTask(t)}
          onDelete={handleDelete}
          onQuickStatus={handleQuickStatus}
        />
      )}

      {tasks !== null && view === "calendar" && (
        <TaskCalendar tasks={filteredTasks} staffList={staffList} onEdit={(t) => setModalTask(t)} />
      )}

      {modalTask && (
        <TaskFormModal
          task={modalTask}
          staffList={staffList}
          onClose={() => setModalTask(null)}
          onSave={handleSave}
        />
      )}
    </div>
  );
}

/* ---- ホストクラブ一覧ページ本体 ---- */
function HostClubsPage() {
  const [clubs, setClubs] = useState(null); // null = 読み込み中
  const [hosts, setHosts] = useState([]);
  const [visits, setVisits] = useState([]);
  const [error, setError] = useState(null);
  const [modalClub, setModalClub] = useState(null); // null=閉じる, {}=新規, obj=編集

  const loadAll = useCallback(async () => {
    setError(null);
    const [clubsRes, hostsRes, visitsRes] = await Promise.all([
      supabase.from("host_clubs").select("id,name").order("name"),
      supabase.from("hosts").select("id,host_club_id"),
      supabase.from("visits").select("id,host_club_id,next_visit_date"),
    ]);
    if (clubsRes.error) {
      setError("ホストクラブの取得に失敗しました");
      setClubs([]);
      return;
    }
    setClubs(clubsRes.data || []);
    setHosts(hostsRes.data || []);
    setVisits(visitsRes.data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // クラブごとの所属ホスト数を集計
  const hostCountByClub = useMemo(() => {
    const m = {};
    hosts.forEach((h) => { m[h.host_club_id] = (m[h.host_club_id] || 0) + 1; });
    return m;
  }, [hosts]);

  // クラブごとの「次回訪問予定」を集計
  // ルール: 今日以降で最も近い予定日を優先。今後の予定が無ければ、直近で最も新しい予定日を表示。
  const nextVisitByClub = useMemo(() => {
    const today = todayISO();
    const m = {};
    visits.forEach((v) => {
      if (!v.next_visit_date) return;
      const cur = m[v.host_club_id];
      if (!cur) { m[v.host_club_id] = v.next_visit_date; return; }
      const candidateFuture = v.next_visit_date >= today;
      const currentFuture = cur >= today;
      let useCandidate;
      if (candidateFuture && currentFuture) useCandidate = v.next_visit_date < cur;
      else if (candidateFuture && !currentFuture) useCandidate = true;
      else if (!candidateFuture && currentFuture) useCandidate = false;
      else useCandidate = v.next_visit_date > cur;
      if (useCandidate) m[v.host_club_id] = v.next_visit_date;
    });
    return m;
  }, [visits]);

  const handleSave = async (form) => {
    if (form.id) {
      const { error } = await supabase.from("host_clubs").update({ name: form.name }).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("host_clubs").insert({ name: form.name });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalClub(null);
    loadAll();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("このホストクラブを削除しますか?所属ホスト・訪問記録が残っている場合は削除できません。")) return;
    const { error } = await supabase.from("host_clubs").delete().eq("id", id);
    if (error) { alert("削除に失敗しました(所属ホストや訪問記録が残っている可能性があります)"); return; }
    loadAll();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex items-center justify-end">
        <button
          onClick={() => setModalClub({})}
          className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap"
          style={{ background: "var(--mz-gold)", color: "#1a1710" }}
        >
          + 新規ホストクラブ
        </button>
      </div>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      {clubs === null && !error && (
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      )}

      {clubs !== null && clubs.length === 0 && !error && (
        <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>
          ホストクラブが登録されていません
        </p>
      )}

      {clubs !== null && clubs.length > 0 && (
        <div className="space-y-2">
          {clubs.map((c) => (
            <HostClubCard
              key={c.id}
              club={c}
              hostCount={hostCountByClub[c.id] || 0}
              nextVisitDate={nextVisitByClub[c.id]}
              onOpen={(id) => { window.location.hash = `#/host-clubs/${id}`; }}
              onEdit={(club) => setModalClub(club)}
              onDelete={handleDelete}
            />
          ))}
        </div>
      )}

      {modalClub && (
        <HostClubFormModal club={modalClub} onClose={() => setModalClub(null)} onSave={handleSave} />
      )}
    </div>
  );
}

/* ---- ホストクラブ詳細ページ本体 ---- */
function HostClubDetailPage({ clubId }) {
  const [club, setClub] = useState(null); // null=読込中, false=見つからない
  const [hosts, setHosts] = useState([]);
  const [visits, setVisits] = useState([]);
  const [error, setError] = useState(null);
  const [modalHost, setModalHost] = useState(null);
  const [modalVisit, setModalVisit] = useState(null);

  const loadAll = useCallback(async () => {
    setError(null);
    const [clubRes, hostsRes, visitsRes] = await Promise.all([
      supabase.from("host_clubs").select("id,name").eq("id", clubId).maybeSingle(),
      supabase.from("hosts").select("id,host_club_id,name").eq("host_club_id", clubId).order("name"),
      supabase.from("visits").select("id,host_club_id,visit_date,next_visit_date").eq("host_club_id", clubId).order("visit_date", { ascending: false }),
    ]);
    if (clubRes.error || !clubRes.data) {
      setError("ホストクラブが見つかりません");
      setClub(false);
      return;
    }
    setClub(clubRes.data);
    setHosts(hostsRes.data || []);
    setVisits(visitsRes.data || []);
  }, [clubId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // 次回訪問予定: 今日以降で最も近い予定日を優先。無ければ直近で最も新しい予定日。
  const nextVisit = useMemo(() => {
    const today = todayISO();
    const upcoming = visits.filter((v) => v.next_visit_date && v.next_visit_date >= today);
    if (upcoming.length > 0) {
      return upcoming.reduce((a, b) => (a.next_visit_date < b.next_visit_date ? a : b)).next_visit_date;
    }
    const withDate = visits.filter((v) => v.next_visit_date);
    if (withDate.length > 0) {
      return withDate.reduce((a, b) => (a.next_visit_date > b.next_visit_date ? a : b)).next_visit_date;
    }
    return null;
  }, [visits]);

  const handleSaveHost = async (form) => {
    if (form.id) {
      const { error } = await supabase.from("hosts").update({ name: form.name }).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("hosts").insert({ name: form.name, host_club_id: clubId });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalHost(null);
    loadAll();
  };

  const handleDeleteHost = async (id) => {
    if (!window.confirm("このホストを削除しますか?")) return;
    const { error } = await supabase.from("hosts").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  const handleSaveVisit = async (form) => {
    const patch = { visit_date: form.visit_date, next_visit_date: form.next_visit_date };
    if (form.id) {
      const { error } = await supabase.from("visits").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("visits").insert({ ...patch, host_club_id: clubId });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalVisit(null);
    loadAll();
  };

  const handleDeleteVisit = async (id) => {
    if (!window.confirm("この訪問記録を削除しますか?")) return;
    const { error } = await supabase.from("visits").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  if (club === null && !error) {
    return (
      <div className="px-4 md:px-6 py-8 max-w-5xl mx-auto w-full">
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      </div>
    );
  }

  if (error) {
    return (
      <div className="px-4 md:px-6 py-8 max-w-5xl mx-auto w-full space-y-4">
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
        <a href="#/host-clubs" className="text-sm" style={{ color: "var(--mz-gold-soft)" }}>← ホストクラブ一覧へ戻る</a>
      </div>
    );
  }

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-6">
      <div>
        <a href="#/host-clubs" className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>← ホストクラブ一覧</a>
        <h2 className="font-display text-xl mt-1">{club.name}</h2>
      </div>

      {/* 次回訪問予定ハイライト */}
      <div className="rounded-xl p-4" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-gold)" }}>
        <p className="text-xs mb-1" style={{ color: "var(--mz-ink-muted)" }}>次回訪問予定</p>
        <p className="font-display text-lg" style={{ color: "var(--mz-gold-soft)" }}>{nextVisit || "未定"}</p>
      </div>

      {/* 所属ホスト一覧 */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-base">所属ホスト</h3>
          <button
            onClick={() => setModalHost({})}
            className="text-xs px-3 py-1.5 rounded-lg"
            style={{ background: "var(--mz-gold)", color: "#1a1710" }}
          >
            + ホスト追加
          </button>
        </div>
        {hosts.length === 0 ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>登録されたホストがいません</p>
        ) : (
          <div className="space-y-2">
            {hosts.map((h) => (
              <div
                key={h.id}
                className="rounded-xl p-3 flex items-center justify-between gap-3"
                style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
              >
                <span className="text-sm truncate">{h.name}</span>
                <div className="flex items-center gap-2 shrink-0">
                  <button onClick={() => setModalHost(h)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>編集</button>
                  <button onClick={() => handleDeleteHost(h.id)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}>削除</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {/* 訪問記録一覧(手入力) */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-base">訪問記録</h3>
          <button
            onClick={() => setModalVisit({})}
            className="text-xs px-3 py-1.5 rounded-lg"
            style={{ background: "var(--mz-gold)", color: "#1a1710" }}
          >
            + 訪問記録追加
          </button>
        </div>
        {visits.length === 0 ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>訪問記録がありません</p>
        ) : (
          <div className="space-y-2">
            {visits.map((v) => (
              <div
                key={v.id}
                className="rounded-xl p-3 flex items-center justify-between gap-3 flex-wrap"
                style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
              >
                <div className="text-sm">
                  <span>訪問日: {v.visit_date}</span>
                  {v.next_visit_date && (
                    <span className="ml-3" style={{ color: "var(--mz-ink-muted)" }}>次回予定: {v.next_visit_date}</span>
                  )}
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  <button onClick={() => setModalVisit(v)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>編集</button>
                  <button onClick={() => handleDeleteVisit(v.id)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}>削除</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {/* 取引履歴(salesテーブル実装後に自動集計で接続予定) */}
      <section className="space-y-3">
        <h3 className="font-display text-base">取引履歴</h3>
        <div
          className="rounded-xl p-4 text-sm"
          style={{ background: "var(--mz-surface)", border: "1px dashed var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          販売登録機能(sales)の実装後、このクラブの取引履歴が日付順に自動集計表示されます。
        </div>
      </section>

      {modalHost && <HostFormModal host={modalHost} onClose={() => setModalHost(null)} onSave={handleSaveHost} />}
      {modalVisit && <VisitFormModal visit={modalVisit} onClose={() => setModalVisit(null)} onSave={handleSaveVisit} />}
    </div>
  );
}

/* ============================================================
   転送業者チャージ管理(FIFOウォレット)
   ・agent_charges: チャージ台帳(いつ・いくらCNYをいくらJPYでチャージしたか)
   ・agent_charge_consumptions: 消化履歴(商品仕入・国際送料・その他手数料)
   ・消化(FIFO)は本来 products 登録時(仕入れ確定タイミング)に発生する。
     products 未実装の現段階では、以下を用意する:
       1) チャージ台帳のCRUD + 残高サマリー表示
       2) 消化履歴の一覧表示(products実装後に自動的に増えていく)
       3) consumeWalletFIFO() … products 実装時に呼び出すFIFO消化ヘルパー
   ============================================================ */

function fmtCNY(n) {
  const v = Number(n) || 0;
  return `¥${v.toLocaleString("ja-JP", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} CNY`;
}
function fmtJPY(n) {
  const v = Math.round(Number(n) || 0);
  return `¥${v.toLocaleString("ja-JP")}`;
}

/* ---- FIFO消化ヘルパー(products実装時にここから呼び出す想定) ----
   使い方(将来のproducts登録処理からのイメージ):
     const res = await consumeWalletFIFO({ cnyAmount: 123.45, usageType: "商品仕入", productId });
     if (!res.ok) { alert(res.message); return; } // 残高不足などのアラート表示
   ------------------------------------------------------------ */
async function consumeWalletFIFO({ cnyAmount, usageType, productId }) {
  if (!cnyAmount || cnyAmount <= 0) return { ok: true, consumptions: [] };

  const { data: charges, error } = await supabase
    .from("agent_charges")
    .select("id,charge_date,exchange_rate,remaining_cny")
    .gt("remaining_cny", 0)
    .order("charge_date", { ascending: true })
    .order("id", { ascending: true });

  if (error) return { ok: false, message: "チャージ情報の取得に失敗しました" };

  let remainingToConsume = cnyAmount;
  const consumptionsToInsert = [];
  const chargeUpdates = [];

  for (const charge of charges || []) {
    if (remainingToConsume <= 0) break;
    const consumeFromThis = Math.min(charge.remaining_cny, remainingToConsume);
    if (consumeFromThis <= 0) continue;
    consumptionsToInsert.push({
      charge_id: charge.id,
      consumed_cny: consumeFromThis,
      applied_rate: charge.exchange_rate,
      consumed_jpy: consumeFromThis * charge.exchange_rate,
      usage_type: usageType,
      product_id: productId,
    });
    chargeUpdates.push({ id: charge.id, newRemaining: charge.remaining_cny - consumeFromThis });
    remainingToConsume -= consumeFromThis;
  }

  // 残高不足(FIFOで全チャージを使っても消化額に届かない場合)
  if (remainingToConsume > 0.0001) {
    return {
      ok: false,
      message: `ウォレット残高が不足しています(不足額: ${remainingToConsume.toFixed(2)} CNY)`,
      shortfall: remainingToConsume,
    };
  }

  const { error: insertError } = await supabase.from("agent_charge_consumptions").insert(consumptionsToInsert);
  if (insertError) return { ok: false, message: "消化履歴の登録に失敗しました" };

  for (const u of chargeUpdates) {
    const { error: updError } = await supabase.from("agent_charges").update({ remaining_cny: u.newRemaining }).eq("id", u.id);
    if (updError) return { ok: false, message: "残高の更新に失敗しました(一部消化済みの可能性があります。チャージ一覧をご確認ください)" };
  }

  return { ok: true, consumptions: consumptionsToInsert };
}

/* ---- FIFO消化の払い戻し(商品削除時に、消化していたCNYをチャージ残高へ戻す) ----
   ・登録直後の商品は必ず消化済み扱いになるため、単純な登録ミスの取り消しでも
     削除できるようにするための仕組み(本当の返品は ReturnFormModal を使う)
   ------------------------------------------------------------ */
async function reverseWalletConsumption(productId) {
  const { data: rows, error } = await supabase
    .from("agent_charge_consumptions")
    .select("id,charge_id,consumed_cny")
    .eq("product_id", productId);
  if (error) return { ok: false, message: "消化履歴の取得に失敗しました" };
  if (!rows || rows.length === 0) return { ok: true };

  for (const row of rows) {
    const { data: charge, error: chargeErr } = await supabase
      .from("agent_charges")
      .select("remaining_cny")
      .eq("id", row.charge_id)
      .maybeSingle();
    if (chargeErr || !charge) continue;
    const newRemaining = (Number(charge.remaining_cny) || 0) + (Number(row.consumed_cny) || 0);
    const { error: updErr } = await supabase.from("agent_charges").update({ remaining_cny: newRemaining }).eq("id", row.charge_id);
    if (updErr) return { ok: false, message: "残高の払い戻しに失敗しました" };
  }

  const { error: delErr } = await supabase.from("agent_charge_consumptions").delete().eq("product_id", productId);
  if (delErr) return { ok: false, message: "消化履歴の削除に失敗しました" };

  return { ok: true };
}

/* ---- チャージ サマリーカード ---- */
function WalletSummary({ charges }) {
  const totals = useMemo(() => {
    let cnyTotal = 0, jpyTotal = 0, remainingCny = 0, remainingJpyValue = 0;
    charges.forEach((c) => {
      cnyTotal += Number(c.charge_amount_cny) || 0;
      jpyTotal += Number(c.charge_amount_jpy) || 0;
      remainingCny += Number(c.remaining_cny) || 0;
      remainingJpyValue += (Number(c.remaining_cny) || 0) * (Number(c.exchange_rate) || 0);
    });
    return { cnyTotal, jpyTotal, remainingCny, consumedCny: cnyTotal - remainingCny, remainingJpyValue };
  }, [charges]);

  const cards = [
    { label: "累計チャージ額", value: fmtCNY(totals.cnyTotal), sub: fmtJPY(totals.jpyTotal) + " 支払済" },
    { label: "消化済み(仕入等)", value: fmtCNY(totals.consumedCny) },
    { label: "未消化残高", value: fmtCNY(totals.remainingCny), sub: fmtJPY(totals.remainingJpyValue) + " 相当", highlight: true },
  ];

  return (
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
      {cards.map((c) => (

/* ============================================================
   サンプル・在庫登録(purchase_batches / products)+ Vision自動抽出
   ・無在庫販売が基本のため、「products登録=仕入れ確定」のタイミングで
     ウォレット(agent_charges)からFIFO消化する(前セッションで実装した
     consumeWalletFIFO を利用)
   ・返品(return_date / return_source_product_id)はコスト0円・ウォレット
     消化なしの「在庫再登録」として扱う
   ・Vision自動抽出は、クライアントにAPIキーを置けないため
     Supabase Edge Function(extract-product-info)経由で呼び出す想定。
     Edge Function本体は別ファイルとして用意し、デプロイが必要。
   ============================================================ */

const PRODUCT_IMAGE_BUCKET = "product-images";
const PRODUCT_IMAGE_MAX_DIMENSION = 1280; // 長辺の最大px(Storage無料枠節約のため)
const PRODUCT_IMAGE_JPEG_QUALITY = 0.72;
const PRODUCT_STATUS_OPTIONS = ["未販売", "販売済み", "返品済み"];

/* ---- 画像リサイズ+JPEG圧縮(ブラウザ側、Canvas使用) ----
   ・Supabase Storageは無料枠の容量が限られるため、保存前に必ず圧縮する
   ・長辺 PRODUCT_IMAGE_MAX_DIMENSION px 以内 / JPEG品質 PRODUCT_IMAGE_JPEG_QUALITY に変換
   ・副次効果として、Edge FunctionでのBase64変換・Claude Vision API送信も軽量化される */
function compressImageFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.onload = () => {
        let { width, height } = img;
        const maxDim = PRODUCT_IMAGE_MAX_DIMENSION;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(
          (blob) => { if (blob) resolve(blob); else reject(new Error("画像の圧縮に失敗しました")); },
          "image/jpeg",
          PRODUCT_IMAGE_JPEG_QUALITY
        );
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---- 画像アップロード(Supabase Storage) ----
   ・アップロード前に必ず圧縮し、常に .jpg として保存する */
async function uploadProductImage(file) {
  let blob;
  try {
    blob = await compressImageFile(file);
  } catch (err) {
    return { ok: false, message: err.message || "画像の圧縮に失敗しました" };
  }
  const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
  const { error: uploadError } = await supabase.storage.from(PRODUCT_IMAGE_BUCKET).upload(path, blob, {
    upsert: false,
    contentType: "image/jpeg",
  });
  if (uploadError) return { ok: false, message: "画像のアップロードに失敗しました" };
  const { data } = supabase.storage.from(PRODUCT_IMAGE_BUCKET).getPublicUrl(path);
  return { ok: true, url: data.publicUrl };
}

/* ---- Vision自動抽出(Edge Function呼び出し) ----
   デプロイ必要: supabase/functions/extract-product-info
   レスポンス想定: { product_name: string, category: string, price_cny: number } */
async function extractProductInfoFromImage(imageUrl) {
  const resp = await fetch(`${SUPABASE_URL}/functions/v1/extract-product-info`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      apikey: SUPABASE_ANON_KEY,
    },
    body: JSON.stringify({ imageUrl }),
  });
  if (!resp.ok) throw new Error("AI自動抽出に失敗しました(Edge Functionが未デプロイの可能性があります)");
  return resp.json();
}

/* ---- ウォレット残高の事前チェック(不足時は登録前に中断するため) ---- */
async function getWalletRemainingTotal() {
  const { data, error } = await supabase.from("agent_charges").select("remaining_cny").gt("remaining_cny", 0);
  if (error) return { ok: false };
  const total = (data || []).reduce((sum, c) => sum + (Number(c.remaining_cny) || 0), 0);
  return { ok: true, total };
}

/* ---- 仕入れ確定(products登録)時の共通処理 ----
   ウォレットからCNY合計をFIFO消化し、消化結果(JPY換算額)をproductsレコードに反映する。
   ProductsPage(通常の仕入れ登録)・SalesPage(販売画面からの新規仕入対応)の両方から呼び出す共通ヘルパー。 */
async function consumeAndFinalizeProductCost(productId, { purchaseCny, shippingCny, feeCny }) {
  const results = { purchase_amount_jpy: 0, shipping_jpy: 0, fee_jpy: 0 };
  const steps = [
    { cny: purchaseCny, type: "商品仕入", key: "purchase_amount_jpy" },
    { cny: shippingCny, type: "国際送料", key: "shipping_jpy" },
    { cny: feeCny, type: "その他手数料", key: "fee_jpy" },
  ];
  for (const step of steps) {
    if (!step.cny || step.cny <= 0) continue;
    const res = await consumeWalletFIFO({ cnyAmount: step.cny, usageType: step.type, productId });
    if (!res.ok) return { ok: false, message: res.message };
    results[step.key] = res.consumptions.reduce((sum, c) => sum + (Number(c.consumed_jpy) || 0), 0);
  }
  const { error } = await supabase.from("products").update(results).eq("id", productId);
  if (error) return { ok: false, message: "コストのJPY確定処理に失敗しました" };
  return { ok: true };
}

  const shipping = parseFloat(totalShippingCny) || 0;
  const fee = parseFloat(totalFeeCny) || 0;
  const perItemShipping = items > 0 ? shipping / items : 0;
  const perItemFee = items > 0 ? fee / items : 0;

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!purchaseDate || items <= 0) return;
    setSaving(true);
    await onSave({
      purchase_date: purchaseDate,
      total_items: items,
      total_shipping_cny: shipping,
      total_fee_cny: fee,
      per_item_shipping_cny: perItemShipping,
      per_item_fee_cny: perItemFee,
    });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 space-y-4"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">新規仕入れロット</h2>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>仕入れ日</label>
          <input type="date" value={purchaseDate} onChange={(e) => setPurchaseDate(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>この便でまとめて仕入れる点数</label>
          <input type="number" min="1" step="1" value={totalItems} onChange={(e) => setTotalItems(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>国際送料合計(CNY)</label>
            <input type="number" min="0" step="0.01" value={totalShippingCny} onChange={(e) => setTotalShippingCny(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>その他手数料合計(CNY)</label>
            <input type="number" min="0" step="0.01" value={totalFeeCny} onChange={(e) => setTotalFeeCny(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
        </div>
        <div className="rounded-lg px-3 py-2 text-xs" style={{ background: "var(--mz-surface-hover)", color: "var(--mz-ink-muted)" }}>
          1点あたり自動按分: 送料 {perItemShipping.toFixed(2)} CNY ・ 手数料 {perItemFee.toFixed(2)} CNY
        </div>
        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>キャンセル</button>
          <button type="submit" disabled={saving} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "保存中..." : "作成"}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ---- 画像アップロード用ドロップゾーン(ドラッグ&ドロップ + クリック選択の両対応) ---- */
function ImageDropZone({ label, previewUrl, uploading, onFile, helperText }) {
  const [dragOver, setDragOver] = useState(false);
  const inputRef = useRef(null);

  const handleFiles = (files) => {
    const file = files && files[0];
    if (file) onFile(file);
  };

  return (
    <div>
      <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>{label}</label>
      <div
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => {
          e.preventDefault();
          setDragOver(false);
          handleFiles(e.dataTransfer.files);
        }}
        onClick={() => inputRef.current && inputRef.current.click()}
        className="rounded-lg p-3 flex items-center gap-3 cursor-pointer transition-colors"
        style={{
          border: `1.5px dashed ${dragOver ? "var(--mz-gold)" : "var(--mz-border)"}`,
          background: dragOver ? "var(--mz-surface-hover)" : "transparent",
        }}
      >
        {previewUrl ? (
          <img src={previewUrl} alt="" className="w-14 h-14 rounded-lg object-cover shrink-0" style={{ border: "1px solid var(--mz-border)" }} />
        ) : (
          <div className="w-14 h-14 rounded-lg shrink-0 flex items-center justify-center" style={{ background: "var(--mz-surface-hover)" }}>
            <Icon name="tag" className="w-5 h-5" style={{ color: "var(--mz-ink-muted)" }} />
          </div>
        )}
        <div className="text-xs leading-relaxed" style={{ color: "var(--mz-ink-muted)" }}>
          {uploading ? "アップロード中..." : (
            <>
              ドラッグ&ドロップ、またはクリックして画像を選択
              {helperText && <><br />{helperText}</>}
            </>
          )}
        </div>
        <input
          ref={inputRef} type="file" accept="image/*" className="hidden"
          onChange={(e) => { handleFiles(e.target.files); e.target.value = ""; }}
        />
      </div>
    </div>
  );
}

/* ---- サンプル商品番号の自動採番("S-0001"形式、既存最大値+1) ---- */
async function generateNextProductCode(type) {
  const prefix = type === "sample" ? "S" : "P";
  const { data, error } = await supabase
    .from("products")
    .select("product_code")
    .eq("type", type)
    .not("product_code", "is", null)
    .ilike("product_code", `${prefix}-%`);
  if (error || !data) return `${prefix}-0001`;
  let maxNum = 0;
  data.forEach((r) => {
    const m = /^[A-Z]-(\d+)$/.exec(r.product_code || "");
    if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
  });
  return `${prefix}-${String(maxNum + 1).padStart(4, "0")}`;
}

/* ---- 商品登録・編集モーダル ---- */
function ProductFormModal({ product, batches, onClose, onSave }) {
  const isNew = !product.id;
  const [type, setType] = useState(product.type || "sample");
  const [status, setStatus] = useState(product.status || "未販売");
  const [imageUrl, setImageUrl] = useState(product.product_image_url || "");
  const [uploadingImage, setUploadingImage] = useState(false);
  const [extractImageUrl, setExtractImageUrl] = useState("");
  const [uploadingExtractImage, setUploadingExtractImage] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [visionError, setVisionError] = useState(null);
  const [productUrl, setProductUrl] = useState(product.product_url || "");
  const [productCode, setProductCode] = useState(product.product_code || "");
  const [productName, setProductName] = useState(product.product_name || "");
  const [category, setCategory] = useState(product.category || "");
  const [size, setSize] = useState(product.size || "");
  const [sizeOptionsText, setSizeOptionsText] = useState(product.size_options || "");
  const [sellingPriceJpy, setSellingPriceJpy] = useState(product.selling_price_jpy != null ? String(product.selling_price_jpy) : "");
  const [purchaseDate, setPurchaseDate] = useState(product.purchase_date || todayISO());
  const [batchId, setBatchId] = useState(product.batch_id || "");
  const [purchaseAmountCny, setPurchaseAmountCny] = useState(product.purchase_amount_cny != null ? String(product.purchase_amount_cny) : "");
  const [shippingCny, setShippingCny] = useState(product.shipping_cny != null ? String(product.shipping_cny) : "");
  const [feeCny, setFeeCny] = useState(product.fee_cny != null ? String(product.fee_cny) : "");
  const [saving, setSaving] = useState(false);

  // 「サイズ展開」テキスト(例: "S/M/L/XL")を選択肢配列にパース。
  // 既存のsize(編集時)がリストに含まれていなければ先頭に追加しておく(選択が消えないように)。
  const sizeOptionsList = useMemo(() => {
    const list = sizeOptionsText.split(/[\/,、]/).map((s) => s.trim()).filter(Boolean);
    if (size && !list.includes(size)) list.unshift(size);
    return list;
  }, [sizeOptionsText, size]);

  // 新規登録・サンプル区分の場合、商品番号が空欄なら自動採番する(手動入力があれば上書きしない)
  useEffect(() => {
    if (!isNew || type !== "sample" || productCode) return;
    let cancelled = false;
    (async () => {
      const code = await generateNextProductCode("sample");
      if (!cancelled) setProductCode(code);
    })();
    return () => { cancelled = true; };
  }, [isNew, type]);

  // 既に仕入れ確定済み(=ウォレット消化済み)かどうか。新規以外は原則コスト欄を編集不可にする。
  const costLocked = !isNew;

  // 商品画像(アプリ上に表示する写真)のアップロード
  const handleProductImageFile = async (file) => {
    setUploadingImage(true);
    const res = await uploadProductImage(file);
    setUploadingImage(false);
    if (!res.ok) { alert(res.message); return; }
    setImageUrl(res.url);
  };

  // AI自動抽出用スクショのアップロード → アップロード後、自動でVision抽出まで実行
  const handleExtractImageFile = async (file) => {
    setUploadingExtractImage(true);
    setVisionError(null);
    const res = await uploadProductImage(file);
    setUploadingExtractImage(false);
    if (!res.ok) { alert(res.message); return; }
    setExtractImageUrl(res.url);
    await runExtraction(res.url);
  };

  const runExtraction = async (url) => {
    const target = url || extractImageUrl;
    if (!target) return;
    setExtracting(true);
    setVisionError(null);
    try {
      const info = await extractProductInfoFromImage(target);
      if (info.product_name) setProductName(info.product_name);
      if (info.category) setCategory(info.category);
      if (info.price_cny != null) setPurchaseAmountCny(String(info.price_cny));
      if (info.size_range) setSizeOptionsText(info.size_range);
    } catch (err) {
      setVisionError(err.message || "AI自動抽出に失敗しました");
    }
    setExtracting(false);
  };

  const handleBatchChange = (id) => {
    setBatchId(id);
    if (!id) return;
    const b = batches.find((x) => x.id === id);
    if (b) {
      setShippingCny(String(Number(b.per_item_shipping_cny).toFixed(2)));
      setFeeCny(String(Number(b.per_item_fee_cny).toFixed(2)));
    }
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!productName.trim() || !purchaseDate) return;
    setSaving(true);
    await onSave({
      id: product.id || null,
      type,
      status,
      product_image_url: imageUrl || null,
      product_url: productUrl.trim() || null,
      product_code: productCode.trim() || null,
      product_name: productName.trim(),
      category: category.trim() || null,
      size: size.trim() || null,
      size_options: sizeOptionsText.trim() || null,
      selling_price_jpy: sellingPriceJpy ? parseFloat(sellingPriceJpy) : null,
      purchase_date: purchaseDate,
      batch_id: batchId || null,
      purchase_amount_cny: purchaseAmountCny ? parseFloat(purchaseAmountCny) : 0,
      shipping_cny: shippingCny ? parseFloat(shippingCny) : 0,
      fee_cny: feeCny ? parseFloat(feeCny) : 0,
      costLocked,
    });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl p-5 space-y-4 max-h-[92vh] overflow-y-auto"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">{isNew ? "新規仕入れ登録" : "商品情報を編集"}</h2>

        {/* 商品画像(アプリ表示用) */}
        <ImageDropZone
          label="商品画像(アプリ上に表示される写真)"
          previewUrl={imageUrl}
          uploading={uploadingImage}
          onFile={handleProductImageFile}
          helperText="サムネイル・一覧表示に使用されます"
        />

        {/* AI自動抽出用スクショ(商品画像とは別に登録) */}
        <div>
          <ImageDropZone
            label="商品情報スクショ(淘宝の商品名・価格部分。AI自動抽出用)"
            previewUrl={extractImageUrl}
            uploading={uploadingExtractImage}
            onFile={handleExtractImageFile}
            helperText="ドロップすると自動でAI抽出を実行します"
          />
          {extractImageUrl && (
            <button
              type="button" onClick={() => runExtraction()} disabled={uploadingExtractImage || extracting}
              className="mt-2 text-xs px-3 py-1.5 rounded-lg disabled:opacity-40 whitespace-nowrap"
              style={{ border: "1px solid var(--mz-gold)", color: "var(--mz-gold-soft)" }}
            >
              {extracting ? "AI解析中..." : "もう一度AIで抽出する"}
            </button>
          )}
          {visionError && <p className="text-xs mt-1" style={{ color: "#f2b8bd" }}>{visionError}</p>}
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>区分</label>
            <select value={type} onChange={(e) => setType(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              <option value="sample">サンプル</option>
              <option value="stock">在庫(新規仕入対応)</option>
            </select>
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>状態</label>
            <select value={status} onChange={(e) => setStatus(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}>
              {PRODUCT_STATUS_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>商品名</label>
          <input type="text" value={productName} onChange={(e) => setProductName(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>カテゴリ</label>
            <input type="text" value={category} onChange={(e) => setCategory(e.target.value)}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
          </div>
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>サイズ展開</label>
            <input
              type="text" value={sizeOptionsText} onChange={(e) => setSizeOptionsText(e.target.value)}

              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
              style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}

            <p className="text-[11px] mt-1" style={{ color: "var(--mz-ink-muted)" }}>

            <input type="number" min="0" step="0.01" value={feeCny} onChange={(e) => setFeeCny(e.target.value)} disabled={costLocked}
              className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent disabled:opacity-50" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
