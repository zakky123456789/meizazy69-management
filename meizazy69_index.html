/* ============================================================

function useHashRoute() {
  const [hash, setHash] = useState(window.location.hash || "#/dashboard");

  useEffect(() => {
    const onHashChange = () => setHash(window.location.hash || "#/dashboard");
    window.addEventListener("hashchange", onHashChange);
    if (!window.location.hash) window.location.hash = "#/dashboard";
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  return hash;
}

/* ============================================================
   認証設定(合言葉方式)
   ・メールアドレス登録は行わない
   ・合言葉が正しければ Supabase Anonymous Auth でセッション作成
   ・匿名認証ユーザーも Postgres 上は authenticated ロールになるため
     既存のRLSポリシー(to authenticated)がそのまま適用される
   ============================================================ */
const PASSCODE = "12251225";
const STAFF_STORAGE_KEY = "meizazy69_staff";

/* ============================================================
   認証フック
   ============================================================ */
function useAuth() {
  const [session, setSession] = useState(undefined); // undefined = 判定中, null = 未認証

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => {
      setSession(sess ?? null);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  const submitPasscode = useCallback(async (input) => {
    if (input !== PASSCODE) {
      return { ok: false, message: "合言葉が違います" };
    }
    const { error } = await supabase.auth.signInAnonymously();
    if (error) {
      return { ok: false, message: "サインインに失敗しました。時間をおいて再度お試しください。" };
    }
    return { ok: true };
  }, []);

  const signOut = useCallback(async () => {
    localStorage.removeItem(STAFF_STORAGE_KEY);
    await supabase.auth.signOut();
  }, []);

  return { session, submitPasscode, signOut };
}

function WhoAreYouScreen({ onSelect }) {

  const [selectingId, setSelectingId] = useState(null);

  useEffect(() => {

    supabase
      .from("staff")
      .select("id,name")
      .eq("is_active", true)
      .order("name")
      .then(({ data, error }) => {
        if (cancelled) return;
        if (error) setLoadError("担当者一覧の取得に失敗しました");
        else setStaffList(data || []);

    return () => { cancelled = true; };
  }, []);

  const handleSelect = (staff) => {

    localStorage.setItem(STAFF_STORAGE_KEY, JSON.stringify(staff));
    onSelect(staff);
  };

/* ============================================================
   ダッシュボード(売上・利益連携)
   ・集計期間: 「全期間累計」+「今月分」の2本立て
   ・salesテーブル(total_amount_jpy)とsale_items(profit_jpy)を集計
   ============================================================ */
function DashboardPage() {
  const [sales, setSales] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);

  const loadSales = useCallback(async () => {
    setError(null);
    // 集計にしか使わないため必要最小限のカラムのみ取得(total_amount_jpyとsale_items.profit_jpy)
    const { data, error } = await supabase
      .from("sales")
      .select("id,transaction_date,total_amount_jpy,sale_items(profit_jpy)")
      .order("transaction_date", { ascending: false });
    if (error) { setError("売上データの取得に失敗しました"); setSales([]); return; }
    setSales(data || []);
  }, []);

  useEffect(() => { loadSales(); }, [loadSales]);

  const thisMonthPrefix = todayISO().slice(0, 7); // 例: "2026-07"
  const monthLabel = `${thisMonthPrefix.slice(0, 4)}年${parseInt(thisMonthPrefix.slice(5, 7), 10)}月`;

  const summary = useMemo(() => {
    const list = sales || [];
    const calc = (arr) => {
      let totalAmount = 0;
      let totalProfit = 0;
      arr.forEach((s) => {
        totalAmount += Number(s.total_amount_jpy) || 0;
        (s.sale_items || []).forEach((it) => { totalProfit += Number(it.profit_jpy) || 0; });
      });
      return { count: arr.length, totalAmount, totalProfit };
    };
    const monthList = list.filter((s) => (s.transaction_date || "").startsWith(thisMonthPrefix));
    return { allTime: calc(list), thisMonth: calc(monthList) };
  }, [sales, thisMonthPrefix]);

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-8">
      {error && (
        <p className="text-sm" style={{ color: "#f2b8bd" }}>{error}</p>
      )}

      <section className="space-y-3">
        <h3 className="font-display text-base">全期間累計</h3>
        {sales === null ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <DashboardStatCard label="取引件数" value={`${summary.allTime.count}件`} />
            <DashboardStatCard label="売上合計" value={fmtJPY(summary.allTime.totalAmount)} highlight />
            <DashboardStatCard label="利益合計" value={fmtJPY(summary.allTime.totalProfit)} highlight />
          </div>
        )}
      </section>

      <section className="space-y-3">
        <h3 className="font-display text-base">{monthLabel}分</h3>
        {sales === null ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
        ) : (
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <DashboardStatCard label="取引件数" value={`${summary.thisMonth.count}件`} />
            <DashboardStatCard label="売上合計" value={fmtJPY(summary.thisMonth.totalAmount)} highlight />
            <DashboardStatCard label="利益合計" value={fmtJPY(summary.thisMonth.totalProfit)} highlight />
          </div>
        )}
      </section>
    </div>
  );
}

const STATUS_OPTIONS = ["未着手", "進行中", "完了"];
const STAFF_COLORS = ["#C9A227", "#6B3F52", "#3F6B8B", "#4C7A57", "#8B5A3F", "#5A4C8B"];

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

/* ---- "YYYY-MM-DD" に日数を加減算する(歩合率の適用期間の自動調整等で使用) ---- */
function addDaysISO(dateStr, days) {
  const d = new Date(`${dateStr}T00:00:00`);
  d.setDate(d.getDate() + days);
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

/* ---- "YYYY-MM" の翌月1日を "YYYY-MM-DD" で返す(月次損益集計の期間指定に使用) ---- */
function nextMonthFirstDay(targetMonth) {
  const [y, m] = targetMonth.split("-").map(Number);
  const ny = m === 12 ? y + 1 : y;
  const nm = m === 12 ? 1 : m + 1;
  return `${ny}-${String(nm).padStart(2, "0")}-01`;
}

/* ---- "YYYY-MM" を "2026年7月" 形式のラベルに変換 ---- */
function formatMonthLabel(targetMonth) {
  const [y, m] = (targetMonth || "").split("-");
  if (!y || !m) return targetMonth || "";
  return `${y}年${parseInt(m, 10)}月`;
}

function staffColor(staffId, staffList) {
  const idx = staffList.findIndex((s) => s.id === staffId);
  if (idx === -1) return "var(--mz-ink-muted)";
  return STAFF_COLORS[idx % STAFF_COLORS.length];
}

function StatusBadge({ status }) {

  const s = styles[status] || styles["未着手"];
  return (
    <span className="text-xs px-2 py-0.5 rounded-full shrink-0" style={{ background: s.bg, color: s.color }}>
      {status}
    </span>
  );
}

/* ---- カレンダー表示 ---- */
function TaskCalendar({ tasks, staffList, onEdit }) {
  const [monthDate, setMonthDate] = useState(() => {
    const d = new Date();
    d.setDate(1);
    return d;
  });

  const year = monthDate.getFullYear();
  const month = monthDate.getMonth(); // 0-indexed
  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const dateKey = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  const tasksByDate = useMemo(() => {
    const map = {};
    tasks.forEach((t) => {
      // 未完了かつ予定日があるもの → 「これからやること」
      if (t.status !== "完了" && t.scheduled_date) {
        (map[t.scheduled_date] = map[t.scheduled_date] || { scheduled: [], completed: [] }).scheduled.push(t);
      }
      // 完了日があるもの → 「やったこと」
      if (t.completed_date) {
        (map[t.completed_date] = map[t.completed_date] || { scheduled: [], completed: [] }).completed.push(t);
      }
    });
    return map;
  }, [tasks]);

  const monthLabel = `${year}年${month + 1}月`;
  const todayKey = todayISO();

  return (
    <div className="rounded-xl p-3 md:p-4" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}>
      <div className="flex items-center justify-between mb-3">
        <button
          onClick={() => setMonthDate(new Date(year, month - 1, 1))}
          className="px-3 py-1.5 rounded-lg text-sm"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          ‹ 前月
        </button>
        <h3 className="font-display text-base">{monthLabel}</h3>
        <button
          onClick={() => setMonthDate(new Date(year, month + 1, 1))}
          className="px-3 py-1.5 rounded-lg text-sm"
          style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}
        >
          翌月 ›
        </button>
      </div>

      <div className="grid grid-cols-7 gap-1 text-center text-[11px] mb-1" style={{ color: "var(--mz-ink-muted)" }}>
        {["日", "月", "火", "水", "木", "金", "土"].map((w) => <div key={w}>{w}</div>)}
      </div>

      <div className="grid grid-cols-7 gap-1">
        {cells.map((d, i) => {
          if (d === null) return <div key={`empty-${i}`} />;
          const key = dateKey(d);
          const entry = tasksByDate[key];
          const isToday = key === todayKey;
          return (
            <div
              key={key}
              className="rounded-lg p-1 min-h-[64px] md:min-h-[84px] text-left align-top overflow-hidden"
              style={{ background: isToday ? "var(--mz-surface-hover)" : "transparent", border: "1px solid var(--mz-border)" }}
            >
              <div className="text-[11px] mb-0.5" style={{ color: isToday ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)" }}>
                {d}
              </div>
              <div className="space-y-0.5">
                {entry && entry.scheduled.map((t) => (
                  <button
                    key={"s" + t.id}
                    onClick={() => onEdit(t)}
                    className="w-full text-left text-[10px] px-1 py-0.5 rounded truncate block"
                    style={{ background: staffColor(t.staff_id, staffList) + "33", color: staffColor(t.staff_id, staffList) }}
                    title={t.content}
                  >
                    ▷{t.content}
                  </button>
                ))}
                {entry && entry.completed.map((t) => (
                  <button
                    key={"c" + t.id}
                    onClick={() => onEdit(t)}
                    className="w-full text-left text-[10px] px-1 py-0.5 rounded truncate block line-through"
                    style={{ background: "#1f3a2a", color: "#8fd6ab" }}
                    title={t.content}
                  >
                    ✓{t.content}
                  </button>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      <div className="flex items-center gap-4 mt-3 text-[11px] flex-wrap" style={{ color: "var(--mz-ink-muted)" }}>
        <span>▷ これからやること(予定)</span>
        <span>✓ やったこと(完了)</span>
      </div>
    </div>
  );
}

/* ---- タスク管理ページ本体 ---- */
function TasksPage() {
  const [staffList, setStaffList] = useState([]);
  const [tasks, setTasks] = useState(null); // null = 読み込み中
  const [error, setError] = useState(null);
  const [view, setView] = useState("list"); // "list" | "calendar"
  const [filterStaff, setFilterStaff] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [modalTask, setModalTask] = useState(null); // null=閉じる, {}=新規, obj=編集

  const loadStaff = useCallback(async () => {
    const { data, error } = await supabase.from("staff").select("id,name,is_active").order("name");
    if (!error) setStaffList(data || []);
  }, []);

  const loadTasks = useCallback(async () => {
    setError(null);
    const { data, error } = await supabase
      .from("tasks")
      .select("id,staff_id,content,status,scheduled_date,completed_date,result,created_at")
      .order("created_at", { ascending: false });
    if (error) {
      setError("タスクの取得に失敗しました");
      setTasks([]);
    } else {
      setTasks(data || []);
    }
  }, []);

  useEffect(() => {
    loadStaff();
    loadTasks();
  }, [loadStaff, loadTasks]);

  const staffMap = useMemo(() => {
    const m = {};
    staffList.forEach((s) => { m[s.id] = s; });
    return m;
  }, [staffList]);

  const filteredTasks = useMemo(() => {
    if (!tasks) return [];
    return tasks.filter((t) => {
      if (filterStaff !== "all" && t.staff_id !== filterStaff) return false;
      if (filterStatus !== "all" && t.status !== filterStatus) return false;
      return true;
    });
  }, [tasks, filterStaff, filterStatus]);

  // 保存(新規・編集共通)
  // completed_date は「statusが完了に変わったタイミングでシステムが自動セット」する設計のため、
  // ここで status に応じて自動的に completed_date を確定/解除する。
  const handleSave = async (form) => {
    const patch = {
      staff_id: form.staff_id,
      content: form.content.trim(),
      status: form.status,
      scheduled_date: form.scheduled_date || null,
      result: form.result ? form.result.trim() : null,
      completed_date: form.status === "完了" ? (form.completed_date || todayISO()) : null,
    };

    if (form.id) {
      const { error } = await supabase.from("tasks").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("tasks").insert({ ...patch, created_at: new Date().toISOString() });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalTask(null);
    loadTasks();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("このタスクを削除しますか?")) return;
    const { error } = await supabase.from("tasks").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadTasks();
  };

  // 一覧上でのステータスのクイック変更(completed_dateも同時に自動制御)
  const handleQuickStatus = async (task, newStatus) => {
    const patch = {
      status: newStatus,
      completed_date: newStatus === "完了" ? todayISO() : null,
    };
    const { error } = await supabase.from("tasks").update(patch).eq("id", task.id);
    if (!error) loadTasks();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="flex flex-wrap gap-2">
          <select
            value={filterStaff}
            onChange={(e) => setFilterStaff(e.target.value)}
            className="rounded-lg px-3 py-2 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            <option value="all">担当者: すべて</option>
            {staffList.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select
            value={filterStatus}
            onChange={(e) => setFilterStatus(e.target.value)}
            className="rounded-lg px-3 py-2 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          >
            <option value="all">状態: すべて</option>
            {STATUS_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>

        <div className="flex items-center gap-2">
          <div className="rounded-lg overflow-hidden flex text-sm" style={{ border: "1px solid var(--mz-border)" }}>
            <button
              onClick={() => setView("list")}
              className="px-3 py-2"
              style={{
                background: view === "list" ? "var(--mz-surface-hover)" : "transparent",
                color: view === "list" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)",
              }}
            >
              一覧
            </button>
            <button
              onClick={() => setView("calendar")}
              className="px-3 py-2"
              style={{
                background: view === "calendar" ? "var(--mz-surface-hover)" : "transparent",
                color: view === "calendar" ? "var(--mz-gold-soft)" : "var(--mz-ink-muted)",

/* ---- ホストクラブ一覧ページ本体 ---- */
function HostClubsPage() {
  const [clubs, setClubs] = useState(null); // null = 読み込み中
  const [hosts, setHosts] = useState([]);
  const [visits, setVisits] = useState([]);
  const [error, setError] = useState(null);
  const [modalClub, setModalClub] = useState(null); // null=閉じる, {}=新規, obj=編集

  const loadAll = useCallback(async () => {
    setError(null);
    const [clubsRes, hostsRes, visitsRes] = await Promise.all([
      supabase.from("host_clubs").select("id,name").order("name"),
      supabase.from("hosts").select("id,host_club_id"),
      supabase.from("visits").select("id,host_club_id,next_visit_date"),
    ]);
    if (clubsRes.error) {
      setError("ホストクラブの取得に失敗しました");
      setClubs([]);
      return;
    }
    setClubs(clubsRes.data || []);
    setHosts(hostsRes.data || []);
    setVisits(visitsRes.data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // クラブごとの所属ホスト数を集計
  const hostCountByClub = useMemo(() => {
    const m = {};
    hosts.forEach((h) => { m[h.host_club_id] = (m[h.host_club_id] || 0) + 1; });
    return m;
  }, [hosts]);

  // クラブごとの「次回訪問予定」を集計
  // ルール: 今日以降で最も近い予定日を優先。今後の予定が無ければ、直近で最も新しい予定日を表示。
  const nextVisitByClub = useMemo(() => {
    const today = todayISO();
    const m = {};
    visits.forEach((v) => {
      if (!v.next_visit_date) return;
      const cur = m[v.host_club_id];
      if (!cur) { m[v.host_club_id] = v.next_visit_date; return; }
      const candidateFuture = v.next_visit_date >= today;
      const currentFuture = cur >= today;
      let useCandidate;
      if (candidateFuture && currentFuture) useCandidate = v.next_visit_date < cur;
      else if (candidateFuture && !currentFuture) useCandidate = true;
      else if (!candidateFuture && currentFuture) useCandidate = false;
      else useCandidate = v.next_visit_date > cur;
      if (useCandidate) m[v.host_club_id] = v.next_visit_date;
    });
    return m;
  }, [visits]);

  const handleSave = async (form) => {
    if (form.id) {
      const { error } = await supabase.from("host_clubs").update({ name: form.name }).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("host_clubs").insert({ name: form.name });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalClub(null);
    loadAll();
  };

  const handleDelete = async (id) => {
    if (!window.confirm("このホストクラブを削除しますか?所属ホスト・訪問記録が残っている場合は削除できません。")) return;
    const { error } = await supabase.from("host_clubs").delete().eq("id", id);
    if (error) { alert("削除に失敗しました(所属ホストや訪問記録が残っている可能性があります)"); return; }
    loadAll();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-5">
      <div className="flex items-center justify-end">
        <button
          onClick={() => setModalClub({})}
          className="rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap"
          style={{ background: "var(--mz-gold)", color: "#1a1710" }}
        >
          + 新規ホストクラブ
        </button>
      </div>

      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      {clubs === null && !error && (
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      )}

      {clubs !== null && clubs.length === 0 && !error && (
        <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>
          ホストクラブが登録されていません
        </p>
      )}

      {clubs !== null && clubs.length > 0 && (
        <div className="space-y-2">
          {clubs.map((c) => (
            <HostClubCard
              key={c.id}
              club={c}
              hostCount={hostCountByClub[c.id] || 0}
              nextVisitDate={nextVisitByClub[c.id]}
              onOpen={(id) => { window.location.hash = `#/host-clubs/${id}`; }}
              onEdit={(club) => setModalClub(club)}
              onDelete={handleDelete}
            />
          ))}
        </div>
      )}

      {modalClub && (
        <HostClubFormModal club={modalClub} onClose={() => setModalClub(null)} onSave={handleSave} />
      )}
    </div>
  );
}

/* ---- 訪問記録 登録・編集モーダル ---- */
function VisitFormModal({ visit, initialSamples, onClose, onSave }) {
  const isNew = !visit.id;
  const [visitDate, setVisitDate] = useState(visit.visit_date || todayISO());
  const [nextVisitDate, setNextVisitDate] = useState(visit.next_visit_date || "");
  const [saving, setSaving] = useState(false);

  // 持参サンプル選択: 候補は「未販売」の全商品(在庫・サンプル問わず)から検索
  const [unsoldProducts, setUnsoldProducts] = useState(null); // null = 読み込み中
  const [sampleSearch, setSampleSearch] = useState("");
  const [selectedSamples, setSelectedSamples] = useState(initialSamples || []); // [{id,product_name,size,product_code}]

  useEffect(() => {
    let cancelled = false;
    supabase
      .from("products")
      .select("id,product_name,size,product_code")
      .eq("status", "未販売")
      .order("product_name")
      .then(({ data, error }) => {
        if (cancelled) return;
        setUnsoldProducts(error ? [] : (data || []));
      });
    return () => { cancelled = true; };
  }, []);

  const selectedIds = useMemo(() => new Set(selectedSamples.map((p) => p.id)), [selectedSamples]);

  const sampleCandidates = useMemo(() => {
    if (!unsoldProducts) return [];
    const q = sampleSearch.trim().toLowerCase();
    return unsoldProducts.filter((p) => {
      if (selectedIds.has(p.id)) return false;
      if (!q) return false; // 未入力時は候補を出さない(一覧が長くなりすぎるため)
      return (p.product_name || "").toLowerCase().includes(q) || (p.product_code || "").toLowerCase().includes(q);
    }).slice(0, 20);
  }, [unsoldProducts, selectedIds, sampleSearch]);

  const addSample = (p) => { setSelectedSamples((prev) => [...prev, p]); setSampleSearch(""); };
  const removeSample = (id) => setSelectedSamples((prev) => prev.filter((p) => p.id !== id));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!visitDate) return;
    setSaving(true);
    await onSave({
      id: visit.id || null,
      visit_date: visitDate,
      next_visit_date: nextVisitDate || null,
      sampleProductIds: selectedSamples.map((p) => p.id),
    });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-md rounded-t-2xl sm:rounded-2xl p-5 space-y-4 max-h-[90vh] overflow-y-auto"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">{isNew ? "新規訪問記録" : "訪問記録を編集"}</h2>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>訪問日</label>
          <input
            type="date" value={visitDate} onChange={(e) => setVisitDate(e.target.value)} required
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
        </div>
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>次回訪問予定日(任意)</label>
          <input
            type="date" value={nextVisitDate} onChange={(e) => setNextVisitDate(e.target.value)}
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />
        </div>

        {/* 持参サンプル(visit_samples): 未販売の全商品(在庫・サンプル問わず)から検索して複数選択 */}
        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>
            持参サンプル{selectedSamples.length > 0 ? `(${selectedSamples.length}点)` : ""}
          </label>

          {selectedSamples.length > 0 && (
            <div className="flex flex-wrap gap-1.5 mb-2">
              {selectedSamples.map((p) => (
                <span
                  key={p.id}
                  className="inline-flex items-center gap-1 text-xs pl-2 pr-1.5 py-1 rounded-full"
                  style={{ background: "var(--mz-surface-hover)", color: "var(--mz-ink)" }}
                >
                  {p.product_name}{p.size ? ` - ${p.size}` : ""}
                  <button
                    type="button" onClick={() => removeSample(p.id)}
                    className="w-4 h-4 flex items-center justify-center rounded-full"
                    style={{ color: "var(--mz-ink-muted)" }}
                  >
                    ×
                  </button>
                </span>
              ))}
            </div>
          )}

          <input
            type="text" value={sampleSearch} onChange={(e) => setSampleSearch(e.target.value)}
            placeholder="商品名・商品番号で検索して追加..."
            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent"
            style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
          />

          {unsoldProducts === null ? (
            <p className="text-xs mt-1.5" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
          ) : sampleSearch.trim() && sampleCandidates.length === 0 ? (
            <p className="text-xs mt-1.5" style={{ color: "var(--mz-ink-muted)" }}>該当する未販売商品がありません</p>
          ) : sampleCandidates.length > 0 && (
            <div className="mt-1.5 rounded-lg max-h-40 overflow-y-auto" style={{ border: "1px solid var(--mz-border)" }}>
              {sampleCandidates.map((p) => (
                <button
                  key={p.id} type="button" onClick={() => addSample(p)}
                  className="w-full text-left px-3 py-2 text-xs truncate"
                  style={{ borderBottom: "1px solid var(--mz-border)" }}
                >
                  {p.product_name}{p.size ? ` - ${p.size}` : ""}{p.product_code ? `(No.${p.product_code})` : ""}
                </button>
              ))}
            </div>
          )}
        </div>

        <div className="flex gap-2 pt-1">
          <button type="button" onClick={onClose} className="flex-1 rounded-lg py-2.5 text-sm" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>
            キャンセル

          <button type="submit" disabled={saving} className="flex-1 rounded-lg py-2.5 text-sm font-medium disabled:opacity-60" style={{ background: "var(--mz-gold)", color: "#1a1710" }}>
            {saving ? "保存中..." : "保存"}
          </button>
        </div>
      </form>

  );

      supabase.from("host_clubs").select("id,name").eq("id", clubId).maybeSingle(),
      supabase.from("hosts").select("id,host_club_id,name").eq("host_club_id", clubId).order("name"),
      supabase.from("visits").select("id,host_club_id,visit_date,next_visit_date").eq("host_club_id", clubId).order("visit_date", { ascending: false }),
      supabase
        .from("visit_samples")
        .select("id,visit_id,product_id,products(product_name,size,product_code),visits!inner(host_club_id)")
        .eq("visits.host_club_id", clubId),
      supabase
        .from("sales")
        .select("id,transaction_date,host_id,total_amount_jpy,hosts(name),receipts!fk_sales_receipt_id(receipt_number),sale_items(id,unit_price_jpy,profit_jpy,products(product_name,size,product_code))")
        .eq("host_club_id", clubId)
        .order("transaction_date", { ascending: false }),
    ]);
    if (clubRes.error || !clubRes.data) {
      setError("ホストクラブが見つかりません");
      setClub(false);
      return;
    }
    setClub(clubRes.data);
    setHosts(hostsRes.data || []);
    setVisits(visitsRes.data || []);
    // 持参サンプルの取得に失敗しても、訪問記録自体の表示は継続する
    setVisitSamples(visitSamplesRes.error ? [] : (visitSamplesRes.data || []));
    // 取引履歴の取得に失敗しても、クラブ本体の表示は継続する(salesテーブル側の一時的な問題でページ全体を止めないため)
    setSales(salesRes.error ? [] : (salesRes.data || []));
  }, [clubId]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // 次回訪問予定: 今日以降で最も近い予定日を優先。無ければ直近で最も新しい予定日。
  const nextVisit = useMemo(() => {
    const today = todayISO();
    const upcoming = visits.filter((v) => v.next_visit_date && v.next_visit_date >= today);
    if (upcoming.length > 0) {
      return upcoming.reduce((a, b) => (a.next_visit_date < b.next_visit_date ? a : b)).next_visit_date;
    }
    const withDate = visits.filter((v) => v.next_visit_date);
    if (withDate.length > 0) {
      return withDate.reduce((a, b) => (a.next_visit_date > b.next_visit_date ? a : b)).next_visit_date;
    }
    return null;
  }, [visits]);

  // 取引履歴サマリー(件数・売上合計・利益合計)。利益は各sale_itemsのprofit_jpyを合算。
  const salesSummary = useMemo(() => {
    const list = sales || [];
    let totalAmount = 0;
    let totalProfit = 0;
    list.forEach((s) => {
      totalAmount += Number(s.total_amount_jpy) || 0;
      (s.sale_items || []).forEach((it) => { totalProfit += Number(it.profit_jpy) || 0; });
    });
    return { count: list.length, totalAmount, totalProfit };
  }, [sales]);

  // 持参サンプルをvisit_idごとにグルーピング({ product_id, product_name, size, product_code }の配列)
  const samplesByVisit = useMemo(() => {
    const m = {};
    visitSamples.forEach((vs) => {
      if (!m[vs.visit_id]) m[vs.visit_id] = [];
      m[vs.visit_id].push({
        id: vs.product_id,
        product_name: vs.products ? vs.products.product_name : null,
        size: vs.products ? vs.products.size : null,
        product_code: vs.products ? vs.products.product_code : null,
      });
    });
    return m;
  }, [visitSamples]);

  const handleSaveHost = async (form) => {
    if (form.id) {
      const { error } = await supabase.from("hosts").update({ name: form.name }).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("hosts").insert({ name: form.name, host_club_id: clubId });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalHost(null);
    loadAll();
  };

  const handleDeleteHost = async (id) => {
    if (!window.confirm("このホストを削除しますか?")) return;
    const { error } = await supabase.from("hosts").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  // 訪問記録の保存 + 持参サンプル(visit_samples)の差分同期。
  // 新規登録時はvisits.insert().select("id")でidを取得してからvisit_samplesを紐付ける。
  const handleSaveVisit = async (form) => {
    const patch = { visit_date: form.visit_date, next_visit_date: form.next_visit_date };
    let visitId = form.id;
    if (form.id) {
      const { error } = await supabase.from("visits").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { data, error } = await supabase.from("visits").insert({ ...patch, host_club_id: clubId }).select("id").single();
      if (error) { alert("登録に失敗しました"); return; }
      visitId = data.id;
    }

    const currentIds = new Set((samplesByVisit[visitId] || []).map((p) => p.id));
    const nextIds = new Set(form.sampleProductIds || []);
    const toAdd = [...nextIds].filter((id) => !currentIds.has(id));
    const toRemove = [...currentIds].filter((id) => !nextIds.has(id));

    if (toAdd.length > 0) {
      const { error } = await supabase.from("visit_samples").insert(toAdd.map((productId) => ({ visit_id: visitId, product_id: productId })));
      if (error) alert("持参サンプルの追加に失敗しました(訪問記録自体は保存済みです)");
    }
    if (toRemove.length > 0) {
      const { error } = await supabase.from("visit_samples").delete().eq("visit_id", visitId).in("product_id", toRemove);
      if (error) alert("持参サンプルの削除に失敗しました(訪問記録自体は保存済みです)");
    }

    setModalVisit(null);
    loadAll();
  };

  const handleDeleteVisit = async (id) => {
    if (!window.confirm("この訪問記録を削除しますか?")) return;
    const { error } = await supabase.from("visits").delete().eq("id", id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  if (club === null && !error) {
    return (
      <div className="px-4 md:px-6 py-8 max-w-5xl mx-auto w-full">
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      </div>
    );
  }

  if (error) {
    return (
      <div className="px-4 md:px-6 py-8 max-w-5xl mx-auto w-full space-y-4">
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
        <a href="#/host-clubs" className="text-sm" style={{ color: "var(--mz-gold-soft)" }}>← ホストクラブ一覧へ戻る</a>
      </div>
    );
  }

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-6">
      <div>
        <a href="#/host-clubs" className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>← ホストクラブ一覧</a>
        <h2 className="font-display text-xl mt-1">{club.name}</h2>
      </div>

      {/* 次回訪問予定ハイライト */}
      <div className="rounded-xl p-4" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-gold)" }}>
        <p className="text-xs mb-1" style={{ color: "var(--mz-ink-muted)" }}>次回訪問予定</p>
        <p className="font-display text-lg" style={{ color: "var(--mz-gold-soft)" }}>{nextVisit || "未定"}</p>
      </div>

      {/* 所属ホスト一覧 */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-base">所属ホスト</h3>
          <button
            onClick={() => setModalHost({})}
            className="text-xs px-3 py-1.5 rounded-lg"
            style={{ background: "var(--mz-gold)", color: "#1a1710" }}
          >
            + ホスト追加
          </button>
        </div>
        {hosts.length === 0 ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>登録されたホストがいません</p>
        ) : (
          <div className="space-y-2">
            {hosts.map((h) => (
              <div
                key={h.id}
                className="rounded-xl p-3 flex items-center justify-between gap-3"
                style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
              >
                <span className="text-sm truncate">{h.name}</span>
                <div className="flex items-center gap-2 shrink-0">
                  <button onClick={() => setModalHost(h)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>編集</button>
                  <button onClick={() => handleDeleteHost(h.id)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}>削除</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {/* 訪問記録一覧(手入力) */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-base">訪問記録</h3>
          <button
            onClick={() => setModalVisit({})}
            className="text-xs px-3 py-1.5 rounded-lg"
            style={{ background: "var(--mz-gold)", color: "#1a1710" }}
          >
            + 訪問記録追加
          </button>
        </div>
        {visits.length === 0 ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>訪問記録がありません</p>
        ) : (
          <div className="space-y-2">
            {visits.map((v) => {
              const samples = samplesByVisit[v.id] || [];
              const isExpanded = expandedVisitId === v.id;
              return (
                <div
                  key={v.id}
                  className="rounded-xl p-3 space-y-2"
                  style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
                >
                  <div className="flex items-center justify-between gap-3 flex-wrap">
                    <div className="text-sm">
                      <span>訪問日: {v.visit_date}</span>
                      {v.next_visit_date && (
                        <span className="ml-3" style={{ color: "var(--mz-ink-muted)" }}>次回予定: {v.next_visit_date}</span>
                      )}
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <button onClick={() => setModalVisit(v)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>編集</button>
                      <button onClick={() => handleDeleteVisit(v.id)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}>削除</button>
                    </div>
                  </div>

                  {samples.length > 0 && (
                    <div>
                      <button
                        type="button"
                        onClick={() => setExpandedVisitId(isExpanded ? null : v.id)}
                        className="text-xs"
                        style={{ color: "var(--mz-ink-muted)" }}
                      >
                        {isExpanded ? "▲ 持参サンプルを閉じる" : `▼ 持参サンプル(${samples.length}点)`}
                      </button>
                      {isExpanded && (
                        <div className="mt-2 space-y-1 pt-2" style={{ borderTop: "1px solid var(--mz-border)" }}>
                          {samples.map((p) => (
                            <div key={p.id} className="text-xs truncate" style={{ color: "var(--mz-ink)" }}>
                              {p.product_name || "(名称未設定)"}{p.size ? ` - ${p.size}` : ""}{p.product_code ? `(No.${p.product_code})` : ""}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </section>

      {/* 取引履歴(salesデータの実データ集計) */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-base">取引履歴</h3>
          {sales !== null && sales.length > 0 && (
            <a href="#/sales" className="text-xs" style={{ color: "var(--mz-gold-soft)" }}>販売管理で編集 →</a>
          )}
        </div>

        {sales === null ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
        ) : sales.length === 0 ? (
          <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>取引履歴がありません</p>
        ) : (
          <>
            <div className="grid grid-cols-3 gap-2">
              <ClubSalesStat label="取引件数" value={`${salesSummary.count}件`} />
              <ClubSalesStat label="売上合計" value={fmtJPY(salesSummary.totalAmount)} highlight />
              <ClubSalesStat label="利益合計" value={fmtJPY(salesSummary.totalProfit)} highlight />
            </div>
            <div className="space-y-2">
              {sales.map((s) => (
                <ClubSaleRow key={s.id} sale={s} />
              ))}
            </div>
          </>
        )}
      </section>

      {modalHost && <HostFormModal host={modalHost} onClose={() => setModalHost(null)} onSave={handleSaveHost} />}
      {modalVisit && (
        <VisitFormModal
          visit={modalVisit}
          initialSamples={modalVisit.id ? (samplesByVisit[modalVisit.id] || []) : []}
          onClose={() => setModalVisit(null)}
          onSave={handleSaveVisit}
        />
      )}
    </div>
  );
}

/* ============================================================
   転送業者チャージ管理(FIFOウォレット)
   ・agent_charges: チャージ台帳(いつ・いくらCNYをいくらJPYでチャージしたか)
   ・agent_charge_consumptions: 消化履歴(商品仕入・国際送料・その他手数料)
   ・消化(FIFO)は本来 products 登録時(仕入れ確定タイミング)に発生する。
     products 未実装の現段階では、以下を用意する:
       1) チャージ台帳のCRUD + 残高サマリー表示
       2) 消化履歴の一覧表示(products実装後に自動的に増えていく)
       3) consumeWalletFIFO() … products 実装時に呼び出すFIFO消化ヘルパー
   ============================================================ */

function fmtCNY(n) {
  const v = Number(n) || 0;
  return `¥${v.toLocaleString("ja-JP", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} CNY`;
}
function fmtJPY(n) {
  const v = Math.round(Number(n) || 0);
  return `¥${v.toLocaleString("ja-JP")}`;
}

/* ---- FIFO消化ヘルパー(products実装時にここから呼び出す想定) ----
   使い方(将来のproducts登録処理からのイメージ):
     const res = await consumeWalletFIFO({ cnyAmount: 123.45, usageType: "商品仕入", productId });
     if (!res.ok) { alert(res.message); return; } // 残高不足などのアラート表示
   ------------------------------------------------------------ */
async function consumeWalletFIFO({ cnyAmount, usageType, productId }) {
  if (!cnyAmount || cnyAmount <= 0) return { ok: true, consumptions: [] };

  const { data: charges, error } = await supabase
    .from("agent_charges")
    .select("id,charge_date,exchange_rate,remaining_cny")
    .gt("remaining_cny", 0)
    .order("charge_date", { ascending: true })
    .order("id", { ascending: true });

  if (error) return { ok: false, message: "チャージ情報の取得に失敗しました" };

  let remainingToConsume = cnyAmount;
  const consumptionsToInsert = [];
  const chargeUpdates = [];

  for (const charge of charges || []) {
    if (remainingToConsume <= 0) break;
    const consumeFromThis = Math.min(charge.remaining_cny, remainingToConsume);
    if (consumeFromThis <= 0) continue;
    consumptionsToInsert.push({
      charge_id: charge.id,
      consumed_cny: consumeFromThis,
      applied_rate: charge.exchange_rate,
      consumed_jpy: consumeFromThis * charge.exchange_rate,
      usage_type: usageType,
      product_id: productId,
    });
    chargeUpdates.push({ id: charge.id, newRemaining: charge.remaining_cny - consumeFromThis });
    remainingToConsume -= consumeFromThis;
  }

  // 残高不足(FIFOで全チャージを使っても消化額に届かない場合)
  if (remainingToConsume > 0.0001) {
    return {
      ok: false,
      message: `ウォレット残高が不足しています(不足額: ${remainingToConsume.toFixed(2)} CNY)`,
      shortfall: remainingToConsume,
    };
  }

  const { error: insertError } = await supabase.from("agent_charge_consumptions").insert(consumptionsToInsert);
  if (insertError) return { ok: false, message: "消化履歴の登録に失敗しました" };

  for (const u of chargeUpdates) {
    const { error: updError } = await supabase.from("agent_charges").update({ remaining_cny: u.newRemaining }).eq("id", u.id);
    if (updError) return { ok: false, message: "残高の更新に失敗しました(一部消化済みの可能性があります。チャージ一覧をご確認ください)" };
  }

  return { ok: true, consumptions: consumptionsToInsert };
}

/* ---- FIFO消化の払い戻し(商品削除時に、消化していたCNYをチャージ残高へ戻す) ----
   ・登録直後の商品は必ず消化済み扱いになるため、単純な登録ミスの取り消しでも
     削除できるようにするための仕組み(本当の返品は ReturnFormModal を使う)
   ------------------------------------------------------------ */
async function reverseWalletConsumption(productId) {
  const { data: rows, error } = await supabase
    .from("agent_charge_consumptions")
    .select("id,charge_id,consumed_cny")
    .eq("product_id", productId);
  if (error) return { ok: false, message: "消化履歴の取得に失敗しました" };
  if (!rows || rows.length === 0) return { ok: true };

  for (const row of rows) {
    const { data: charge, error: chargeErr } = await supabase
      .from("agent_charges")
      .select("remaining_cny")
      .eq("id", row.charge_id)
      .maybeSingle();
    if (chargeErr || !charge) continue;
    const newRemaining = (Number(charge.remaining_cny) || 0) + (Number(row.consumed_cny) || 0);
    const { error: updErr } = await supabase.from("agent_charges").update({ remaining_cny: newRemaining }).eq("id", row.charge_id);
    if (updErr) return { ok: false, message: "残高の払い戻しに失敗しました" };
  }

  const { error: delErr } = await supabase.from("agent_charge_consumptions").delete().eq("product_id", productId);
  if (delErr) return { ok: false, message: "消化履歴の削除に失敗しました" };

  return { ok: true };
}

/* ---- チャージ サマリーカード ---- */
function WalletSummary({ charges }) {
  const totals = useMemo(() => {
    let cnyTotal = 0, jpyTotal = 0, remainingCny = 0, remainingJpyValue = 0;
    charges.forEach((c) => {
      cnyTotal += Number(c.charge_amount_cny) || 0;
      jpyTotal += Number(c.charge_amount_jpy) || 0;
      remainingCny += Number(c.remaining_cny) || 0;
      remainingJpyValue += (Number(c.remaining_cny) || 0) * (Number(c.exchange_rate) || 0);
    });
    return { cnyTotal, jpyTotal, remainingCny, consumedCny: cnyTotal - remainingCny, remainingJpyValue };
  }, [charges]);

  const cards = [
    { label: "累計チャージ額", value: fmtCNY(totals.cnyTotal), sub: fmtJPY(totals.jpyTotal) + " 支払済" },
    { label: "消化済み(仕入等)", value: fmtCNY(totals.consumedCny) },
    { label: "未消化残高", value: fmtCNY(totals.remainingCny), sub: fmtJPY(totals.remainingJpyValue) + " 相当", highlight: true },
  ];

  return (
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
      {cards.map((c) => (
        <div
          key={c.label}
          className="rounded-xl p-4"
          style={{ background: "var(--mz-surface)", border: c.highlight ? "1px solid var(--mz-gold)" : "1px solid var(--mz-border)" }}
        >
          <p className="text-xs mb-1" style={{ color: "var(--mz-ink-muted)" }}>{c.label}</p>
          <p className="font-display text-lg" style={{ color: c.highlight ? "var(--mz-gold-soft)" : "var(--mz-ink)" }}>{c.value}</p>
          {c.sub && <p className="text-[11px] mt-0.5" style={{ color: "var(--mz-ink-muted)" }}>{c.sub}</p>}
        </div>
      ))}
    </div>
  );
}

/* ---- チャージ登録・編集モーダル ---- */
function ChargeFormModal({ charge, onClose, onSave }) {
  const isNew = !charge.id;
  const consumed = !isNew && Number(charge.remaining_cny) < Number(charge.charge_amount_cny);
  const [chargeDate, setChargeDate] = useState(charge.charge_date || todayISO());
  const [cny, setCny] = useState(charge.charge_amount_cny != null ? String(charge.charge_amount_cny) : "");
  const [jpy, setJpy] = useState(charge.charge_amount_jpy != null ? String(charge.charge_amount_jpy) : "");
  const [saving, setSaving] = useState(false);

  const cnyNum = parseFloat(cny) || 0;
  const jpyNum = parseFloat(jpy) || 0;
  const rate = cnyNum > 0 ? jpyNum / cnyNum : 0;

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!chargeDate || cnyNum <= 0 || jpyNum <= 0) return;
    setSaving(true);
    await onSave({
      id: charge.id || null,
      charge_date: chargeDate,
      charge_amount_cny: cnyNum,
      charge_amount_jpy: jpyNum,
      exchange_rate: rate,
      consumed,
    });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl p-5 space-y-4"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}
      >
        <h2 className="font-display text-lg">{isNew ? "新規チャージ" : "チャージを編集"}</h2>

        {consumed && (
          <p className="text-xs rounded-lg px-3 py-2" style={{ background: "#3a3220", color: "var(--mz-gold-soft)" }}>

/* ---- チャージ一覧カード(FIFO消化順=古い順に表示) ---- */
function ChargeCard({ charge, onEdit, onDelete }) {
  const total = Number(charge.charge_amount_cny) || 0;
  const remaining = Number(charge.remaining_cny) || 0;
  const consumedAmount = total - remaining;
  const pct = total > 0 ? Math.min(100, Math.max(0, (consumedAmount / total) * 100)) : 0;
  const untouched = remaining === total;

  return (
    <div className="rounded-xl p-4 space-y-2" style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}>
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div>
          <p className="text-sm font-medium">{charge.charge_date}</p>
          <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
            {fmtCNY(total)} ・ {fmtJPY(charge.charge_amount_jpy)} 支払 ・ レート {Number(charge.exchange_rate).toFixed(3)}
          </p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => onEdit(charge)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink-muted)" }}>編集</button>
          <button
            onClick={() => onDelete(charge)}
            disabled={!untouched}
            className="text-xs px-2.5 py-1.5 rounded-lg disabled:opacity-40"
            style={{ border: "1px solid var(--mz-border)", color: "#f2b8bd" }}
            title={untouched ? "" : "消化履歴があるため削除できません"}
          >
            削除
          </button>
        </div>
      </div>

      <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "var(--mz-border)" }}>
        <div className="h-full rounded-full" style={{ width: `${pct}%`, background: "var(--mz-gold)" }} />
      </div>
      <div className="flex items-center justify-between text-xs" style={{ color: "var(--mz-ink-muted)" }}>
        <span>消化済み: {fmtCNY(consumedAmount)}</span>
        <span>残高: {fmtCNY(remaining)}</span>
      </div>
    </div>
  );
}

/* ---- ウォレットページ本体 ---- */
function WalletPage() {
  const [charges, setCharges] = useState(null); // null = 読み込み中
  const [consumptions, setConsumptions] = useState([]);
  const [error, setError] = useState(null);
  const [modalCharge, setModalCharge] = useState(null); // null=閉じる, {}=新規, obj=編集

  const loadAll = useCallback(async () => {
    setError(null);
    const [chargesRes, consumptionsRes] = await Promise.all([
      supabase.from("agent_charges")
        .select("id,charge_date,charge_amount_cny,charge_amount_jpy,exchange_rate,remaining_cny")
        .order("charge_date", { ascending: true })
        .order("id", { ascending: true }),
      supabase.from("agent_charge_consumptions")
        .select("id,charge_id,consumed_cny,applied_rate,consumed_jpy,usage_type,product_id"),
    ]);
    if (chargesRes.error) {
      setError("チャージ情報の取得に失敗しました");
      setCharges([]);
      return;
    }
    setCharges(chargesRes.data || []);
    setConsumptions(consumptionsRes.data || []);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  const chargeMap = useMemo(() => {
    const m = {};
    (charges || []).forEach((c) => { m[c.id] = c; });
    return m;
  }, [charges]);

  const handleSave = async (form) => {
    if (form.id) {
      const patch = form.consumed
        ? { charge_date: form.charge_date }
        : {
            charge_date: form.charge_date,
            charge_amount_cny: form.charge_amount_cny,
            charge_amount_jpy: form.charge_amount_jpy,
            exchange_rate: form.exchange_rate,
            remaining_cny: form.charge_amount_cny, // 未消化のため全額を残高として再設定
          };
      const { error } = await supabase.from("agent_charges").update(patch).eq("id", form.id);
      if (error) { alert("更新に失敗しました"); return; }
    } else {
      const { error } = await supabase.from("agent_charges").insert({
        charge_date: form.charge_date,
        charge_amount_cny: form.charge_amount_cny,
        charge_amount_jpy: form.charge_amount_jpy,
        exchange_rate: form.exchange_rate,
        remaining_cny: form.charge_amount_cny,
      });
      if (error) { alert("登録に失敗しました"); return; }
    }
    setModalCharge(null);
    loadAll();
  };

  const handleDelete = async (charge) => {
    if (Number(charge.remaining_cny) !== Number(charge.charge_amount_cny)) {
      alert("このチャージは既に消化履歴があるため削除できません");
      return;
    }
    if (!window.confirm("このチャージを削除しますか?")) return;
    const { error } = await supabase.from("agent_charges").delete().eq("id", charge.id);
    if (error) { alert("削除に失敗しました"); return; }
    loadAll();
  };

  return (
    <div className="px-4 md:px-6 py-6 md:py-8 max-w-5xl mx-auto w-full space-y-6">
      {error && (
        <p className="text-sm rounded-lg px-3 py-2" style={{ background: "#3a1f22", color: "#f2b8bd" }}>{error}</p>
      )}

      {charges === null && !error && (
        <p className="text-sm" style={{ color: "var(--mz-ink-muted)" }}>読み込み中...</p>
      )}

      {charges !== null && (
        <>
          <WalletSummary charges={charges} />

          <section className="space-y-3">
            <div className="flex items-center justify-between">
              <h3 className="font-display text-base">チャージ台帳(古い順・FIFO消化順)</h3>
              <button
                onClick={() => setModalCharge({})}
                className="text-xs px-3 py-1.5 rounded-lg whitespace-nowrap"
                style={{ background: "var(--mz-gold)", color: "#1a1710" }}
              >
                + 新規チャージ
              </button>
            </div>
            {charges.length === 0 ? (
              <p className="text-sm text-center py-10" style={{ color: "var(--mz-ink-muted)" }}>
                チャージ記録がありません
              </p>
            ) : (
              <div className="space-y-2">
                {charges.map((c) => (
                  <ChargeCard key={c.id} charge={c} onEdit={(ch) => setModalCharge(ch)} onDelete={handleDelete} />
                ))}
              </div>
            )}
          </section>

          <ConsumptionHistorySection consumptions={consumptions} chargeMap={chargeMap} />
        </>
      )}

      {modalCharge && (
        <ChargeFormModal charge={modalCharge} onClose={() => setModalCharge(null)} onSave={handleSave} />
      )}
    </div>
  );
}

/* ============================================================
   サンプル・在庫登録(purchase_batches / products)+ Vision自動抽出
   ・無在庫販売が基本のため、「products登録=仕入れ確定」のタイミングで

     消化なしの「在庫再登録」として扱う

     Supabase Edge Function(extract-product-info)経由で呼び出す想定。
     Edge Function本体は別ファイルとして用意し、デプロイが必要。
   ============================================================ */

const PRODUCT_IMAGE_BUCKET = "product-images";
const PRODUCT_IMAGE_MAX_DIMENSION = 1280; // 長辺の最大px(Storage無料枠節約のため)
const PRODUCT_IMAGE_JPEG_QUALITY = 0.72;
const PRODUCT_STATUS_OPTIONS = ["未販売", "販売済み", "返品済み"];
/* サンプルの「目的」区分(type: "sample" のみ意味を持つ。stockはnull固定)
   ・展示用: ホストに見せる目的で持参する通常のサンプル(デフォルト)
   ・処分用: 取り扱い中止・売れ行き不振等で、現物をそのまま売ってしまいたいサンプル
   ・税務上サンプルは仕入時点で経費計上するため、stockへは転換しない(あくまでsampleのまま目的だけ変わる) */
const SAMPLE_PURPOSE_OPTIONS = ["展示用", "処分用"];

/* 商品カテゴリの大分類(★2026-07-10実装。7択に固定。手動選択・AI自動抽出のいずれもこの7つ以外は選べない)
   1. トップス: Tシャツ・カットソー(半袖/長袖/ノースリーブ・タンクトップ)、シャツ・ブラウス(長袖シャツ/半袖シャツ/ブラウス)、
      ニット・セーター(クルーネック/Vネック/タートルネック)、パーカー・スウェット(プルオーバー/ジップアップ含む)、
      カーディガン・ボレロ(ロング/ショート)、ベスト・ジレ
   2. ボトムス: パンツ、ショートパンツ・ハーフパンツ、スカート
   3. セットアップ: サロペット・オールインワン、セットアップ、スーツ(上下)
   4. アウター: コート、ジャケット・ブルゾン、ダウン・中綿アウターなど、上に羽織る防寒・アウトドア用の上着のみ。
      ★パーカー・スウェット(裏起毛・厚手を含む)はアウターではなく必ずトップスに分類する(2026-07-10訂正)
   5. シューズ: スニーカー、革靴、サンダル、ブーツ
   6. バッグ: ハンドバッグ・トートバッグ、ショルダーバッグ・リュック、エコバッグ・ポーチ
   7. ファッション雑貨: 帽子、マフラー・ストール・手袋、アクセサリー(ネックレス・ピアス等)、ネクタイ・蝶ネクタイ・カフス、時計、
      靴下・レッグウェア、ベルト、その他小物 */
const CATEGORY_OPTIONS = ["トップス", "ボトムス", "セットアップ", "アウター", "シューズ", "バッグ", "ファッション雑貨"];

/* ---- 販売登録画面「展示用サンプルが売れました。再仕入れしますか?」用の引き継ぎデータ ----
   ・「はい」を選んだ際、ProductsPageの新規登録モーダルへ事前入力データを渡すために使う
   ・単純なモジュールスコープの変数(Reactのstateではない)。hashルーティングでSalesPage→
     ProductsPageへページが切り替わる(コンポーネントがアンマウント/マウントされる)際にも
     値を保持できるようにするための、最小限の実装。 */
let pendingProductPrefill = null;

/* ---- 画像リサイズ+JPEG圧縮(ブラウザ側、Canvas使用) ----
   ・Supabase Storageは無料枠の容量が限られるため、保存前に必ず圧縮する
   ・長辺 PRODUCT_IMAGE_MAX_DIMENSION px 以内 / JPEG品質 PRODUCT_IMAGE_JPEG_QUALITY に変換
   ・副次効果として、Edge FunctionでのBase64変換・Claude Vision API送信も軽量化される */
function compressImageFile(file, maxDimension, quality) {
  const maxDim = maxDimension || PRODUCT_IMAGE_MAX_DIMENSION;
  const jpegQuality = quality || PRODUCT_IMAGE_JPEG_QUALITY;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(
          (blob) => { if (blob) resolve(blob); else reject(new Error("画像の圧縮に失敗しました")); },
          "image/jpeg",
          jpegQuality
        );
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---- 画像アップロード(Supabase Storage) ----
   ・アップロード前に必ず圧縮し、常に .jpg として保存する */
async function uploadProductImage(file) {
  let blob;
  try {
    blob = await compressImageFile(file);
  } catch (err) {
    return { ok: false, message: err.message || "画像の圧縮に失敗しました" };
  }
  const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
  const { error: uploadError } = await supabase.storage.from(PRODUCT_IMAGE_BUCKET).upload(path, blob, {
    upsert: false,
    contentType: "image/jpeg",
  });
  if (uploadError) return { ok: false, message: "画像のアップロードに失敗しました" };
  const { data } = supabase.storage.from(PRODUCT_IMAGE_BUCKET).getPublicUrl(path);
  return { ok: true, url: data.publicUrl };
}

/* ---- 経費(expenses)の領収書ファイルアップロード(Supabase Storage) ----
   ・商品画像とは別のバケット("expense-receipts")を使用する。
     Supabase側で事前に同名のpublicバケットを作成しておく必要がある(product-imagesと同様の設定)。
   ・領収書は文字の判読性(金額・日付・宛名等)が重要なため、商品画像より
     長辺の上限を大きめ・JPEG品質を高めに設定して圧縮する。 */
const EXPENSE_RECEIPT_BUCKET = "expense-receipts";
const EXPENSE_RECEIPT_MAX_DIMENSION = 1600;
const EXPENSE_RECEIPT_JPEG_QUALITY = 0.82;
const EXPENSE_RECEIPT_MAX_PDF_BYTES = 15 * 1024 * 1024; // 15MB(PDFは圧縮できないためサイズ上限を設ける)

/* ---- 領収書ファイルのアップロード(画像 or PDF) ----
   ・画像: 従来通りcompressImageFileでJPEGに圧縮してからアップロード
   ・PDF: 圧縮せずそのままアップロード(canvasで扱えないため)。上限15MBを超える場合はエラー */
async function uploadExpenseReceiptFile(file) {
  const isPdf = file.type === "application/pdf" || /\.pdf$/i.test(file.name || "");

  if (isPdf) {
    if (file.size > EXPENSE_RECEIPT_MAX_PDF_BYTES) {
      return { ok: false, message: "PDFファイルが大きすぎます(15MB以内にしてください)" };
    }
    const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.pdf`;
    const { error: uploadError } = await supabase.storage.from(EXPENSE_RECEIPT_BUCKET).upload(path, file, {
      upsert: false,
      contentType: "application/pdf",
    });
    if (uploadError) return { ok: false, message: "領収書ファイル(PDF)のアップロードに失敗しました" };
    const { data: pub } = supabase.storage.from(EXPENSE_RECEIPT_BUCKET).getPublicUrl(path);
    return { ok: true, url: pub.publicUrl };
  }

  let blob;
  try {
    blob = await compressImageFile(file, EXPENSE_RECEIPT_MAX_DIMENSION, EXPENSE_RECEIPT_JPEG_QUALITY);
  } catch (err) {
    return { ok: false, message: err.message || "画像の圧縮に失敗しました" };
  }
  const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.jpg`;
  const { error: uploadError } = await supabase.storage.from(EXPENSE_RECEIPT_BUCKET).upload(path, blob, {
    upsert: false,
    contentType: "image/jpeg",
  });
  if (uploadError) return { ok: false, message: "領収書ファイルのアップロードに失敗しました" };
  const { data: pub } = supabase.storage.from(EXPENSE_RECEIPT_BUCKET).getPublicUrl(path);
  return { ok: true, url: pub.publicUrl };
}

/* ---- Vision自動抽出(Edge Function呼び出し) ----
   デプロイ必要: supabase/functions/extract-product-info
   レスポンス想定: { product_name: string, category: string, price_cny: number } */

  const resp = await fetch(`${SUPABASE_URL}/functions/v1/extract-product-info`, {

      "Content-Type": "application/json",
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      apikey: SUPABASE_ANON_KEY,

    body: JSON.stringify({ imageUrl }),

}

  return resp.json();
}

/* ---- AI抽出結果を経費フォームの値へ安全にマッピング ----
   ・勘定科目/税区分は固定選択肢に一致する場合のみ採用し、一致しなければフォーム側のデフォルトに委ねる(undefinedを返す)
   ・金額は文字列化(フォームのinput[type=number]の値と型を揃えるため) */
function mapExtractedExpenseInfo(info) {
  const safe = info || {};
  return {
    payment_date: safe.payment_date || undefined,
    payee: safe.payee || undefined,
    item_name: safe.item_name || undefined,
    amount_incl_tax: safe.amount_incl_tax != null ? String(safe.amount_incl_tax) : undefined,
    account_category: EXPENSE_ACCOUNT_CATEGORY_OPTIONS.includes(safe.account_category) ? safe.account_category : undefined,
    tax_category: EXPENSE_TAX_CATEGORY_OPTIONS.includes(safe.tax_category) ? safe.tax_category : undefined,
    invoice_number: safe.invoice_number || undefined,
  };
}

/* ---- ウォレット残高の事前チェック(不足時は登録前に中断するため) ---- */
async function getWalletRemainingTotal() {
  const { data, error } = await supabase.from("agent_charges").select("remaining_cny").gt("remaining_cny", 0);
  if (error) return { ok: false };
  const total = (data || []).reduce((sum, c) => sum + (Number(c.remaining_cny) || 0), 0);
  return { ok: true, total };
}

/* ---- 仕入れ確定(products登録)時の共通処理 ----
   ウォレットからCNY合計をFIFO消化し、消化結果(JPY換算額)をproductsレコードに反映する。
   ProductsPage(通常の仕入れ登録)・SalesPage(販売画面からの新規仕入対応)の両方から呼び出す共通ヘルパー。 */
async function consumeAndFinalizeProductCost(productId, { purchaseCny, shippingCny, feeCny }) {
  const results = { purchase_amount_jpy: 0, shipping_jpy: 0, fee_jpy: 0 };
  const steps = [
    { cny: purchaseCny, type: "商品仕入", key: "purchase_amount_jpy" },
    { cny: shippingCny, type: "国際送料", key: "shipping_jpy" },
    { cny: feeCny, type: "その他手数料", key: "fee_jpy" },
  ];
  for (const step of steps) {
    if (!step.cny || step.cny <= 0) continue;
    const res = await consumeWalletFIFO({ cnyAmount: step.cny, usageType: step.type, productId });
    if (!res.ok) return { ok: false, message: res.message };
    results[step.key] = res.consumptions.reduce((sum, c) => sum + (Number(c.consumed_jpy) || 0), 0);
  }
  const { error } = await supabase.from("products").update(results).eq("id", productId);
  if (error) return { ok: false, message: "コストのJPY確定処理に失敗しました" };
  return { ok: true };
}

/* ---- サンプル商品番号の自動採番("S-0001"形式、既存最大値+1) ---- */
async function generateNextProductCode(type) {
  const prefix = type === "sample" ? "S" : "P";
  const { data, error } = await supabase
    .from("products")
    .select("product_code")
    .eq("type", type)
    .not("product_code", "is", null)
    .ilike("product_code", `${prefix}-%`);
  if (error || !data) return `${prefix}-0001`;
  let maxNum = 0;
  data.forEach((r) => {
    const m = /^[A-Z]-(\d+)$/.exec(r.product_code || "");
    if (m) maxNum = Math.max(maxNum, parseInt(m[1], 10));
  });
  return `${prefix}-${String(maxNum + 1).padStart(4, "0")}`;
}

  const [colorOptions, setColorOptions] = useState([]);
  const [checkedColors, setCheckedColors] = useState({});
  const [colorCostInputs, setColorCostInputs] = useState({});
  const [colorImages, setColorImages] = useState({});
  const [uploadingColorImage, setUploadingColorImage] = useState({});

  // 「サイズ展開」テキスト(例: "S/M/L/XL")を選択肢配列にパース。

  const sizeOptionsList = useMemo(() => {

  // 新規登録・サンプル区分の場合、商品番号が空欄なら自動採番する(手動入力があれば上書きしない)
  useEffect(() => {

      if (!cancelled) setProductCode(code);
    })();
    return () => { cancelled = true; };
  }, [isNew, type]);

  // ★2026-07-10変更: 仕入代・送料・手数料は、編集時(既に消化済み)でも変更可能とする。
  // 保存時にCNY金額が変わっていれば、旧消化を取り消して新金額で再消化する(ProductsPage側のhandleSaveProductで実施)。

  // 商品画像(アプリ上に表示する写真)のアップロード
  const handleProductImageFile = async (file) => {

  };

  // AI自動抽出用スクショのアップロード → アップロード後、自動でVision抽出まで実行
  const handleExtractImageFile = async (file) => {
    setUploadingExtractImage(true);
    setVisionError(null);
    const res = await uploadProductImage(file);
    setUploadingExtractImage(false);
    if (!res.ok) { alert(res.message); return; }
    setExtractImageUrl(res.url);
    await runExtraction(res.url);
  };

  const runExtraction = async (url) => {
    const target = url || extractImageUrl;
    if (!target) return;
    setExtracting(true);
    setVisionError(null);
    try {
      const info = await extractProductInfoFromImage(target);

      if (Array.isArray(info.colors) && info.colors.length > 0) {

        setColorOptions([]);
      }

      setVisionError(err.message || "AI自動抽出に失敗しました");
    }
    setExtracting(false);
  };

  // 親(ProductsPage)のbatches propは非同期(loadAll)で更新されるため、この画面内で
  // 新規作成したロットはextraBatchesに一時的に保持し、選択肢に反映する。
  const allBatches = useMemo(() => {
    const ids = new Set(batches.map((b) => b.id));

  const handleBatchChange = (id) => {

  };

  // ★2026-07-10実装: カラーバリエーション一括登録用のチェック切り替え・金額入力ハンドラ
  const toggleColor = (color) => {
    setCheckedColors((prev) => ({ ...prev, [color]: !prev[color] }));
    // 初めてチェックした色は、共通欄(AI自動抽出で入った仕入代等)の現在値をデフォルトとして引き継ぐ
    setColorCostInputs((prev) => (prev[color] ? prev : { ...prev, [color]: { purchaseAmountCny: purchaseAmountCny || "", shippingCny: shippingCny || "", feeCny: feeCny || "" } }));
  };

  const updateColorCost = (color, field, value) => {
    setColorCostInputs((prev) => ({ ...prev, [color]: { ...(prev[color] || {}), [field]: value } }));
  };

  // 色ごとの商品画像アップロード。未指定の色は共通の商品画像(imageUrl)をそのまま使う。
  const handleColorImageFile = async (color, file) => {
    setUploadingColorImage((prev) => ({ ...prev, [color]: true }));

    setColorImages((prev) => ({ ...prev, [color]: res.url }));
  };

  const activeColors = colorOptions.filter((c) => checkedColors[c]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setFormError(null);
    if (!productName.trim() || !purchaseDate) return;

    // ★2026-07-10実装: カラーバリエーションが1色以上選択されている場合は一括登録モード
    if (activeColors.length > 0) {
      for (const c of activeColors) {
        const costs = colorCostInputs[c] || {};
        if (costs.purchaseAmountCny === undefined || costs.purchaseAmountCny === "" || isNaN(parseFloat(costs.purchaseAmountCny))) {
          setFormError(`「${c}」の仕入代を入力してください`);
          return;
        }
      }
      setSaving(true);
      const multiItems = [];
      // ★2026-07-10バグ修正: generateNextProductCodeをループ内で毎回awaitすると、
      //   この時点ではまだどの色もDBにinsertされていないため、全色が同じ「DB上の最大値+1」を
      //   返してしまい商品番号が重複していた。そのため最初の1回だけDBから採番し、
      //   以降はローカルの連番でインクリメントする。
      const firstCode = await generateNextProductCode(type);
      const codePrefix = type === "sample" ? "S" : "P";
      const firstCodeMatch = /^[A-Z]-(\d+)$/.exec(firstCode);
      let nextCodeNum = firstCodeMatch ? parseInt(firstCodeMatch[1], 10) : 1;
      for (const c of activeColors) {
        const code = `${codePrefix}-${String(nextCodeNum).padStart(4, "0")}`;
        nextCodeNum += 1;
        const costs = colorCostInputs[c] || {};
        multiItems.push({
          type,
          status,
          sample_purpose: type === "sample" ? samplePurpose : null,
          product_image_url: colorImages[c] || imageUrl || null,
          product_url: productUrl.trim() || null,
          product_code: code,
          product_name: `${productName.trim()}(${c})`,
          category: category || null,
          size: size.trim() || null,
          size_options: sizeOptionsText.trim() || null,
          selling_price_jpy: sellingPriceJpy ? parseFloat(sellingPriceJpy) : null,
          purchase_date: purchaseDate,
          batch_id: batchId || null,
          purchase_amount_cny: costs.purchaseAmountCny ? parseFloat(costs.purchaseAmountCny) : 0,
          shipping_cny: costs.shippingCny ? parseFloat(costs.shippingCny) : 0,
          fee_cny: costs.feeCny ? parseFloat(costs.feeCny) : 0,
        });
      }
      await onSave({ multiItems });
      setSaving(false);
      return;
    }

    setSaving(true);
    await onSave({
      id: product.id || null,
      type,
      status,
      sample_purpose: type === "sample" ? samplePurpose : null,
      product_image_url: imageUrl || null,
      product_url: productUrl.trim() || null,
      product_code: productCode.trim() || null,
      product_name: productName.trim(),
      category: category.trim() || null,
      size: size.trim() || null,
      size_options: sizeOptionsText.trim() || null,
      selling_price_jpy: sellingPriceJpy ? parseFloat(sellingPriceJpy) : null,
      purchase_date: purchaseDate,
      batch_id: batchId || null,
      purchase_amount_cny: purchaseAmountCny ? parseFloat(purchaseAmountCny) : 0,
      shipping_cny: shippingCny ? parseFloat(shippingCny) : 0,
      fee_cny: feeCny ? parseFloat(feeCny) : 0,
    });
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <form
        onSubmit={handleSubmit}
        className="w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl p-5 space-y-4 max-h-[92vh] overflow-y-auto"
        style={{ background: "var(--mz-surface)", border: "1px solid var(--mz-border)" }}

        <h2 className="font-display text-lg">{isNew ? "新規仕入れ登録" : "商品情報を編集"}</h2>

        {/* 商品画像(アプリ表示用) */}
        <ImageDropZone
          label="商品画像(アプリ上に表示される写真)"
          previewUrl={imageUrl}
          uploading={uploadingImage}
          onFile={handleProductImageFile}
          helperText="サムネイル・一覧表示に使用されます"
        />

        {/* AI自動抽出用スクショ(商品画像とは別に登録) */}
        <div>
          <ImageDropZone
            label="商品情報スクショ(淘宝の商品名・価格部分。AI自動抽出用)"
            previewUrl={extractImageUrl}
            uploading={uploadingExtractImage}
            onFile={handleExtractImageFile}
            helperText="ドロップすると自動でAI抽出を実行します"
          />
          {extractImageUrl && (
            <button
              type="button" onClick={() => runExtraction()} disabled={uploadingExtractImage || extracting}
              className="mt-2 text-xs px-3 py-1.5 rounded-lg disabled:opacity-40 whitespace-nowrap"
              style={{ border: "1px solid var(--mz-gold)", color: "var(--mz-gold-soft)" }}
            >
              {extracting ? "AI解析中..." : "もう一度AIで抽出する"}
            </button>
          )}
          {visionError && <p className="text-xs mt-1" style={{ color: "#f2b8bd" }}>{visionError}</p>}
        </div>

        {colorOptions.length > 0 && (
          <div className="rounded-lg p-3 space-y-2" style={{ background: "var(--mz-surface-hover)", border: "1px solid var(--mz-border)" }}>
            <p className="text-xs" style={{ color: "var(--mz-ink-muted)" }}>
              カラーバリエーションが検出されました。仕入れる色にチェックを入れ、色ごとの仕入代・送料・手数料を入力してください(チェックした色の数だけ商品が一括登録されます。商品名の末尾に色が自動で付きます)。
            </p>
            {colorOptions.map((c) => (
              <div key={c} className="rounded-lg p-2" style={{ border: "1px solid var(--mz-border)" }}>
                <label className="flex items-center gap-2 text-sm cursor-pointer">
                  <input type="checkbox" checked={!!checkedColors[c]} onChange={() => toggleColor(c)} />
                  <span>{c}</span>
                </label>
                {checkedColors[c] && (
                  <div className="mt-2 space-y-2">
                    <ImageDropZone
                      label="この色の商品画像(未指定の場合は上の共通画像を使用)"
                      previewUrl={colorImages[c] || imageUrl}
                      uploading={!!uploadingColorImage[c]}
                      onFile={(file) => handleColorImageFile(c, file)}
                      helperText="ドラッグ&ドロップ、またはクリックして画像を選択"
                    />
                    <div className="grid grid-cols-3 gap-2">
                      <input
                        type="number" min="0" step="0.01" placeholder="仕入代(CNY)"
                        value={(colorCostInputs[c] && colorCostInputs[c].purchaseAmountCny) || ""}

                        className="rounded-lg px-2 py-1.5 text-xs bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
                      />
                      <input
                        type="number" min="0" step="0.01" placeholder="送料(CNY)"
                        value={(colorCostInputs[c] && colorCostInputs[c].shippingCny) || ""}
                        onChange={(e) => updateColorCost(c, "shippingCny", e.target.value)}
                        className="rounded-lg px-2 py-1.5 text-xs bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
                      />
                      <input
                        type="number" min="0" step="0.01" placeholder="手数料(CNY)"
                        value={(colorCostInputs[c] && colorCostInputs[c].feeCny) || ""}
                        onChange={(e) => updateColorCost(c, "feeCny", e.target.value)}

                      />
                    </div>

        <div>

          <select value={type} onChange={(e) => setType(e.target.value)}

            <option value="stock">在庫(新規仕入対応)</option>

        </div>


        {type === "sample" && (

        <div>

          <div>

            <input

            <p className="text-[11px] mt-1" style={{ color: "var(--mz-ink-muted)" }}>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>この商品(この1点)の実サイズ</label>
          {sizeOptionsList.length > 0 ? (
            <select
              value={size} onChange={(e) => setSize(e.target.value)}

              style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }}
            >
              <option value="">選択してください</option>
              {sizeOptionsList.map((s) => <option key={s} value={s}>{s}</option>)}

          ) : (
            <input
              type="text" value={size} onChange={(e) => setSize(e.target.value)} placeholder="M / L / 42 / フリー"

        </div>


        <div className="grid grid-cols-2 gap-3">

              <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>

              <input type="text" value={productCode} onChange={(e) => setProductCode(e.target.value)}
                className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
            </div>
          )}
          <div>
            <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>参考販売価格(JPY)</label>
            <input type="number" min="0" step="1" value={sellingPriceJpy} onChange={(e) => setSellingPriceJpy(e.target.value)}

          </div>
        </div>

        <div>
          <label className="block text-xs mb-1.5" style={{ color: "var(--mz-ink-muted)" }}>淘宝商品ページURL(任意)</label>

            className="w-full rounded-lg px-3 py-2.5 text-sm bg-transparent" style={{ border: "1px solid var(--mz-border)", color: "var(--mz-ink)" }} />
        </div>

        <div className="pt-1" style={{ borderTop: "1px solid var(--mz-border)" }} />
